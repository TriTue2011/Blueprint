blueprint:
  name: Tạo ảnh thời tiết AI
  author: TriTue2011
  source_url: https://raw.githubusercontent.com/TriTue2011/Blueprint/main/ai_creat_image_weather_3.yaml
  description: >
    Tự động tạo ảnh thời tiết bằng AI với 2 lựa chọn engine:
    **Gemini AI Task** (tích hợp HA native) hoặc **NVIDIA Flux qua PyScript**.
    Phong cảnh thay đổi theo buổi trong ngày, dữ liệu thời tiết thực tế,
    và **xoay vòng 12 địa điểm đẹp nhất thế giới** cho mỗi buổi.

    <details>
    <summary><b>⚙️ Yêu cầu cấu hình chung:</b> - Nhấn để mở rộng</summary>

      **Template Sensor nhận diện buổi trong ngày (bắt buộc):**

      Thêm vào `configuration.yaml`:
      ```yaml
      template:
        - sensor:
            - name: "Buổi trong ngày"
              unique_id: time_of_day_vn
              icon: >-
                {% set h = now().hour %}
                {% if 6 <= h < 11 %} mdi:weather-sunny
                {% elif 11 <= h < 13 %} mdi:white-balance-sunny
                {% elif 13 <= h < 18 %} mdi:weather-sunset
                {% elif 18 <= h < 21 %} mdi:weather-night
                {% else %} mdi:weather-night
                {% endif %}
              state: >-
                {% set h = now().hour %}
                {% if 6 <= h < 11 %} Sáng
                {% elif 11 <= h < 13 %} Trưa
                {% elif 13 <= h < 18 %} Chiều
                {% elif 18 <= h < 21 %} Tối
                {% else %} Đêm
                {% endif %}
              attributes:
                period_english: >-
                  {% set h = now().hour %}
                  {% if 6 <= h < 11 %} Morning
                  {% elif 11 <= h < 13 %} Noon
                  {% elif 13 <= h < 18 %} Afternoon
                  {% elif 18 <= h < 21 %} Evening
                  {% else %} Night
                  {% endif %}
      ```

    </details>

    <details>
    <summary><b>⚙️ Yêu cầu khi dùng Gemini AI Task:</b> - Nhấn để mở rộng</summary>

      Sử dụng addon (dockercompse) https://github.com/luuquangvu/Gemini-FastAPI và tích hợp https://github.com/luuquangvu/hass_local_openai_llm.

      Thêm vào `configuration.yaml`:
      ```yaml
      shell_command:
        copy_weather_image: >
          mv "{{ source }}" "{{ destination }}"
      ```

    </details>

    <details>
    <summary><b>⚙️ Yêu cầu khi dùng NVIDIA Flux PyScript:</b> - Nhấn để mở rộng</summary>

      Dùng api nvidia. đăng ký tại https://build.nvidia.com và dùng tích hợp https://github.com/luuquangvu/hass_local_openai_llm

      Thêm vào `configuration.yaml`:
      ```yaml
      pyscript:
        allow_all_imports: true
        hass_is_global: true
        nvidia_api_key: !secret nvidia_api_key
      ```

      Thêm vào `secrets.yaml`:
      ```yaml
      nvidia_api_key: "nvapi-xxx"
      ```

      Tải file script Python tại:
      https://github.com/TriTue2011/Blueprint/blob/main/scripts/weather_image.py

      Đặt file vào thư mục `pyscript/` trong config Home Assistant.

    </details>
  domain: automation
  homeassistant:
    min_version: 2025.10.0

  input:
    # ===== CHỌN ENGINE AI =====
    engine_settings:
      name: "🤖 Chọn Engine AI"
      icon: mdi:robot-outline
      collapsed: false
      input:
        ai_engine:
          name: Engine tạo ảnh
          description: >
            Chọn phương thức tạo ảnh:
            **Gemini** dùng ai_task native của HA (khuyến nghị).
            **NVIDIA Flux** dùng PyScript + API key riêng.
          default: gemini
          selector:
            select:
              options:
                - label: Gemini AI Task (HA Native - Khuyến nghị)
                  value: gemini
                - label: NVIDIA Flux (PyScript)
                  value: nvidia

    # ===== CÀI ĐẶT THỜI TIẾT =====
    weather_sensors:
      name: "🌤️ Cảm biến thời tiết"
      icon: mdi:weather-partly-cloudy
      collapsed: false
      input:
        time_phase_sensor:
          name: Pha thời gian trong ngày
          description: Sensor hiển thị buổi trong ngày (Sáng/Trưa/Chiều/Tối/Đêm)
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

        weather_entity:
          name: Thực thể thời tiết
          description: Weather entity chính (weather.*)
          selector:
            entity:
              filter:
                - domain: weather
              multiple: false

        temperature_sensor:
          name: Cảm biến nhiệt độ (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
              multiple: false

        humidity_sensor:
          name: Cảm biến độ ẩm (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: humidity
              multiple: false

        wind_speed_sensor:
          name: Cảm biến tốc độ gió (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

        pressure_sensor:
          name: Cảm biến áp suất (tùy chọn) — chỉ dùng với Gemini
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

    # ===== CHẤT LƯỢNG KHÔNG KHÍ =====
    air_quality_sensors:
      name: "🏭 Cảm biến chất lượng không khí"
      icon: mdi:air-filter
      collapsed: true
      input:
        aqi_sensor:
          name: AQI - Chỉ số chất lượng không khí (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: aqi
              multiple: false

        pm25_sensor:
          name: PM2.5 (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

    # ===== CÀI ĐẶT GEMINI =====
    gemini_settings:
      name: "✨ Cài đặt Gemini AI Task"
      icon: mdi:google
      collapsed: true
      input:
        ai_task_entity:
          name: AI Task Entity
          description: Chọn AI entity hỗ trợ tạo ảnh (Gemini 2.5 Flash Image recommended). Bỏ qua nếu dùng NVIDIA.
          default: []
          selector:
            entity:
              domain: ai_task
              multiple: false

        image_style:
          name: Phong cách ảnh (Gemini)
          default: photorealistic
          selector:
            select:
              options:
                - label: Ảnh chụp chân thực (Photorealistic)
                  value: photorealistic
                - label: Phong cách nghệ thuật (Artistic)
                  value: artistic
                - label: Phong cách sống động (Vibrant)
                  value: vibrant

    # ===== LƯU ẢNH (CHUNG CHO CẢ 2 ENGINE) =====
    image_output:
      name: "💾 Lưu ảnh — Chung cho cả 2 Engine"
      icon: mdi:content-save
      collapsed: true
      input:
        save_image:
          name: Lưu ảnh vào thư mục
          description: |
            ⚠️ Yêu cầu shell_command trong configuration.yaml:
            shell_command:
              copy_weather_image: mv "{{ source }}" "{{ destination }}"
          default: true
          selector:
            boolean:

        output_directory:
          name: Thư mục đầu ra
          default: "/config/media/weather"
          selector:
            text:

        use_fixed_filename:
          name: Sử dụng tên file cố định
          description: Bật để ghi đè file cũ (khuyến nghị)
          default: true
          selector:
            boolean:

        fixed_filename:
          name: Tên file cố định
          default: "weather_current"
          selector:
            text:

        filename_prefix:
          name: Tiền tố tên file (khi không cố định)
          default: "weather_"
          selector:
            text:

        file_extension:
          name: Phần mở rộng file
          default: "png"
          selector:
            select:
              options:
                - png
                - jpg
                - jpeg
                - webp

        delete_ai_image:
          name: Xóa ảnh AI sau khi lưu (dự phòng — chỉ Gemini)
          description: |
            Dùng delete.files_in_folder (HACS) như bước dự phòng.
            Nếu đã dùng mv trong shell_command thì ảnh gốc đã bị xóa.
          default: false
          selector:
            boolean:

    # ===== CÀI ĐẶT NVIDIA =====
    nvidia_settings:
      name: "⚡ Cài đặt NVIDIA Flux PyScript"
      icon: mdi:flash
      collapsed: true
      input:
        steps:
          name: Số bước sinh ảnh
          description: Cao hơn = chất lượng tốt hơn, chậm hơn (khuyến nghị 6–8)
          default: 6
          selector:
            number:
              min: 1
              max: 20
              step: 1
              mode: slider

        width:
          name: Chiều rộng (px)
          default: 1344
          selector:
            number:
              min: 512
              max: 1920
              step: 64
              mode: slider

        height:
          name: Chiều cao (px)
          default: 768
          selector:
            number:
              min: 256
              max: 1080
              step: 64
              mode: slider

    # ===== GỬI ẢNH =====
    notify_image_section:
      name: "📤 Gửi ảnh sau khi tạo"
      icon: mdi:image-send
      collapsed: false
      input:
        include_telegram_notify:
          name: ✅ Gửi qua Telegram
          default: false
          selector:
            boolean: {}

        telegram_config_entry:
          name: 🤖 Telegram Bot
          default: ""
          selector:
            config_entry:
              integration: telegram_bot

        telegram_target:
          name: 🧑‍💻 Target Chat ID
          description: Bỏ trống để dùng mặc định của bot.
          default: ""
          selector:
            text: {}

        telegram_thread_id:
          name: 🧵 Thread ID (tuỳ chọn)
          default: ""
          selector:
            text: {}

        enable_zalo_bot:
          name: ✅ Gửi qua Zalo Bot (Pyscript)
          default: false
          selector:
            boolean: {}

        zalo_bot_chat_id:
          name: 🧑‍💻 Zalo Bot Chat ID
          default: ""
          selector:
            text: {}

        enable_zalo_custom:
          name: ✅ Gửi qua Zalo Custom Integration
          default: false
          selector:
            boolean: {}

        zalo_custom_account:
          name: 📱 Tài khoản Zalo
          default: ""
          selector:
            text: {}

        zalo_custom_thread_id:
          name: 💬 Thread ID (Nhóm)
          default: ""
          selector:
            text: {}

        zalo_custom_user_id:
          name: 👤 User ID (Cá nhân)
          default: ""
          selector:
            text: {}

        zalo_custom_receiver_type:
          name: 👥 Receiver Type
          default: "0"
          selector:
            select:
              options:
                - label: User (Cá nhân)
                  value: "0"
                - label: Group (Nhóm)
                  value: "1"

        zalo_custom_ttl:
          name: ⏳ TTL (ms)
          default: 0
          selector:
            number:
              min: 0
              max: 86400000
              step: 1000
              mode: box

# ===== TRIGGER =====
trigger:
  - platform: time
    at: "05:00:00"
  - platform: time
    at: "11:00:00"
  - platform: time
    at: "13:00:00"
  - platform: time
    at: "18:00:00"
  - platform: time
    at: "22:00:00"
  - platform: state
    entity_id: !input time_phase_sensor
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

# ===== CONDITIONS =====
condition:
  - condition: template
    value_template: >
      {{ trigger.platform == 'time'
         or trigger.from_state.state != trigger.to_state.state }}

# ===== ACTIONS =====
action:
  # ── BƯỚC 1: THU THẬP DỮ LIỆU THỜI TIẾT ───────────────────────────────────
  - variables:
      ai_engine: !input ai_engine
      time_phase_sensor: !input time_phase_sensor
      tp: "{{ states(time_phase_sensor) | lower }}"
      weather_entity: !input weather_entity
      w: "{{ states(weather_entity) | lower }}"

      # Chỉ số xoay cảnh — đổi mỗi ngày, giữ nhất quán trong ngày
      # 12 cảnh/vòng → mỗi buổi có 12 địa điểm khác nhau
      scene_index: "{{ now().timetuple().tm_yday % 12 }}"

      temperature_sensor: !input temperature_sensor
      temp: >-
        {% if temperature_sensor and temperature_sensor != '' and states(temperature_sensor) not in ['unknown','unavailable',''] %}
          {{ states(temperature_sensor) | float(30) | round(1) }}
        {% else %}
          {{ state_attr(weather_entity, 'temperature') | float(30) | round(1) }}
        {% endif %}

      humidity_sensor: !input humidity_sensor
      hum: >-
        {% if humidity_sensor and humidity_sensor != '' and states(humidity_sensor) not in ['unknown','unavailable',''] %}
          {{ states(humidity_sensor) | int(70) }}
        {% else %}
          {{ state_attr(weather_entity, 'humidity') | int(70) }}
        {% endif %}

      wind_speed_sensor: !input wind_speed_sensor
      wind: >-
        {% if wind_speed_sensor and wind_speed_sensor != '' and states(wind_speed_sensor) not in ['unknown','unavailable',''] %}
          {{ states(wind_speed_sensor) | float(5) | round(1) }}
        {% else %}
          {{ state_attr(weather_entity, 'wind_speed') | float(5) | round(1) }}
        {% endif %}

      pressure_sensor: !input pressure_sensor
      pressure: >-
        {% if pressure_sensor and pressure_sensor != '' and states(pressure_sensor) not in ['unknown','unavailable',''] %}
          {{ states(pressure_sensor) | float(0) | round(0) }}
        {% else %}
          {{ state_attr(weather_entity, 'pressure') | float(0) | round(0) }}
        {% endif %}

      aqi_sensor: !input aqi_sensor
      aqi: >-
        {% if aqi_sensor and aqi_sensor != '' and states(aqi_sensor) not in ['unknown','unavailable',''] %}
          {{ states(aqi_sensor) | int(0) }}
        {% else %}
          0
        {% endif %}

      pm25_sensor: !input pm25_sensor
      pm25: >-
        {% if pm25_sensor and pm25_sensor != '' and states(pm25_sensor) not in ['unknown','unavailable',''] %}
          {{ states(pm25_sensor) | float(0) | round(1) }}
        {% else %}
          0
        {% endif %}

  # ── BƯỚC 1B: TÍNH ĐƯỜNG DẪN ẢNH ──────────────────────────────────────────
  - variables:
      use_fixed_filename: !input use_fixed_filename
      fixed_filename: !input fixed_filename
      output_directory: !input output_directory
      filename_prefix: !input filename_prefix
      file_extension: !input file_extension
      delete_ai_image: !input delete_ai_image
      timestamp: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
      filename: >-
        {% if use_fixed_filename %}
          {{ fixed_filename }}.{{ file_extension }}
        {% else %}
          {{ filename_prefix }}{{ now().strftime('%Y%m%d_%H%M%S') }}.{{ file_extension }}
        {% endif %}
      final_image_path: >-
        {{ output_directory }}/{% if use_fixed_filename %}{{ fixed_filename }}.{{ file_extension }}{% else %}{{ filename_prefix }}{{ now().strftime('%Y%m%d_%H%M%S') }}.{{ file_extension }}{% endif %}

  # ── BƯỚC 2: BUILD PROMPT GEMINI ───────────────────────────────────────────
  - variables:
      image_style: !input image_style

      g_lighting: >-
        {% if 'sáng' in tp or 'morning' in tp %}
          Golden-hour sunrise photography, warm pink-orange-gold sky painting the horizon,
          long soft diffused morning shadows stretching across the land,
          delicate silver dew drops glistening on every blade of grass and leaf,
          thin wisps of morning mist floating low over the fields,
          fresh luminous daylight just beginning to fill the world with warmth
        {% elif 'trưa' in tp or 'noon' in tp %}
          Harsh dramatic overhead noon sun blazing from directly above,
          brilliant deep cobalt blue sky without a trace of cloud,
          extremely short sharp high-contrast shadows directly beneath objects,
          intense full midday daylight saturating every colour to maximum vibrancy,
          heat haze shimmering faintly on distant surfaces
        {% elif 'chiều' in tp or 'afternoon' in tp %}
          Breathtaking warm amber golden sunset light flooding the scene from the west,
          long dramatic horizontal shadows stretching far across the ground,
          glowing fiery orange-red horizon melting into deep purple sky above,
          everything bathed in rich cinematic warm golden tones,
          the magical last hour of daylight painting the world in honey and amber
        {% elif 'tối' in tp or 'evening' in tp %}
          Enchanting blue-hour twilight with absolutely NO remaining daylight,
          sky transitioning in a stunning gradient from deep burnt orange at horizon
          fading through violet and indigo to near-black overhead,
          first stars timidly appearing in the darkening sky above,
          warm glowing village lights and handmade paper lanterns casting
          soft pools of orange light in the growing darkness,
          the quiet magical moment between day and night
        {% else %}
          Deep immersive night scene with absolutely NO sun and NO daylight whatsoever,
          complete velvety darkness enveloping everything,
          brilliant full moon casting crisp cool silver-blue shadows across the landscape,
          the entire Milky Way galaxy sweeping dramatically across the sky
          in a breathtaking river of stars and cosmic dust,
          thousands of individual stars of varying brightness filling every corner of the sky,
          warm glowing orange lanterns providing the only earthly light source
        {% endif %}

      # ── SCENE: xoay vòng 12 địa điểm đẹp nhất thế giới theo từng buổi ──
      g_scene: >-
        {% set si = scene_index | int %}

        {% if 'sáng' in tp or 'morning' in tp %}
          {# CỐ ĐỊNH BUỔI SÁNG: Ruộng bậc thang / thung lũng mù sương đẹp nhất thế giới #}
          {% set scenes = [
            'Mu Cang Chai terraced rice paddies Vietnam, flooded terraces cascading down steep mountains reflecting pink sunrise sky, thin morning mist filling valleys between ridges, H\'Mong farmers beginning work in traditional dress, water buffalo wading through paddies',
            'Jatiluwih rice terraces Bali Indonesia, sweeping UNESCO-listed curved terraces glowing emerald in dawn light, traditional Balinese water temples surrounded by lush tropical jungle, sacred Mount Batukaru emerging dramatically from clouds behind',
            'Banaue rice terraces Philippines, 2000-year-old Ifugao hand-carved terraces called the eighth wonder of the world, misty mountain amphitheatre, wooden stilt houses of indigenous villages clinging to the steep slopes above flooded paddies',
            'Yuanyang rice terraces Yunnan China, thousands of mirror-like flooded terraces built by Hani people over 1300 years, extraordinary geometric patterns covering entire mountain range, dramatic golden sunrise light flooding the valley from the east',
            'Tegallalang rice terrace Ubud Bali, intricate stepped terraces descending into a deep jungle ravine, tall graceful coconut palms swaying along the ridgeline, river glinting far below in shadow, morning mist rising from the gorge floor',
            'Longji Dragon\'s Backbone terraces Guilin China, impossibly steep mountain completely encased in perfectly carved rice terraces from base to summit, Zhuang minority wooden village perched dramatically at the very top in morning cloud and mist',
            'Pu Luong nature reserve Vietnam, pristine untouched terraced valley with no tourist infrastructure, traditional White Thai stilt house villages reflected in still flooded paddies, water buffalo wading through the rice fields, absolute authentic silence',
            'Hoang Su Phi terraced fields Ha Giang Vietnam, ancient Dao and La Chi ethnic minority terraces hundreds of years old, flooded paddies reflecting pink dawn sky, remote mountain landscape with no roads visible, mist pouring between ridgelines',
            'Douro Valley Portugal terraced vineyards, dramatic steep granite hillsides entirely covered with meticulously maintained old-vine vineyards and olive groves, terraces plunging to the blue Douro river winding far below in morning haze',
            'Cinque Terre terraced cliffs Italy, ancient impossibly steep terraced vineyards and lemon groves cascading down dramatic cliffsides to the turquoise Ligurian sea below, colourful fishing village clusters glowing in warm early morning light',
            'Moray Inca circular terraces Peru, mysterious circular Inca terraces carved into natural depressions in the Andean plateau creating concentric rings, each ring a different microclimate, Andes peaks surrounding, dawn mist rising from each ring',
            'Baliem Valley Papua Indonesia, one of the most isolated highland valleys on Earth, Dani tribe traditional grass-roofed compound villages scattered across a vast fertile mountain valley floor, waterfalls on surrounding jungle cliffs catching first light'
          ] %}
          {{ scenes[si] }}

        {% elif 'trưa' in tp or 'noon' in tp %}
          {# CỐ ĐỊNH BUỔI TRƯA: Bãi biển đẹp nhất thế giới #}
          {% set scenes = [
            'Anse Source d\'Argent beach La Digue Seychelles, world\'s most photographed beach, extraordinary smooth rose-pink granite boulders sculpted by millennia into surreal organic forms, powder-white sand, impossibly clear warm turquoise lagoon, palm trees overhead',
            'Navagio Shipwreck Beach Zakynthos Greece, only accessible by sea, dramatic vertical white limestone cliffs hundreds of metres tall encircling a hidden cove, electric blue water, the famous rusted shipwreck half-buried in blinding white sand',
            'Whitehaven Beach Whitsundays Australia, seven kilometres of silica sand so pure it never gets hot, swirling tidal patterns of turquoise and green in Hill Inlet estuary seen from above like an abstract impressionist painting',
            'Matira Beach Bora Bora French Polynesia, overwater bungalows on stilts dotting the impossibly blue lagoon, sacred volcanic Mount Otemanu rising dramatically from the island centre, crystal clear warm lagoon revealing coral gardens beneath the surface',
            'El Nido Palawan Philippines, dramatic jagged limestone karst islands rising vertically from the sea, hidden lagoons accessible only through narrow gaps in the cliffs, finest white coral sand beaches inside each island, water in every shade of blue and green',
            'Pink Sand Beach Harbour Island Bahamas, three kilometres of naturally pink sand caused by foraminifera shells mixed with white coral, calm crystal clear blue Atlantic water, colourful colonial Dunmore Town buildings through the tropical tree line',
            'Maldives North Male Atoll, infinite expanse of warm Indian Ocean, reef islands barely above sea level fringed with perfect white sand, overwater villas on stilts, the water so clear every coral head and tropical fish visible from directly above',
            'Grace Bay Beach Turks and Caicos, twelve kilometres of powdery white sand and perfectly calm clear water, the entire shallow bank visible from above in gradients from pure white through aquamarine to deep navy blue at the reef edge',
            'Playa Paraiso Cayo Largo Cuba, completely undeveloped remote island beach accessible only by boat, fine white sand curving around a perfect shallow bay, warm translucent Caribbean water without a single tourist building or human footprint',
            'Anse Lazio Beach Praslin Seychelles, sheltered bay of perfectly clear warm water, large smooth weathered granite boulders framing the beach naturally, lush tropical forest reaching the sand, tall Coco de Mer palms casting gentle dappled shade',
            'Radhanagar Beach Havelock Island Andaman India, seven kilometres of pristine beach barely visited, lush tropical rainforest pressing right to the sand edge, water so clear you can see coral in six metres depth, perfect waves for swimming',
            'Komodo Island volcanic black sand beach Indonesia, otherworldly black volcanic sand fringed with tropical forest, Komodo dragon tracks visible in the dark sand, crystal clear turquoise water above spectacular coral reef, dramatic volcanic peaks behind'
          ] %}
          {{ scenes[si] }}

        {% elif 'chiều' in tp or 'afternoon' in tp %}
          {# CỐ ĐỊNH BUỔI CHIỀU: Phố cổ / thị trấn đẹp nhất thế giới #}
          {% set scenes = [
            'Hoi An ancient town Vietnam golden hour, narrow lantern-filled alleyways of 15th-century trading port glowing amber, centuries-old Japanese covered bridge, yellow-plastered merchant houses, Thu Bon river reflecting orange sky, silk lanterns swaying',
            'Santorini Oia village Greece sunset, iconic white cubic Cycladic architecture cascading down caldera cliffs, famous blue-domed churches luminous in last light, infinite Aegean Sea horizon blazing orange and crimson, tourists watching from terrace edges',
            'Prague old town Czech Republic golden hour, Gothic Tyn Church spires piercing the golden sky above red-roofed medieval buildings, Charles Bridge glowing warm over the Vltava river, hilltop castle silhouetted against amber clouds',
            'Kyoto Gion district Japan late afternoon, perfectly preserved Edo-period machiya wooden merchant houses lining narrow cobblestone streets, willow trees trailing over a stone-edged canal, a geisha in full kimono slipping between the old buildings in golden light',
            'Dubrovnik old city Croatia golden hour, intact medieval limestone city walls glowing honey-gold in late light, terracotta rooftops of the entire walled city, the Adriatic Sea glittering electric blue beyond the ancient fortifications',
            'Luang Prabang Laos afternoon, UNESCO-listed ancient royal capital at the confluence of Mekong and Nam Khan rivers, golden spires of dozens of Buddhist temples rising above a town of wooden French colonial shophouses, monks in saffron robes',
