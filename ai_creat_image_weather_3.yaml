          only the most delicate elements responding with subtle slow movement,
          grass tips and leaf edges swaying in lazy unhurried motion
        {% else %}
          Absolute perfect stillness with not a breath of wind anywhere,
          every leaf hanging motionless in complete calm,
          any water surface transformed into a flawless mirror
          perfectly reflecting the sky and surroundings in photographic detail
        {% endif %}

      g_hum_fx: >-
