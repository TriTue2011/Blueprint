blueprint:
  name: Tạo ảnh danh lam thắng cảnh
  author: TriTue2011
  source_url: https://github.com/TriTue2011/Blueprint/blob/main/world_landmarks_image_generator.yaml
  description: >
    # Tự động tạo ảnh danh lam thắng cảnh toàn thế giới

    ✨ Tính năng:
    - Tự động chọn ngẫu nhiên quốc gia hoặc theo danh sách tùy chỉnh
    - Hỗ trợ ảnh tham chiếu: Sử dụng ảnh mẫu để định hướng phong cách, màu sắc, ánh sáng
    - Aspect ratio linh hoạt: 16:9, 9:16, 1:1, 4:3, 21:9
    - Tạo ảnh chất lượng cao với prompt được tối ưu
    - Lưu ảnh tự động với tên file có thể tùy chỉnh

    ⚠️ Yêu cầu thêm vào configuration.yaml:
    ```
    shell_command:
      copy_world_landmark_image: cp "{{ source }}" "{{ destination }}"
      delete_file: rm -f "{{ file }}"
    ```

    🔧 v1.1.0 Fixes:
    - Sửa min_version 2024.8.0 → 2025.10.0 (ai_task.generate_image có từ HA 2025.10)
    - Sửa trigger time_pattern hours: !input → dùng multi-trigger + condition lọc
    - Sửa attachments sai format object → list đúng chuẩn HA
    - Sửa delete.file không tồn tại → shell_command.delete_file
    - Sửa !input dùng trực tiếp trong value_template condition → resolve qua variables
    - Sửa image_path /media/ai_task/image/ → /config/ai_task/image/
    - Cải thiện random quốc gia seed bằng ngày + giờ tránh lặp
    - Sửa from_json trên multiline string → dùng list Jinja2 thuần
    - Thêm continue_on_error trên ai_task, shell_command, delete
    - Xóa source_url placeholder

  domain: automation
  homeassistant:
    # FIX: ai_task.generate_image chỉ có từ HA 2025.10
    min_version: 2025.10.0

  input:
    trigger_settings:
      name: "⏰ Cài đặt kích hoạt"
      icon: mdi:clock-outline
      collapsed: false
      input:
        # FIX: !input không dùng được trong trigger platform
        # Dùng selector chọn interval cố định, lọc bằng condition
        trigger_interval:
          name: "Kích hoạt mỗi X giờ"
          description: >
            Chọn tần suất tạo ảnh mới.
            Trigger kích hoạt theo mốc cố định trong ngày.
            Ví dụ "Mỗi 6 giờ" = kích hoạt lúc 0h, 6h, 12h, 18h.
          default: "6"
          selector:
            select:
              options:
                - label: "Mỗi 1 giờ"
                  value: "1"
                - label: "Mỗi 2 giờ (0h, 2h, 4h...)"
                  value: "2"
                - label: "Mỗi 3 giờ (0h, 3h, 6h...)"
                  value: "3"
                - label: "Mỗi 4 giờ (0h, 4h, 8h...)"
                  value: "4"
                - label: "Mỗi 6 giờ (0h, 6h, 12h, 18h)"
                  value: "6"
                - label: "Mỗi 8 giờ (0h, 8h, 16h)"
                  value: "8"
                - label: "Mỗi 12 giờ (0h, 12h)"
                  value: "12"
                - label: "Mỗi ngày lúc 0:00"
                  value: "24"

    country_settings:
      name: "🌍 Cài đặt quốc gia"
      icon: mdi:earth
      collapsed: false
      input:
        use_random_country:
          name: Chọn ngẫu nhiên quốc gia
          description: Tự động chọn ngẫu nhiên từ danh sách
          default: true
          selector:
            boolean:

        specific_country:
          name: Quốc gia cụ thể
          description: "Chỉ dùng khi TẮT chọn ngẫu nhiên. Nhập tên quốc gia bằng tiếng Việt"
          default: "Việt Nam"
          selector:
            text:
              multiline: false

        country_region:
          name: Khu vực ưu tiên
          description: Lọc quốc gia theo khu vực (All = tất cả)
          default: all
          selector:
            select:
              options:
                - label: Tất cả (All)
                  value: all
                - label: Châu Á (Asia)
                  value: asia
                - label: Châu Âu (Europe)
                  value: europe
                - label: Châu Mỹ (Americas)
                  value: americas
                - label: Châu Phi (Africa)
                  value: africa
                - label: Châu Đại Dương (Oceania)
                  value: oceania
              sort: false
              multiple: false

    reference_image:
      name: "🖼️ Ảnh tham chiếu (Reference Image)"
      icon: mdi:image-outline
      collapsed: true
      input:
        use_reference_image:
          name: Sử dụng ảnh tham chiếu
          description: >
            Bật để đính kèm ảnh mẫu. AI sẽ học phong cách chụp, màu sắc, ánh sáng từ ảnh này.

            💡 Ảnh tham chiếu giúp:
            - Định hướng phong cách nhiếp ảnh
            - Thống nhất tone màu và ánh sáng
            - Tạo sự nhất quán giữa các ảnh
          default: false
          selector:
            boolean:

        use_preset_reference:
          name: Sử dụng ảnh preset
          description: Chọn từ danh sách ảnh có sẵn hoặc nhập đường dẫn tùy chỉnh
          default: true
          selector:
            boolean:

        preset_reference_path:
          name: Đường dẫn ảnh preset
          description: >
            Đường dẫn media-source hoặc local path.
            Ví dụ: media-source://media_source/local/calendar/examples.png
          default: "media-source://media_source/local/calendar/examples.png"
          selector:
            text:
              multiline: false

        custom_reference_path:
          name: Đường dẫn ảnh tùy chỉnh
          description: >
            Nhập đường dẫn file ảnh (chỉ dùng khi "Sử dụng ảnh preset" tắt).
            Chỉ cần nhập: local/folder/tenfile.jpg
            Ví dụ: local/calendar/examples.png
            💡 Upload ảnh vào Media browser trước khi dùng.
          default: ""
          selector:
            text:
              multiline: false

    ai_settings:
      name: "🤖 Cài đặt AI"
      icon: mdi:robot-outline
      collapsed: false
      input:
        ai_task_entity:
          name: AI Task Entity
          description: Chọn AI entity hỗ trợ tạo ảnh (Gemini 2.5 Flash Image recommended)
          default: []
          selector:
            entity:
              filter:
                - domain: ai_task
              multiple: false

        image_style:
          name: Phong cách ảnh
          default: photorealistic
          selector:
            select:
              options:
                - label: Ảnh chụp chân thực (Photorealistic)
                  value: photorealistic
                - label: Phong cách nghệ thuật (Artistic)
                  value: artistic
                - label: Phong cách sống động (Vibrant)
                  value: vibrant
                - label: Cinematic điện ảnh
                  value: cinematic
              sort: false
              multiple: false

        aspect_ratio:
          name: Tỷ lệ khung hình
          default: "16:9"
          selector:
            select:
              options:
                - label: 16:9 Landscape (Ngang)
                  value: "16:9"
                - label: 9:16 Portrait (Dọc)
                  value: "9:16"
                - label: 1:1 Square (Vuông)
                  value: "1:1"
                - label: 4:3 Classic
                  value: "4:3"
                - label: 21:9 Ultra-wide
                  value: "21:9"
              sort: false
              multiple: false

        include_people:
          name: Cho phép người trong ảnh
          description: Nếu bật, có thể có người nhỏ trong cảnh. Nếu tắt, chỉ có phong cảnh
          default: false
          selector:
            boolean:

        lighting_preference:
          name: Ưu tiên ánh sáng
          default: golden_hour
          selector:
            select:
              options:
                - label: Golden Hour (Vàng óng)
                  value: golden_hour
                - label: Blue Hour (Xanh ma mị)
                  value: blue_hour
                - label: Midday (Giữa trưa)
                  value: midday
                - label: Sunset (Hoàng hôn)
                  value: sunset
                - label: Sunrise (Bình minh)
                  value: sunrise
                - label: Night (Ban đêm)
                  value: night
                - label: Auto (Tự động)
                  value: auto
              sort: false
              multiple: false

    output_settings:
      name: "💾 Cài đặt lưu ảnh"
      icon: mdi:content-save
      collapsed: true
      input:
        save_image:
          name: Lưu ảnh vào thư mục
          default: true
          selector:
            boolean:

        output_directory:
          name: Thư mục đầu ra
          description: Đường dẫn tuyệt đối trên hệ thống. Ví dụ /media/world_landmarks
          default: /media/world_landmarks
          selector:
            text:
              multiline: false

        use_fixed_filename:
          name: Sử dụng tên file cố định
          description: Bật để ghi đè file cũ (dùng cho dashboard luôn cập nhật)
          default: true
          selector:
            boolean:

        fixed_filename:
          name: Tên file cố định
          description: Tên file khi dùng chế độ cố định (không cần đuôi mở rộng)
          default: world_landmark_current
          selector:
            text:
              multiline: false

        filename_prefix:
          name: Tiền tố tên file
          description: Tiền tố khi tạo file mới (kèm timestamp)
          default: landmark_
          selector:
            text:
              multiline: false

        file_extension:
          name: Phần mở rộng file
          default: png
          selector:
            select:
              options:
                - png
                - jpg
                - jpeg
                - webp
              sort: false
              multiple: false

        delete_ai_image:
          name: Xóa ảnh AI gốc sau khi lưu
          description: >
            Tự động xóa ảnh do AI tạo ra sau khi copy xong.
            ⚠️ Yêu cầu khai báo shell_command.delete_file trong configuration.yaml.
          default: true
          selector:
            boolean:

# ============================================================
# MODE
# ============================================================
mode: single
max_exceeded: silent

# ============================================================
# TRIGGER — multi-trigger, condition lọc đúng interval
# FIX: !input không dùng được trong trigger platform
# ============================================================
trigger:
  - platform: time_pattern
    hours: "/1"
    id: trigger_1h
  - platform: time_pattern
    hours: "/2"
    id: trigger_2h
  - platform: time_pattern
    hours: "/3"
    id: trigger_3h
  - platform: time_pattern
    hours: "/4"
    id: trigger_4h
  - platform: time_pattern
    hours: "/6"
    id: trigger_6h
  - platform: time_pattern
    hours: "/8"
    id: trigger_8h
  - platform: time_pattern
    hours: "/12"
    id: trigger_12h
  - platform: time
    at: "00:00:00"
    id: trigger_24h

# ============================================================
# CONDITION — chỉ cho chạy đúng trigger khớp với setting
# ============================================================
condition:
  - condition: template
    value_template: >
      {% set interval = trigger_interval %}
      {% set tid = trigger.id %}
      {{ (interval == '1'  and tid == 'trigger_1h')
      or (interval == '2'  and tid == 'trigger_2h')
      or (interval == '3'  and tid == 'trigger_3h')
      or (interval == '4'  and tid == 'trigger_4h')
      or (interval == '6'  and tid == 'trigger_6h')
      or (interval == '8'  and tid == 'trigger_8h')
      or (interval == '12' and tid == 'trigger_12h')
      or (interval == '24' and tid == 'trigger_24h') }}

# ============================================================
# ACTION
# ============================================================
action:

  # === RESOLVE TẤT CẢ !INPUT VÀO VARIABLES ===
  # FIX: !input không dùng được trực tiếp trong condition value_template
  # Phải resolve qua variables trước
  - variables:
      trigger_interval: !input trigger_interval
      use_random_country: !input use_random_country
      specific_country: !input specific_country
      country_region: !input country_region
      use_reference_image: !input use_reference_image
      use_preset_reference: !input use_preset_reference
      preset_reference_path: !input preset_reference_path
      custom_reference_path: !input custom_reference_path
      ai_task_entity: !input ai_task_entity
      image_style: !input image_style
      aspect_ratio: !input aspect_ratio
      include_people: !input include_people
      lighting_preference: !input lighting_preference
      save_image: !input save_image
      output_directory: !input output_directory
      use_fixed_filename: !input use_fixed_filename
      fixed_filename: !input fixed_filename
      filename_prefix: !input filename_prefix
      file_extension: !input file_extension
      delete_ai_image: !input delete_ai_image

  # === DANH SÁCH QUỐC GIA ===
  # FIX: dùng list Jinja2 thuần thay vì from_json trên multiline string
  - variables:
      asia_countries: >
        {{ ['Việt Nam', 'Nhật Bản', 'Hàn Quốc', 'Trung Quốc', 'Thái Lan',
            'Singapore', 'Malaysia', 'Indonesia', 'Philippines', 'Ấn Độ',
            'Nepal', 'Bhutan', 'Sri Lanka', 'Mông Cổ', 'Myanmar', 'Campuchia',
            'Lào', 'Bangladesh', 'Pakistan', 'Uzbekistan', 'Kazakhstan'] }}
      europe_countries: >
        {{ ['Pháp', 'Ý', 'Tây Ban Nha', 'Bồ Đào Nha', 'Thụy Sĩ', 'Áo',
            'Đức', 'Hà Lan', 'Bỉ', 'Anh', 'Ireland', 'Na Uy', 'Thụy Điển',
            'Phần Lan', 'Iceland', 'Hy Lạp', 'Croatia', 'Séc', 'Ba Lan',
            'Đan Mạch', 'Hungary', 'Romania'] }}
      americas_countries: >
        {{ ['Hoa Kỳ', 'Canada', 'Mexico', 'Brazil', 'Argentina', 'Chile',
            'Peru', 'Colombia', 'Ecuador', 'Costa Rica', 'Cuba'] }}
      africa_countries: >
        {{ ['Ai Cập', 'Morocco', 'Nam Phi', 'Kenya', 'Tanzania', 'Tunisia',
            'Ethiopia', 'Madagascar', 'Namibia'] }}
      oceania_countries: >
        {{ ['Úc', 'New Zealand', 'Fiji', 'Papua New Guinea'] }}

  - variables:
      selected_country_list: >
        {% if country_region == 'asia' %}{{ asia_countries }}
        {% elif country_region == 'europe' %}{{ europe_countries }}
        {% elif country_region == 'americas' %}{{ americas_countries }}
        {% elif country_region == 'africa' %}{{ africa_countries }}
        {% elif country_region == 'oceania' %}{{ oceania_countries }}
        {% else %}
          {{ asia_countries + europe_countries + americas_countries + africa_countries + oceania_countries }}
        {% endif %}

      country: >
        {% if use_random_country %}
          {% set arr = selected_country_list %}
          {% set n = arr | length %}
          {# FIX: seed bằng ngày + giờ để mỗi ngày cùng giờ ra quốc gia khác nhau #}
          {% set seed = (now().day * 31 + now().month * 7 + now().hour) % n %}
          {{ arr[seed] }}
        {% else %}
          {{ specific_country }}
        {% endif %}

      reference_media_source: >
        {% if use_reference_image %}
          {% if use_preset_reference %}
            {{ preset_reference_path }}
          {% elif custom_reference_path and custom_reference_path != '' %}
            {% if custom_reference_path.startswith('media-source://') %}
              {{ custom_reference_path }}
            {% else %}
              media-source://media_source/{{ custom_reference_path }}
            {% endif %}
          {% else %}{{ '' }}{% endif %}
        {% else %}{{ '' }}{% endif %}

      reference_mime_type: >
        {% set p = reference_media_source | lower %}
        {% if '.png' in p %}image/png
        {% elif '.webp' in p %}image/webp
        {% elif '.jpg' in p or '.jpeg' in p %}image/jpeg
        {% else %}image/jpeg{% endif %}

      aspect_ratio_desc: >
        {% if aspect_ratio == '16:9' %}16:9 LANDSCAPE format MANDATORY (width >> height), cinematic widescreen
        {% elif aspect_ratio == '9:16' %}9:16 PORTRAIT format MANDATORY (height >> width), vertical mobile-friendly
        {% elif aspect_ratio == '1:1' %}1:1 SQUARE format MANDATORY (equal width and height), Instagram-style
        {% elif aspect_ratio == '4:3' %}4:3 CLASSIC format (width > height), traditional photography
        {% elif aspect_ratio == '21:9' %}21:9 ULTRA-WIDE format (extremely wide), panoramic cinema
        {% else %}16:9 landscape format{% endif %}

      aspect_ratio_prohibition: >
        {% if aspect_ratio == '16:9' %}❌ Portrait format (9:16) ❌ Square format (1:1)
        {% elif aspect_ratio == '9:16' %}❌ Landscape format (16:9) ❌ Square format (1:1)
        {% elif aspect_ratio == '1:1' %}❌ Landscape format (16:9) ❌ Portrait format (9:16)
        {% else %}❌ Wrong aspect ratios{% endif %}

      lighting_desc: >
        {% if lighting_preference == 'golden_hour' %}Golden hour: warm soft sunlight, long shadows, rich golden tones
        {% elif lighting_preference == 'blue_hour' %}Blue hour: twilight, deep blue sky, magical ethereal quality
        {% elif lighting_preference == 'midday' %}Midday: bright overhead sun, strong shadows, high contrast
        {% elif lighting_preference == 'sunset' %}Sunset: dramatic warm colors, orange and pink sky, silhouettes
        {% elif lighting_preference == 'sunrise' %}Sunrise: fresh morning light, soft pastel colors, peaceful mood
        {% elif lighting_preference == 'night' %}Night: dark sky, artificial lights, long exposure effect, serene
        {% else %}Natural lighting appropriate for the location{% endif %}

      style_desc: >
        {% if image_style == 'photorealistic' %}Photorealistic: natural colors, accurate details, DSLR quality
        {% elif image_style == 'artistic' %}Artistic: painterly quality, dramatic composition, expressive color grading
        {% elif image_style == 'vibrant' %}Vibrant: saturated colors, high contrast, Instagram-worthy aesthetic
        {% elif image_style == 'cinematic' %}Cinematic: film-like color grading, dramatic lighting, movie scene aesthetic
        {% else %}Professional photography quality{% endif %}

      people_desc: >
        {% if include_people %}
          If people are present, they should be small figures that complement the landscape. No selfies, no tourists crowding the frame.
        {% else %}
          NO people visible. Pure landscape photography without any human presence.
        {% endif %}

      optimized_prompt: >
        {% if use_reference_image and reference_media_source != '' %}
        🖼️ CRITICAL: USE PROVIDED REFERENCE IMAGE as STYLE GUIDE.
        Match photographic style, color palette, mood. Apply similar lighting. DO NOT copy exact scene.

        {% endif %}
        🎯 MISSION: Create a stunning photograph of the most ICONIC LANDMARK of {{ country }}.

        📍 CONTENT:
        - ONE iconic landmark or natural wonder world-famous from {{ country }}
        - {{ style_desc }}
        - {{ lighting_desc }}
        - {{ people_desc }}
        - Cinematic composition: foreground, midground, background depth

        📐 TECHNICAL (MANDATORY):
        - ASPECT RATIO: {{ aspect_ratio_desc }}
        - Professional DSLR quality, sharp focus, HDR dynamic range
        - NO crop marks, NO letterboxing, NO black bars

        ⛔ PROHIBITIONS:
        {{ aspect_ratio_prohibition }}
        ❌ Text, watermarks, logos ❌ Selfie perspective ❌ Busy cluttered composition

        ✅ CHECKLIST: {{ aspect_ratio }} ratio | Iconic {{ country }} landmark | No text | No watermarks
        Generate in {{ aspect_ratio }} format NOW.

      task_name: "World Landmark - {{ country }}"

  # === TẠO ẢNH VỚI HOẶC KHÔNG CÓ REFERENCE ===
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ use_reference_image and reference_media_source != '' }}"
        sequence:
          # FIX: attachments phải là LIST, không phải object
          # FIX: bỏ metadata.navigateIds và các field không hợp lệ
          - continue_on_error: true
            action: ai_task.generate_image
            data:
              entity_id: "{{ ai_task_entity }}"
              task_name: "{{ task_name }}"
              instructions: "{{ optimized_prompt }}"
              attachments:
                - media_content_id: "{{ reference_media_source }}"
                  media_content_type: "{{ reference_mime_type }}"
            response_variable: ai_result

    default:
      - continue_on_error: true
        action: ai_task.generate_image
        data:
          entity_id: "{{ ai_task_entity }}"
          task_name: "{{ task_name }}"
          instructions: "{{ optimized_prompt }}"
        response_variable: ai_result

  # === XỬ LÝ VÀ LƯU ẢNH ===
  - if:
      - condition: template
        value_template: >
          {{ ai_result is defined and ai_result.media_source_id is defined }}
    then:
      - variables:
          source_id: "{{ ai_result.media_source_id | default('') }}"
          # FIX: AI images lưu tại /config/ai_task/image/, không phải /media/ai_task/image/
          image_path: >
            {% if source_id.startswith('media-source://ai_task/image/') %}
              /config/ai_task/image/{{ source_id.split('/')[-1] }}
            {% elif source_id.startswith('media-source://') %}
              /config/{{ source_id.replace('media-source://', '').replace('//', '/') }}
            {% else %}
              {{ source_id }}
            {% endif %}

      # FIX: save_image đã resolve vào variables, dùng trực tiếp
      - if:
          - condition: template
            value_template: "{{ save_image }}"
        then:
          - variables:
              timestamp: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
              filename: >
                {% if use_fixed_filename %}
                  {{ fixed_filename }}.{{ file_extension }}
                {% else %}
                  {{ filename_prefix }}{{ country | replace(' ', '_') | lower }}_{{ timestamp }}.{{ file_extension }}
                {% endif %}
              dest_path: "{{ output_directory }}/{{ filename }}"

          # FIX: thêm continue_on_error phòng shell_command chưa được khai báo
          - continue_on_error: true
            action: shell_command.copy_world_landmark_image
            data:
              source: "{{ image_path }}"
              destination: "{{ dest_path }}"

          - if:
              - condition: template
                value_template: "{{ delete_ai_image }}"
            then:
              # FIX: delete.file không tồn tại → dùng shell_command.delete_file
              # Yêu cầu khai báo trong configuration.yaml:
              #   shell_command:
              #     delete_file: rm -f "{{ file }}"
              - continue_on_error: true
                action: shell_command.delete_file
                data:
                  file: "{{ image_path }}"
