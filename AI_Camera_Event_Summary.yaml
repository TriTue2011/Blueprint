blueprint:
  name: AI Door Entry with AI Task Analysis (v2.0.0 + Zalo)
  author: valentinfrlch + Custom + AI Task Integration + Zalo
  homeassistant:
    min_version: 2024.10.0
  description: Phân tích sự kiện ra vào cửa bằng AI Task. Gửi thông báo với ảnh và
    phân tích AI qua điện thoại, Telegram, Zalo và TTS ra loa.
  domain: automation
  input:
    trigger_section:
      name: Trigger Settings
      icon: mdi:play-circle
      input:
        trigger_sensor:
          name: Trigger Sensor
          description: Cảm biến kích hoạt automation (cửa, motion sensor)
          selector:
            entity:
              filter:
              - domain:
                - binary_sensor
              reorder: false
              multiple: false
        trigger_from_state:
          name: Trigger From State
          default: 'off'
          selector:
            select:
              options:
              - 'off'
              - 'on'
              custom_value: true
              sort: false
              multiple: false
        trigger_to_state:
          name: Trigger To State
          default: 'on'
          selector:
            select:
              options:
              - 'on'
              - 'off'
              custom_value: true
              sort: false
              multiple: false
        person_occupancy_sensor:
          name: Person Occupancy Sensor (Optional)
          description: Đợi phát hiện người trước khi phân tích
          default: []
          selector:
            entity:
              filter:
              - domain:
                - binary_sensor
              reorder: false
              multiple: false
        person_detected_state:
          name: Person Detected State
          default: 'on'
          selector:
            select:
              options:
              - 'on'
              - 'off'
              custom_value: true
              sort: false
              multiple: false
        wait_for_person:
          name: Wait for Person Detection
          default: false
          selector:
            boolean: {}
        max_wait_time:
          name: Maximum Wait Time (Optional)
          description: Thời gian tối đa đợi phát hiện người (0 = không giới hạn)
          default: 0
          selector:
            number:
              min: 0.0
              max: 3600.0
              unit_of_measurement: seconds
              mode: box
              step: 1.0
    run_conditions:
      name: Run Conditions
      description: Tất cả điều kiện phải đúng để automation chạy
      default: []
      selector:
        condition: {}
    cooldown:
      name: Cooldown
      description: Thời gian chờ trước khi chạy lại automation
      default:
        minutes: 10
      selector:
        duration: {}
    camera_sensor_section:
      name: Camera & Snapshot Settings
      icon: mdi:camera
      input:
        camera_entities:
          name: Camera Entities
          description: Danh sách camera để giám sát
          default: []
          selector:
            entity:
              multiple: true
              filter:
              - domain:
                - camera
              reorder: false
        num_snapshots:
          name: ⌛ Number of Snapshots
          description: Số ảnh sẽ chụp để so sánh (từ 1 đến 5)
          selector:
            number:
              min: 1.0
              max: 5.0
              step: 1.0
              unit_of_measurement: snapshots
              mode: slider
          default: 3
        num_delay_before_snapshot:
          name: ⌛ Delay Before First Snapshot
          description: Thời gian chờ TRƯỚC KHI chụp ảnh đầu tiên (tính theo giây)
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.5
              unit_of_measurement: seconds
              mode: slider
          default: 1
        num_delay:
          name: ⌛ Delay Between Snapshots
          description: Thời gian trễ giữa các lần chụp (tính theo giây)
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.5
              unit_of_measurement: seconds
              mode: slider
          default: 1
        overwrite_image:
          name: "\U0001F3DE️ Overwrite Image (Optional)"
          description: Ghi đè ảnh cũ (ảnh cũ sẽ bị ghi đè bởi ảnh mới)
          default: true
          selector:
            boolean: {}
        file_path:
          name: File Path
          description: Đường dẫn lưu snapshot
          default: /media/llmvision/snapshots_blueprint/{{ camera_file_path }}/last_motion.jpg
          selector:
            select:
              options:
              - label: Media Folder - Secured
                value: /media/llmvision/snapshots_blueprint/{{ camera_file_path }}/last_motion.jpg
              - label: Public Folder - Unsecured
                value: /config/www/snapshots/{{ camera_file_path }}/last_motion.jpg
              custom_value: true
              sort: false
              multiple: false
    ai_task_section:
      name: AI Task Settings
      icon: mdi:brain
      collapsed: true
      input:
        ai_powered:
          name: ✅ AI-powered (Optional)
          description: Sử dụng AI Task để phân tích ảnh
          default: true
          selector:
            boolean: {}
        ai_provider:
          name: "\U0001F916 AI Task Provider"
          description: Chọn AI Task provider để phân tích ảnh
          selector:
            entity:
              domain:
              - ai_task
              multiple: false
              reorder: false
          default: []
        ai_task_instructions:
          name: ✏️ AI Task Instructions
          description: Hướng dẫn cho AI khi phân tích ảnh
          selector:
            text:
              multiline: true
              multiple: false
          default: 'Đây là chuỗi hình ảnh từ máy ảnh của tôi.

            Hãy phân tích chuỗi ảnh này.

            Qui tắc trả về kết quả phân tích chuỗi ảnh:

            - Phải sử dụng Tiếng Việt có đầy đủ dấu

            - Bỏ qua các ký tự đặc biệt như *, emoji, /,...

            - Bỏ qua các dòng trống

            - Chỉ thể hiện văn bản thuần

            - Tin nhắn của bạn cần đủ ngắn để có thể đưa vào thông báo trên điện thoại.

            '
        ai_structure_description:
          name: "\U0001F4DD AI Task Structure Description"
          description: Từ điển xác định cấu trúc của dữ liệu đầu ra
          selector:
            text:
              multiline: true
              multiple: false
          default: 'Hãy so sánh và mô tả rất ngắn gọn những gì bạn thấy trong chuỗi
            hình ảnh sau từ máy ảnh của tôi.

            - Nếu có người, động vật, xe máy hoặc ô tô, hãy mô tả chi tiết về chúng.

            - Chỉ rõ giới tính, người lớn hay trẻ em.

            - Không mô tả các vật thể hoặc tòa nhà cố định.

            - Nếu trong chuỗi ảnh không có người hãy trả lời "Đã phát hiện chuyển
            động tuy nhiên không có người trong chuỗi ảnh khi so sánh".

            '
    notification_section:
      name: Mobile App Notify Settings
      icon: mdi:bell
      collapsed: true
      input:
        include_notify:
          name: ✅ Mobile App Notify Option
          default: false
          selector:
            boolean: {}
        is_ios_android:
          name: "\U0001F514 Android or iOS device?"
          default: android_device
          selector:
            select:
              options:
              - label: Android
                value: android_device
              - label: iOS
                value: ios_device
              sort: false
              multiple: false
              custom_value: false
        notify_device:
          name: "\U0001F4F1 Devices Notified"
          default: []
          selector:
            device:
              filter:
              - integration: mobile_app
              multiple: true
        notify_title:
          name: "\U0001F4DD Title"
          default: "\U0001F514 <b><span style=\"color: red\">Có chuyển động</span></b>\n"
          selector:
            text:
              multiple: false
              multiline: false
        tap_navigate:
          name: "\U0001F4F2 Tap Navigate"
          default: /lovelace/camera
          selector:
            text:
              multiple: false
              multiline: false
        status_bar_icon:
          name: "\U0001F320 Status Bar Icon (Android)"
          default: mdi:motion-sensor
          selector:
            icon: {}
        notification_color:
          name: "\U0001F3A8 Notification Color (Android)"
          default:
          - 255
          - 0
          - 0
          selector:
            color_rgb: {}
        notification_time:
          name: Notification Time
          default: ''
          selector:
            select:
              options:
              - label: No Time Added
                value: ''
              - label: 12 Hour
                value: at {{ now().strftime("%-I:%M %p") }}
              - label: 24 Hour
                value: at {{ now().strftime("%H:%M") }}
              sort: false
              multiple: false
              custom_value: false
    telegram_section:
      name: Telegram Settings
      icon: mdi:send
      collapsed: true
      input:
        include_telegram_notify:
          name: ✅ Telegram Option
          default: false
          selector:
            boolean: {}
        telegram_config_entry:
          name: Telegram Bot
          default: ''
          selector:
            config_entry:
              integration: telegram_bot
        telegram_target:
          name: Target Chat ID
          default: ''
          selector:
            text:
              multiple: false
              multiline: false
        telegram_thread_id:
          name: Thread ID (Optional)
          default: ''
          selector:
            text:
              multiple: false
              multiline: false
        telegram_initial_caption:
          name: Initial Caption
          default: "\U0001F514 Phát hiện chuyển động!"
          selector:
            text:
              multiple: false
              multiline: false
    zalo_bot_section:
      name: Zalo Bot Settings (Pyscript)
      icon: mdi:chat
      collapsed: true
      input:
        enable_zalo_bot:
          name: ✅ Enable Zalo Bot
          description: Bật/tắt gửi thông báo qua Zalo Bot (sử dụng pyscript)
          default: false
          selector:
            boolean: {}
        zalo_bot_chat_id:
          name: Zalo Bot Chat ID
          description: Chat ID hoặc User ID nhận thông báo Zalo Bot
          default: ""
          selector:
            text:
              multiple: false
              multiline: false
        zalo_bot_initial_caption:
          name: Zalo Bot Initial Caption
          description: Caption khi gửi ảnh đầu tiên
          default: "\U0001F514 Phát hiện chuyển động!"
          selector:
            text:
              multiple: false
              multiline: false
    zalo_custom_section:
      name: Zalo Custom Integration Settings
      icon: mdi:chat-processing
      collapsed: true
      input:
        enable_zalo_custom:
          name: ✅ Enable Zalo Custom
          description: Bật/tắt gửi thông báo qua Zalo Custom Integration
          selector:
            boolean: {}
          default: false
        
        zalo_custom_account:
          name: 📱 Zalo Account
          description: Tài khoản (số điện thoại) để gửi tin nhắn
          selector:
            text:

        
        zalo_custom_thread_id:
          name: 💬 Thread ID
          description: ID của cuộc hội thoại Zalo. Nhập dưới dạng text để tránh mất độ chính xác với số lớn (VD 3295299208151385728)
          selector:
            text:
              multiple: true

        zalo_custom_user_id:
          name: 💬 User ID
          description: ID của cuộc hội thoại Zalo. Nhập dưới dạng text để tránh mất độ chính xác với số lớn (VD 3295299208151385728)
          selector:
            text:
              multiple: true
          default:  
        zalo_custom_receiver_type:
          name: 👥 Type of Receiver
          description: Loại người nhận tin nhắn
          selector:
            select:
              options:
              - label: User (Cá nhân)
                value: '0'
              - label: Group (Nhóm)
                value: '1'
              sort: false
              custom_value: false
              multiple: false
          default: '0'
        
        zalo_custom_ttl:
          name: ⏱️ Message TTL
          description: Thời gian tự động thu hồi tin nhắn (milliseconds). Mặc định 0 = không tự thu hồi
          selector:
            number:
              min: 0
              max: 86400000
              step: 1
              mode: slider
          default: 0
        
        zalo_custom_initial_caption:
          name: 📝 Initial Caption
          description: Nội dung tin nhắn ban đầu khi gửi ảnh hoặc thông báo
          selector:
            text:
              multiline: true
              multiple: false
          default: "🔔 Phát hiện chuyển động!"
    tts_speaker_section:
      name: TTS Speaker Settings
      icon: mdi:speaker
      collapsed: true
      input:
        include_tts_announcement:
          name: ✅ Use TTS Announcement
          default: false
          selector:
            boolean: {}
        num_volume_speaker:
          name: "\U0001F50A Volume Set"
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              mode: slider
          default: 0.5
        text_to_speech_engine:
          name: "\U0001F5E3️ Text-to-Speech Service Provider"
          default: []
          selector:
            entity:
              filter:
              - domain:
                - tts
              multiple: false
              reorder: false
        media_player:
          name: "\U0001F3B6 Media Player"
          default: []
          selector:
            entity:
              filter:
              - domain:
                - media_player
              multiple: true
              reorder: false
    delay_settings:
      name: Delay Settings
      icon: mdi:clock-start
      collapsed: true
      input:
        num_delay_actions:
          name: ⌛ Delays
          description: Thời gian chờ sau khi hoàn thành tất cả các hành động
          selector:
            number:
              min: 5.0
              max: 120.0
              step: 5.0
              unit_of_measurement: seconds
              mode: slider
          default: 10
  source_url: https://raw.githubusercontent.com/TriTue2011/Blueprint/main/AI_Camera_Event_Summary_Zalo.yaml
variables:
  trigger_sensor: !input trigger_sensor
  person_sensor: !input person_occupancy_sensor
  person_detected_state: !input person_detected_state
  wait_for_person: !input wait_for_person
  max_wait_time: !input max_wait_time
  cooldown: !input cooldown
  camera_entities_list: !input camera_entities
  camera_entity: '{{ camera_entities_list[0] if camera_entities_list else '''' }}'
  camera_name: '{{ state_attr(camera_entity, "friendly_name") }}'
  camera_file_path: '{{ camera_entity.replace("camera.", "")}}'
  num_snapshots: !input num_snapshots
  num_delay_before_snapshot: !input num_delay_before_snapshot
  num_delay: !input num_delay
  overwrite_image: !input overwrite_image
  file_path: !input file_path
  ai_powered: !input ai_powered
  ai_provider: !input ai_provider
  ai_task_instructions: !input ai_task_instructions
  ai_structure_description: !input ai_structure_description
  include_notify: !input include_notify
  notify_device: !input notify_device
  is_ios_android: !input is_ios_android
  notify_title: !input notify_title
  tap_navigate: !input tap_navigate
  notification_time: !input notification_time
  filtered_devices: '{{ notify_device }}'
  
  include_telegram_notify: !input include_telegram_notify
  telegram_config_entry: !input telegram_config_entry
  telegram_target: !input telegram_target
  telegram_thread_id: !input telegram_thread_id
  telegram_initial_caption: !input telegram_initial_caption
  
  enable_zalo_bot: !input enable_zalo_bot
  zalo_bot_chat_id: !input zalo_bot_chat_id
  zalo_bot_initial_caption: !input zalo_bot_initial_caption
  
  # Zalo Custom Integration
  enable_zalo_custom: !input enable_zalo_custom
  zalo_custom_account: !input zalo_custom_account
  zalo_custom_thread_id: !input zalo_custom_thread_id
  zalo_custom_receiver_type: !input zalo_custom_receiver_type
  zalo_custom_ttl: !input zalo_custom_ttl
  zalo_custom_initial_caption: !input zalo_custom_initial_caption
  
  include_tts_announcement: !input include_tts_announcement
  num_volume_speaker: !input num_volume_speaker
  text_to_speech_engine: !input text_to_speech_engine
  media_player: !input media_player
  num_delay_actions: !input num_delay_actions
  snapshot_access_file_path: '{{ file_path | replace(''/config/www'', ''/local'')
    | replace(''/media'', ''/media/local'') }}'
  snapshot_access_file_path_social: '{{ file_path | replace(''/media/llmvision'',
    ''/media'') }}'
  tag: '{{ camera_entity + int(as_timestamp(now()))|string }}'
  notification_color: !input notification_color
  notification_color_hex: '#{{ ''%02x%02x%02x'' | format(notification_color[0], notification_color[1],
    notification_color[2]) }}'
max_exceeded: silent
mode: single
trigger:
- platform: state
  entity_id: !input trigger_sensor
  from: !input trigger_from_state
  to: !input trigger_to_state
condition:
- condition: and
  conditions: !input run_conditions
action:
- choose:
  - conditions:
    - condition: template
      value_template: '{{ wait_for_person and person_sensor | length > 0 }}'
    sequence:
    - if:
      - condition: state
        entity_id: !input person_occupancy_sensor
        state: !input person_detected_state
      then: []
      else:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ max_wait_time == 0 }}'
          sequence:
          - wait_for_trigger:
            - platform: state
              entity_id: !input person_occupancy_sensor
              to: !input person_detected_state
            continue_on_timeout: true
        - conditions:
          - condition: template
            value_template: '{{ max_wait_time > 0 }}'
          sequence:
          - wait_for_trigger:
            - platform: state
              entity_id: !input person_occupancy_sensor
              to: !input person_detected_state
            timeout:
              seconds: '{{ max_wait_time }}'
            continue_on_timeout: true
- variables:
    file_path_dynamic: "{% if overwrite_image %}\n  {{camera_file_path}}\n{% else
      %}\n  {{camera_file_path}}_{{context.id}}\n{% endif %}\n"
- delay:
    seconds: '{{ num_delay_before_snapshot }}'
- repeat:
    count: '{{ num_snapshots }}'
    sequence:
    - action: camera.snapshot
      data:
        filename: /media/snapshots/{{ file_path_dynamic }}_snapshot{{ repeat.index
          }}.jpg
      target:
        entity_id: '{{ camera_entity }}'
    - if:
      - condition: template
        value_template: '{{ repeat.index < num_snapshots }}'
      then:
      - delay:
          seconds: '{{ num_delay }}'
- variables:
    snapshots_url: "{% set snap_count = num_snapshots | int %} {% set camera = file_path_dynamic
      %} {% set ns = namespace(images=[]) %} {%- for i in range(1, snap_count + 1)
      -%}\n  {% set ns.images = ns.images + [{'media_content_id': 'media-source://media_source/local/snapshots/'
      ~ camera ~ '_snapshot' ~ i ~ '.jpg', 'media_content_type': 'image/jpeg'}] %}\n{%-
      endfor -%} {{ ns.images }}\n"
    snapshot_first: /media/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
- choose:
  - conditions:
    - condition: template
      value_template: '{{ include_telegram_notify }}'
    sequence:
    - alias: Gửi ảnh qua Telegram
      service: telegram_bot.send_photo
      data: "{% set data = {\n  'config_entry_id': telegram_config_entry,\n  'file':
        '/media/snapshots/' + file_path_dynamic + '_snapshot1.jpg',\n  'caption':
        telegram_initial_caption\n} %} {% if telegram_target != \"\" %}\n  {% set
        data = dict(data, target=telegram_target|int) %}\n{% endif %} {% if telegram_thread_id
        != \"\" %}\n  {% set data = dict(data, message_thread_id=telegram_thread_id|int)
        %}\n{% endif %} {{ data }}\n"
- choose:
  - conditions:
    - condition: template
      value_template: '{{ enable_zalo_bot }}'
    sequence:
    - alias: Gửi ảnh qua Zalo Bot (Pyscript)
      action: pyscript.send_zalo_photo
      data:
        chat_id: '{{ zalo_bot_chat_id }}'
        file_path: /media/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
        caption: '{{ zalo_bot_initial_caption }}'
      response_variable: zalo_bot_photo_response
- choose:
  - conditions:
    - condition: template
      value_template: '{{ enable_zalo_custom }}'
    - condition: template
      value_template: '{{ zalo_custom_thread_id | length > 0 }}'
    - condition: template
      value_template: '{{ zalo_custom_account | length > 0 }}'
    sequence:
    - alias: Gửi ảnh qua Zalo Custom Integration
      action: zalo_bot.send_image
      data:
        account_selection: !input zalo_custom_account
        thread_id: >
          {% if zalo_custom_thread_id is string %}
            {{ zalo_custom_thread_id }}
          {% else %}
            {{ zalo_custom_thread_id[0] }}
          {% endif %
        type: !input zalo_custom_receiver_type
        image_path: /media/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
        message: '{{ zalo_custom_initial_caption }}'
        ttl: !input zalo_custom_ttl
      response_variable: zalo_custom_image_response
- if:
  - condition: template
    value_template: '{{ include_notify and (filtered_devices | length > 0) }}'
  then:
  - choose:
    - alias: Check if Android
      conditions:
      - '{{ is_ios_android == ''android_device'' }}'
      sequence:
      - alias: Send initial notification to each device
        repeat:
          for_each: '{{ filtered_devices }}'
          sequence:
          - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify
              }}
            data:
              title: !input notify_title
              message: Đang phân tích...
              data:
                priority: high
                notification_icon: !input status_bar_icon
                color: '{{ notification_color_hex }}'
                image: '{{ snapshot_first }}'
                url: '{{ tap_navigate }}'
                clickAction: '{{ tap_navigate }}'
                tag: '{{ tag }}'
    - alias: Check if iOS
      conditions:
      - '{{ is_ios_android == ''ios_device'' }}'
      sequence:
      - alias: Send initial notification to each device
        repeat:
          for_each: '{{ filtered_devices }}'
          sequence:
          - action: notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify
              }}
            data:
              title: !input notify_title
              message: Đang phân tích...
              data:
                attachment:
                  url: '{{ snapshot_first }}'
                  content_type: JPEG
                tag: '{{ tag }}'
- choose:
  - alias: Check if AI is enabled
    conditions:
    - '{{ ai_powered }}'
    sequence:
    - action: ai_task.generate_data
      data:
        task_name: Phan tich anh khi co chuyen dong
        instructions: '{{ ai_task_instructions }}'
        entity_id: '{{ ai_provider }}'
        attachments: '{{ snapshots_url }}'
        structure:
          humans_detected:
            description: Đếm số người trong chuỗi ảnh
            required: true
            selector:
              number:
          humans_detected_description:
            description: '{{ ai_structure_description }}'
            required: true
            selector:
              text:
      response_variable: humans_detected_report
    - wait_template: '{{ humans_detected_report is defined and humans_detected_report.data
        is defined }}'
      timeout: 00:01:00
      continue_on_timeout: true
    - if:
      - condition: template
        value_template: '{{ wait.completed }}'
      then:
      - variables:
          ai_messages: "\U0001F4CD {{camera_name}} | \U0001F6B6: {{ humans_detected_report.data.humans_detected
            }}\n\U0001F3DE️\U0001F449 {{ humans_detected_report.data.humans_detected_description
            }}\n\U0001F552 {{now().strftime('%H:%M:%S %a, %d-%b-%Y')}}\n"
      - if:
        - condition: template
          value_template: '{{ not ( (humans_detected_report.data.humans_detected_description
            | default(''''))| lower | regex_search(''tuy nhiên không có người trong
            chuỗi ảnh|không có người|không có chuỗi hình ảnh nào được cung cấp'')
            and (humans_detected_report.data.humans_detected|int(0) == 0) ) }}'
        then:
        - if:
          - condition: template
            value_template: '{{ include_notify and (filtered_devices | length > 0)
              }}'
          then:
          - choose:
            - alias: Android - Update notification
              conditions:
              - '{{ is_ios_android == ''android_device'' }}'
              sequence:
              - repeat:
                  for_each: '{{ filtered_devices }}'
                  sequence:
                  - action: notify.mobile_app_{{ device_attr(repeat.item, 'name')
                      | slugify }}
                    data:
                      title: !input notify_title
                      message: '{{ ai_messages }}'
                      data:
                        priority: high
                        notification_icon: !input status_bar_icon
                        color: '{{ notification_color_hex }}'
                        image: '{{ snapshot_first }}'
                        url: '{{ tap_navigate }}'
                        clickAction: '{{ tap_navigate }}'
                        tag: '{{ tag }}'
            - alias: iOS - Update notification
              conditions:
              - '{{ is_ios_android == ''ios_device'' }}'
              sequence:
              - repeat:
                  for_each: '{{ filtered_devices }}'
                  sequence:
                  - action: notify.mobile_app_{{ device_attr(repeat.item, 'name')
                      | slugify }}
                    data:
                      title: !input notify_title
                      message: '{{ ai_messages }}'
                      data:
                        attachment:
                          url: '{{ snapshot_first }}'
                          content_type: JPEG
                        tag: '{{ tag }}'
        - if:
          - condition: template
            value_template: '{{ include_telegram_notify }}'
          then:
          - service: telegram_bot.send_message
            data: "{% set data = {\n  'config_entry_id': telegram_config_entry,\n
              \ 'message': '\U0001F4CA Phân tích AI:\\n\\n' ~ ai_messages\n} %} {%
              if telegram_target != \"\" %}\n  {% set data = dict(data, target=telegram_target|int)
              %}\n{% endif %} {% if telegram_thread_id != \"\" %}\n  {% set data =
              dict(data, message_thread_id=telegram_thread_id|int) %}\n{% endif %}
              {{ data }}\n"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ enable_zalo_bot }}'
            sequence:
            - alias: Gửi kết quả AI qua Zalo Bot (Pyscript)
              action: pyscript.send_zalo_message
              data:
                chat_id: '{{ zalo_bot_chat_id }}'
                message: "\U0001F4CA Phân tích AI:\n\n{{ ai_messages }}"
              response_variable: zalo_bot_message_response
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ enable_zalo_custom }}'
            - condition: template
              value_template: '{{ zalo_custom_thread_id | length > 0 }}'
            - condition: template
              value_template: '{{ zalo_custom_account | length > 0 }}'
            sequence:
            - alias: Gửi kết quả AI qua Zalo Custom Integration
              action: zalo_bot.send_message
              data:
                account_selection: !input zalo_custom_account
                thread_id: >
                  {% if zalo_custom_thread_id is string %}
                    {{ zalo_custom_thread_id }}
                  {% else %}
                    {{ zalo_custom_thread_id[0] }}
                  {% endif %
                type: !input zalo_custom_receiver_type
                message: "📊 Phân tích AI:\n\n{{ ai_messages }}"
                ttl: !input zalo_custom_ttl
              response_variable: zalo_custom_message_response
        - if:
          - condition: template
            value_template: '{{ include_tts_announcement }}'
          then:
          - alias: Send TTS to each speaker
            repeat:
              for_each: '{{ media_player }}'
              sequence:
              - action: media_player.volume_set
                data:
                  volume_level: '{{ num_volume_speaker }}'
                target:
                  entity_id: '{{ repeat.item }}'
              - action: tts.speak
                data:
                  entity_id: !input text_to_speech_engine
                  media_player_entity_id: '{{ repeat.item }}'
                  message: '{{ humans_detected_report.data.humans_detected_description
                    }}'
      else:
      - variables:
          error_message: "⚠️ AI phân tích ảnh chụp không thành công.\n\U0001F552 {{now().strftime('%H:%M:%S
            %a, %d-%b-%Y')}}\n"
      - if:
        - condition: template
          value_template: '{{ include_telegram_notify }}'
        then:
        - service: telegram_bot.send_message
          data: "{% set data = {\n  'config_entry_id': telegram_config_entry,\n  'message':
            error_message\n} %} {% if telegram_target != \"\" %}\n  {% set data =
            dict(data, target=telegram_target|int) %}\n{% endif %} {% if telegram_thread_id
            != \"\" %}\n  {% set data = dict(data, message_thread_id=telegram_thread_id|int)
            %}\n{% endif %} {{ data }}\n"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ enable_zalo_bot }}'
          sequence:
          - action: pyscript.send_zalo_message
            data:
              chat_id: '{{ zalo_bot_chat_id }}'
              message: '{{ error_message }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ enable_zalo_custom }}'
          - condition: template
            value_template: '{{ zalo_custom_thread_id | length > 0 }}'
          - condition: template
            value_template: '{{ zalo_custom_account | length > 0 }}'
          sequence:
          - action: zalo_bot.send_message
            data:
              account_selection: !input zalo_custom_account
              thread_id: >
                  {% if zalo_custom_thread_id is string %}
                    {{ zalo_custom_thread_id }}
                  {% else %}
                    {{ zalo_custom_thread_id[0] }}
                  {% endif %
              type: !input zalo_custom_receiver_type
              message: '{{ error_message }}'
              ttl: !input zalo_custom_ttl
- delay:
    seconds: '{{ num_delay_actions }}'
- delay: !input cooldown
