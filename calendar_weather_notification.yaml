blueprint:
  name: Thông báo lịch âm và thời tiết
  author: TriTue2011
  source_url: https://github.com/TriTue2011/Blueprint/blob/main/calendar_weather_notification.yaml
  description: >
    Tự động nhắc nhở các sự kiện âm lịch kèm theo thông tin thời tiết.
    Hỗ trợ gửi thông báo qua Mobile App, Telegram, Zalo Bot, Zalo Custom và TTS.
    - Tích hợp thông báo thời tiết
    - Bật/tắt riêng cho Lịch âm và Thời tiết
    - AI biên tập tin nhắn và TTS tự nhiên, sáng tạo mỗi ngày một kiểu khác nhau
    - Khi có sự kiện lịch: kết hợp cả lịch + thời tiết
    - Khi không có sự kiện: chỉ thông báo thời tiết


  domain: automation
  homeassistant:
    min_version: 2024.10.0

  input:
    notification_toggle:
      name: 🎛️ Bật/Tắt Thông Báo
      icon: mdi:toggle-switch
      collapsed: false
      input:
        enable_lunar_notification:
          name: ✅ Bật thông báo Lịch Âm
          description: Bật/tắt nhắc nhở sự kiện âm lịch
          default: true
          selector:
            boolean:

        enable_weather_notification:
          name: ✅ Bật thông báo Thời Tiết
          description: Bật/tắt thông báo thời tiết hàng ngày
          default: true
          selector:
            boolean:

    basic_settings:
      name: ⚙️ Cài đặt cơ bản - Lịch Âm
      icon: mdi:cog
      collapsed: false
      input:
        days_before:
          name: Nhắc trước bao nhiêu ngày
          description: Danh sách số ngày, ví dụ [15, 7, 5, 3, 1]
          default: [15, 7, 5, 3, 1]
          selector:
            object:

        notification_times:
          name: Các thời điểm thông báo
          description: >
            Danh sách thời gian trong ngày.
            Ví dụ: ["08:00:00", "20:00:00"]
          default: ["08:00:00"]
          selector:
            object:

        event_filter:
          name: Loại sự kiện
          description: Chọn loại sự kiện muốn nhận thông báo
          default: all
          selector:
            select:
              options:
                - label: "Tất cả sự kiện âm lịch"
                  value: "all"
                - label: "Chỉ ngày giỗ"
                  value: "gio"
                - label: "Chỉ Mồng 1 và Rằm"
                  value: "ngay_le"
                - label: "Tùy chỉnh - Chọn sensors cụ thể"
                  value: "custom"

        custom_sensors:
          name: Chọn sensors cụ thể
          description: Chỉ dùng khi chọn Tùy chỉnh ở trên
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: sensor

        include_description:
          name: Hiển thị mô tả chi tiết
          description: Bật để hiển thị thông tin âm lịch trong thông báo
          default: true
          selector:
            boolean:

        different_message_by_time:
          name: Thông báo khác nhau theo thời gian
          description: Bật để hiển thị emoji khác nhau vào sáng trưa tối
          default: true
          selector:
            boolean:

    weather_settings:
      name: 🌤️ Cài đặt Thời Tiết
      icon: mdi:weather-partly-cloudy
      collapsed: false
      input:
        weather_entity:
          name: Thực thể thời tiết
          description: Weather entity chính (weather.*)
          default: ""
          selector:
            entity:
              filter:
                - domain: weather

        temperature_sensor:
          name: Cảm biến nhiệt độ (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        humidity_sensor:
          name: Cảm biến độ ẩm (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: humidity

        wind_speed_sensor:
          name: Cảm biến tốc độ gió (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor

        aqi_sensor:
          name: AQI - Chỉ số chất lượng không khí (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: aqi

        pm25_sensor:
          name: PM2.5 (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor

    ai_settings:
      name: 🤖 AI Editing Settings
      icon: mdi:robot
      collapsed: false
      input:
        enable_ai_message_editing:
          name: ✅ Bật AI biên tập cho tin nhắn
          description: AI viết tin nhắn tự nhiên, sáng tạo mỗi ngày một kiểu
          default: true
          selector:
            boolean:

        enable_ai_tts_editing:
          name: ✅ Bật AI biên tập cho TTS
          description: AI viết lại nội dung TTS tự nhiên hơn
          default: true
          selector:
            boolean:

        enable_ai_weather_editing:
          name: ✅ Bật AI biên tập Thời Tiết
          description: AI viết thông báo thời tiết tự nhiên
          default: true
          selector:
            boolean:

        ai_task_entity:
          name: 🧠 AI Task Entity
          description: Entity AI task để biên tập
          default: []
          selector:
            entity:
              filter:
                - domain: ai_task

    mobile_app_section:
      name: 📱 Mobile App Settings
      icon: mdi:cellphone
      collapsed: true
      input:
        include_mobile_notify:
          name: ✅ Bật thông báo Mobile App
          default: false
          selector:
            boolean:

        is_ios_android:
          name: Loại thiết bị
          default: android_device
          selector:
            select:
              options:
                - label: Android
                  value: android_device
                - label: iOS
                  value: ios_device
              multiple: false

        notify_device:
          name: 📱 Thiết bị nhận thông báo
          default: []
          selector:
            device:
              filter:
                - integration: mobile_app
              multiple: true

        mobile_notification_icon:
          name: 🔔 Biểu tượng thông báo (Android)
          default: mdi:calendar-star
          selector:
            icon:

        mobile_notification_color:
          name: 🎨 Màu thông báo (Android)
          default: [255, 165, 0]
          selector:
            color_rgb:

        mobile_tap_action:
          name: 📲 Hành động khi nhấn
          default: /lovelace/calendar
          selector:
            text:

    telegram_section:
      name: ✈️ Telegram Settings
      icon: mdi:send
      collapsed: true
      input:
        include_telegram_notify:
          name: ✅ Bật thông báo Telegram
          default: false
          selector:
            boolean:

        telegram_config_entry:
          name: Telegram Bot
          default: ""
          selector:
            config_entry:
              integration: telegram_bot

        telegram_target:
          name: Target Chat ID
          default: ""
          selector:
            text:

        telegram_thread_id:
          name: Thread ID (Optional)
          default: ""
          selector:
            text:

    zalo_bot_section:
      name: 💬 Zalo Bot Settings (Pyscript)
      icon: mdi:chat
      collapsed: true
      input:
        enable_zalo_bot:
          name: ✅ Bật Zalo Bot
          description: Sử dụng pyscript để gửi thông báo
          default: false
          selector:
            boolean:

        zalo_bot_chat_id:
          name: Zalo Bot Chat ID
          default: ""
          selector:
            text:

    zalo_custom_section:
      name: 💬 Zalo Custom Integration Settings
      icon: mdi:chat-processing
      collapsed: true
      input:
        enable_zalo_custom:
          name: ✅ Bật Zalo Custom
          default: false
          selector:
            boolean:

        zalo_custom_account:
          name: 📱 Tài khoản Zalo
          description: Số điện thoại gửi tin nhắn
          default: ""
          selector:
            text:

        zalo_custom_thread_id:
          name: 💬 Thread ID (Nhóm)
          description: >
            ID của nhóm Zalo. Nhập dạng text để tránh mất độ chính xác
            với số lớn (VD: 3295299208151385728). Dùng khi Receiver Type = Group.
          default: ""
          selector:
            text:

        zalo_custom_user_id:
          name: 👤 User ID (Cá nhân)
          description: >
            ID của người nhận Zalo. Nhập dạng text để tránh mất độ chính xác
            với số lớn (VD: 3295299208151385728). Dùng khi Receiver Type = User.
          default: ""
          selector:
            text:

        zalo_custom_receiver_type:
          name: 👥 Loại người nhận
          default: "0"
          selector:
            select:
              options:
                - label: User (Cá nhân)
                  value: "0"
                - label: Group (Nhóm)
                  value: "1"

        zalo_custom_ttl:
          name: ⏱️ Message TTL (ms)
          description: Thời gian tự thu hồi (0 = không thu hồi)
          default: 0
          selector:
            number:
              min: 0
              max: 86400000
              step: 1000
              mode: slider

    tts_section:
      name: 🔊 TTS Speaker Settings
      icon: mdi:speaker
      collapsed: true
      input:
        include_tts_announcement:
          name: ✅ Bật thông báo TTS
          default: false
          selector:
            boolean:

        tts_volume:
          name: 🔊 Âm lượng
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              mode: slider

        tts_engine:
          name: 🗣️ TTS Engine
          default: []
          selector:
            entity:
              filter:
                - domain: tts
              multiple: false

        media_player:
          name: 🎶 Media Player
          default: []
          selector:
            entity:
              filter:
                - domain: media_player
              multiple: true

    custom_action_section:
      name: ⚡ Custom Action (Tùy chỉnh)
      icon: mdi:lightning-bolt
      collapsed: true
      input:
        enable_custom_action:
          name: ✅ Bật Custom Action
          default: false
          selector:
            boolean:

        custom_action_lunar:
          name: "🗓️ Hành động khi CÓ sự kiện lịch âm"
          description: "Biến dùng được: final_title, final_message"
          default: []
          selector:
            action:

        custom_action_weather:
          name: "🌤️ Hành động khi CHỈ có thời tiết"
          description: "Biến dùng được: weather_final_title, weather_final_message"
          default: []
          selector:
            action:

# ============================================================
# MODE
# ============================================================
mode: parallel
max_exceeded: silent

# ============================================================
# VARIABLES
# ============================================================
variables:
  enable_lunar_notification: !input enable_lunar_notification
  enable_weather_notification: !input enable_weather_notification

  days_before: !input days_before
  event_filter: !input event_filter
  custom_sensors: !input custom_sensors
  include_description: !input include_description
  different_message_by_time: !input different_message_by_time

  weather_entity: !input weather_entity
  temperature_sensor: !input temperature_sensor
  humidity_sensor: !input humidity_sensor
  wind_speed_sensor: !input wind_speed_sensor
  aqi_sensor: !input aqi_sensor
  pm25_sensor: !input pm25_sensor

  enable_ai_message_editing: !input enable_ai_message_editing
  enable_ai_tts_editing: !input enable_ai_tts_editing
  enable_ai_weather_editing: !input enable_ai_weather_editing
  ai_task_entity: !input ai_task_entity

  include_mobile_notify: !input include_mobile_notify
  is_ios_android: !input is_ios_android
  notify_device: !input notify_device
  mobile_notification_color: !input mobile_notification_color
  mobile_notification_color_hex: >
    {{ '#%02x%02x%02x' | format(
      mobile_notification_color[0],
      mobile_notification_color[1],
      mobile_notification_color[2]
    ) }}

  include_telegram_notify: !input include_telegram_notify
  telegram_config_entry: !input telegram_config_entry
  telegram_target: !input telegram_target
  telegram_thread_id: !input telegram_thread_id

  enable_zalo_bot: !input enable_zalo_bot
  zalo_bot_chat_id: !input zalo_bot_chat_id

  enable_zalo_custom: !input enable_zalo_custom
  zalo_custom_account: !input zalo_custom_account
  zalo_custom_thread_id: !input zalo_custom_thread_id
  zalo_custom_user_id: !input zalo_custom_user_id
  zalo_custom_receiver_type: !input zalo_custom_receiver_type
  zalo_custom_ttl: !input zalo_custom_ttl
  # [FIX] Resolve thread_id vs user_id theo receiver_type, ép string để tránh
  # mất độ chính xác số nguyên lớn khi Jinja2 cast sang float IEEE 754
  zalo_resolved_id: >
    {% if zalo_custom_receiver_type == '1' %}
      {{ zalo_custom_thread_id | string if zalo_custom_thread_id | length > 0 else '' }}
    {% else %}
      {{ zalo_custom_user_id | string if zalo_custom_user_id | length > 0 else '' }}
    {% endif %}

  include_tts_announcement: !input include_tts_announcement
  tts_volume: !input tts_volume
  tts_engine: !input tts_engine
  media_player: !input media_player

  enable_custom_action: !input enable_custom_action

# ============================================================
# TRIGGER
# ============================================================
trigger:
  - platform: time
    at: !input notification_times

# ============================================================
# CONDITION
# ============================================================
condition:
  - condition: template
    value_template: >
      {{ enable_lunar_notification or enable_weather_notification }}

# ============================================================
# ACTION
# ============================================================
action:

  # === THU THẬP DỮ LIỆU THỜI TIẾT ===
  - variables:
      weather_state: >
        {% if enable_weather_notification and weather_entity and weather_entity != '' %}
          {{ states(weather_entity) }}
        {% else %}{{ '' }}{% endif %}
      temperature: >
        {% if enable_weather_notification %}
          {% if temperature_sensor and temperature_sensor != '' %}
            {{ states(temperature_sensor) | float(0) | round(1) }}
          {% elif weather_entity and weather_entity != '' %}
            {{ state_attr(weather_entity, 'temperature') | float(0) | round(1) }}
          {% else %}0{% endif %}
        {% else %}0{% endif %}
      humidity: >
        {% if enable_weather_notification %}
          {% if humidity_sensor and humidity_sensor != '' %}
            {{ states(humidity_sensor) | float(0) | round(1) }}
          {% elif weather_entity and weather_entity != '' %}
            {{ state_attr(weather_entity, 'humidity') | float(0) | round(1) }}
          {% else %}0{% endif %}
        {% else %}0{% endif %}
      wind_speed: >
        {% if enable_weather_notification %}
          {% if wind_speed_sensor and wind_speed_sensor != '' %}
            {{ states(wind_speed_sensor) | float(0) | round(1) }}
          {% elif weather_entity and weather_entity != '' %}
            {{ state_attr(weather_entity, 'wind_speed') | float(0) | round(1) }}
          {% else %}0{% endif %}
        {% else %}0{% endif %}
      aqi: >
        {% if enable_weather_notification and aqi_sensor and aqi_sensor != '' %}
          {{ states(aqi_sensor) | int(0) }}
        {% else %}0{% endif %}
      pm25: >
        {% if enable_weather_notification and pm25_sensor and pm25_sensor != '' %}
          {{ states(pm25_sensor) | float(0) | round(1) }}
        {% else %}0{% endif %}

  # Gộp 2 lần iterate states.sensor thành 1 lần duy nhất
  - variables:
      lunar_scan_result: >
        {% set ns = namespace(found=false, ids=[]) %}
        {% if enable_lunar_notification %}
          {% set filter = event_filter %}
          {% set days = days_before %}
          {% if filter == 'custom' %}
            {% for entity_id in custom_sensors %}
              {% if states(entity_id) not in ['unknown', 'unavailable', 'none'] %}
                {% if state_attr(entity_id, 'days_until') != none %}
                  {% if (state_attr(entity_id, 'days_until') | int) in days %}
                    {% set ns.found = true %}
                    {% set ns.ids = ns.ids + [entity_id] %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% else %}
            {% for s in states.sensor %}
              {% if state_attr(s.entity_id, 'loaisukien') == 'lunar' %}
                {% if s.state not in ['unknown', 'unavailable', 'none'] %}
                  {% if state_attr(s.entity_id, 'days_until') != none %}
                    {% if (state_attr(s.entity_id, 'days_until') | int) in days %}
                      {% set match = (filter == 'all')
                        or (filter == 'gio' and 'gio_' in s.entity_id)
                        or (filter == 'ngay_le' and 'gio_' not in s.entity_id) %}
                      {% if match %}
                        {% set ns.found = true %}
                        {% set ns.ids = ns.ids + [s.entity_id] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
          {% endif %}
        {% endif %}
        {{ {'found': ns.found, 'ids': ns.ids} }}

      has_lunar_event: "{{ lunar_scan_result.found }}"
      sensor_entity_ids: "{{ lunar_scan_result.ids }}"

  # ============================================================
  # NHÁNH 1: CÓ SỰ KIỆN LỊCH ÂM
  # ============================================================
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ has_lunar_event and (sensor_entity_ids | length > 0) }}"
        sequence:
          - repeat:
              for_each: "{{ sensor_entity_ids }}"
              sequence:
                - variables:
                    event_name: "{{ state_attr(repeat.item, 'friendly_name') | default(repeat.item) }}"
                    days_until: "{{ state_attr(repeat.item, 'days_until') | int }}"
                    nearest_date: "{{ state_attr(repeat.item, 'nearest_date') | default('N/A') }}"
                    ngay_am: "{{ state_attr(repeat.item, 'ngayam') | default('') }}"
                    thang_am: "{{ state_attr(repeat.item, 'thangam') | default('') }}"
                    mota: "{{ state_attr(repeat.item, 'mota') | default('') }}"
                    hour: "{{ now().hour }}"
                    time_prefix: >
                      {% if different_message_by_time %}
                        {% if hour | int < 12 %}🌅
                        {% elif hour | int < 18 %}☀️
                        {% else %}🌙{% endif %}
                      {% else %}{% endif %}
                    original_title: >
                      {% set days = days_until | int %}
                      {% if days == 1 %}{{ time_prefix }}⚠️ NGÀY MAI: {{ event_name }}
                      {% elif days == 2 %}{{ time_prefix }}📅 Còn 2 ngày: {{ event_name }}
                      {% elif days == 3 %}{{ time_prefix }}📌 Còn 3 ngày: {{ event_name }}
                      {% elif days == 5 %}{{ time_prefix }}🔔 Còn 5 ngày: {{ event_name }}
                      {% elif days == 7 %}{{ time_prefix }}🗓️ Còn 7 ngày: {{ event_name }}
                      {% elif days == 15 %}{{ time_prefix }}📆 Còn 15 ngày: {{ event_name }}
                      {% else %}{{ time_prefix }}📆 Còn {{ days }} ngày: {{ event_name }}{% endif %}
                    original_message: >
                      {% if different_message_by_time %}
                        {% if hour | int < 12 %}Nhắc nhở buổi sáng
                        {% elif hour | int < 18 %}Nhắc nhở buổi trưa
                        {% else %}Nhắc nhở buổi tối{% endif %}

                      {% endif %}
                      📅 Ngày dương lịch: {{ nearest_date }}
                      {% if include_description and ngay_am %}
                      🌙 Ngày âm lịch: {{ ngay_am }}{% if thang_am %}/{{ thang_am }}{% endif %}
                      {% endif %}
                      {% if include_description and mota %}

                      {{ mota }}
                      {% endif %}
                    tag: "lunar_{{ repeat.item | replace('.', '_') }}_{{ days_until | int }}"

                # --- AI BIÊN TẬP TIN NHẮN ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ enable_ai_message_editing }}"
                      sequence:
                        - continue_on_error: true
                          action: ai_task.generate_data
                          data:
                            task_name: "msg_edit_{{ repeat.item | replace('.', '_') }}"
                            entity_id: "{{ ai_task_entity }}"
                            instructions: >
                              Viết một thông báo kết hợp Lịch Âm và Thời Tiết bằng tiếng Việt,
                              tự nhiên và sáng tạo như người thật viết, KHÔNG theo khuôn mẫu cố định.

                              THÔNG TIN ĐẦU VÀO:
                              Thứ: {{ now().strftime('%A') | replace('Monday','Thứ Hai') | replace('Tuesday','Thứ Ba') | replace('Wednesday','Thứ Tư') | replace('Thursday','Thứ Năm') | replace('Friday','Thứ Sáu') | replace('Saturday','Thứ Bảy') | replace('Sunday','Chủ Nhật') }}
                              Thời gian: {{ now().strftime('%H:%M') }} ngày {{ now().day }}/{{ now().month }}/{{ now().year }}
                              Buổi: {% if hour | int < 12 %}sáng{% elif hour | int < 18 %}chiều{% else %}tối{% endif %}

                              Thời tiết: {{ weather_state }}
                              Nhiệt độ: {{ temperature }}°C | Độ ẩm: {{ humidity }}% | Gió: {{ wind_speed }} km/h
                              {% if aqi > 0 %}AQI: {{ aqi }}{% endif %}
                              {% if pm25 > 0 %}PM2.5: {{ pm25 }}{% endif %}

                              Sự kiện: {{ event_name }}
                              Còn {{ days_until }} ngày | Ngày dương: {{ nearest_date }}
                              {% if ngay_am %}Âm lịch: {{ ngay_am }}{% if thang_am %}/{{ thang_am }}{% endif %}{% endif %}
                              {% if mota %}Mô tả: {{ mota }}{% endif %}

                              NHIỆM VỤ:
                              Viết thông báo hoàn toàn tự nhiên, sáng tạo, KHÔNG theo khuôn mẫu cố định.
                              Lồng ghép lịch và thời tiết linh hoạt, có cảm xúc.
                              Mỗi lần tạo phải KHÁC nhau về cách mở đầu, dẫn dắt, kết thúc.

                              NỘI DUNG CẦN ĐỦ (lồng ghép tự nhiên):
                              - Lời chào + buổi + thứ + cảm nhận thời tiết
                              - Nhiệt độ, độ ẩm, gợi ý trang phục/đồ dùng
                              - AQI/PM2.5 nếu có, khuyến cáo sức khỏe
                              - Nhắc sự kiện lịch: tên + ngày dương + âm lịch + số ngày còn lại
                              - Câu kết động viên hoặc nhắc nhở phù hợp

                              YÊU CẦU FORMAT:
                              ✅ GIỮ emoji phù hợp
                              ✅ Xuống dòng hợp lý, dễ đọc trên điện thoại
                              ✅ Độ dài 5-8 dòng
                              ✅ Tiêu đề ngắn gọn, có emoji, gây chú ý
                            structure:
                              title:
                                description: Tiêu đề thông báo (1 dòng, có emoji)
                                required: true
                                selector:
                                  text: null
                              message:
                                description: Nội dung thông báo (5-8 dòng, có emoji, tự nhiên)
                                required: true
                                selector:
                                  text: null
                          response_variable: msg_edit_result

                        - wait_template: >
                            {{ msg_edit_result is defined
                               and msg_edit_result.data is defined
                               and msg_edit_result.data.title is defined
                               and msg_edit_result.data.message is defined }}
                          timeout: "00:01:00"
                          continue_on_timeout: true

                        - variables:
                            final_title: >
                              {% if wait.completed %}{{ msg_edit_result.data.title | trim }}
                              {% else %}{{ original_title }}{% endif %}
                            final_message: >
                              {% if wait.completed %}{{ msg_edit_result.data.message | trim }}
                              {% else %}{{ original_message }}{% endif %}

                  default:
                    - variables:
                        final_title: "{{ original_title }}"
                        final_message: "{{ original_message }}"

                # --- GỬI MOBILE ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ include_mobile_notify and (notify_device | length > 0) }}"
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ is_ios_android == 'android_device' }}"
                              sequence:
                                - repeat:
                                    for_each: "{{ notify_device }}"
                                    sequence:
                                      - continue_on_error: true
                                        action: >
                                          notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                        data:
                                          title: "{{ final_title }}"
                                          message: "{{ final_message }}"
                                          data:
                                            priority: high
                                            notification_icon: !input mobile_notification_icon
                                            color: "{{ mobile_notification_color_hex }}"
                                            url: !input mobile_tap_action
                                            clickAction: !input mobile_tap_action
                                            tag: "{{ tag }}"
                            - conditions:
                                - condition: template
                                  value_template: "{{ is_ios_android == 'ios_device' }}"
                              sequence:
                                - repeat:
                                    for_each: "{{ notify_device }}"
                                    sequence:
                                      - continue_on_error: true
                                        action: >
                                          notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                        data:
                                          title: "{{ final_title }}"
                                          message: "{{ final_message }}"
                                          data:
                                            tag: "{{ tag }}"

                # --- GỬI TELEGRAM ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ include_telegram_notify and telegram_config_entry != '' }}"
                      sequence:
                        - continue_on_error: true
                          action: telegram_bot.send_message
                          data: >
                            {% set data = {
                              'config_entry_id': telegram_config_entry,
                              'message': final_title ~ '\n\n' ~ final_message
                            } %}
                            {% if telegram_target != '' %}
                              {% set data = dict(data, target=telegram_target | int) %}
                            {% endif %}
                            {% if telegram_thread_id != '' %}
                              {% set data = dict(data, message_thread_id=telegram_thread_id | int) %}
                            {% endif %}
                            {{ data }}

                # --- GỬI ZALO BOT ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ enable_zalo_bot and zalo_bot_chat_id != '' }}"
                      sequence:
                        - continue_on_error: true
                          action: pyscript.send_zalo_message
                          data:
                            chat_id: "{{ zalo_bot_chat_id }}"
                            message: "{{ final_title }}\n\n{{ final_message }}"

                # --- GỬI ZALO CUSTOM ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ enable_zalo_custom
                               and zalo_resolved_id | trim | length > 0
                               and zalo_custom_account | length > 0 }}
                      sequence:
                        - alias: "Gửi lịch âm qua Zalo Custom"
                          continue_on_error: true
                          action: zalo_bot.send_message
                          data:
                            account_selection: !input zalo_custom_account
                            thread_id: "{{ zalo_resolved_id | trim | string }}"
                            type: "{{ zalo_custom_receiver_type }}"
                            message: "{{ final_title }}\n\n{{ final_message }}"
                            ttl: "{{ zalo_custom_ttl }}"

                # --- TTS CÓ LỊCH ÂM ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ include_tts_announcement and (media_player | length > 0) }}"
                      sequence:
                        - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ enable_ai_tts_editing }}"
                              sequence:
                                - continue_on_error: true
                                  action: ai_task.generate_data
                                  data:
                                    task_name: "tts_edit_{{ repeat.item | replace('.', '_') }}"
                                    entity_id: "{{ ai_task_entity }}"
                                    instructions: >
                                      Viết một đoạn thông báo TTS bằng tiếng Việt, giọng thân thiện,
                                      tự nhiên như người thật đang nói chuyện.

                                      THÔNG TIN ĐẦU VÀO:
                                      Thứ: {{ now().strftime('%A') | replace('Monday','Thứ Hai') | replace('Tuesday','Thứ Ba') | replace('Wednesday','Thứ Tư') | replace('Thursday','Thứ Năm') | replace('Friday','Thứ Sáu') | replace('Saturday','Thứ Bảy') | replace('Sunday','Chủ Nhật') }}
                                      Thời gian: {{ now().strftime('%H') }} giờ {{ now().strftime('%M') }} phút
                                      Ngày: {{ now().day }} tháng {{ now().month }} năm {{ now().year }}
                                      Buổi: {% if now().hour < 12 %}sáng{% elif now().hour < 18 %}chiều{% else %}tối{% endif %}
                                      Thời tiết: {{ weather_state }}
                                      Nhiệt độ: {{ temperature }}°C | Độ ẩm: {{ humidity }}% | Gió: {{ wind_speed }} km/h
                                      {% if aqi > 0 %}AQI: {{ aqi }}{% endif %}
                                      {% if pm25 > 0 %}PM2.5: {{ pm25 }}{% endif %}
                                      Sự kiện: {{ event_name }}
                                      Còn {{ days_until }} ngày (ngày {{ nearest_date }})
                                      {% if ngay_am %}Âm lịch: {{ ngay_am }}{% if thang_am %}/{{ thang_am }}{% endif %}{% endif %}
                                      {% if mota %}Mô tả: {{ mota }}{% endif %}

                                      YÊU CẦU BẮT BUỘC:
                                      ❌ KHÔNG dùng emoji, KHÔNG xuống dòng, KHÔNG ký hiệu đặc biệt (°, %, /)
                                      ✅ Chuyển TẤT CẢ số thành chữ
                                      ✅ Chuyển ký hiệu thành chữ (°C → độ C, % → phần trăm, km/h → ki-lô-mét trên giờ)
                                      ✅ Độ dài 5-8 câu, một đoạn liền mạch
                                      ✅ Mỗi lần tạo phải KHÁC so với lần trước
                                    structure:
                                      tts_text:
                                        description: Nội dung TTS, một đoạn liền mạch
                                        required: true
                                        selector:
                                          text: null
                                  response_variable: tts_edit_result

                                - wait_template: >
                                    {{ tts_edit_result is defined
                                       and tts_edit_result.data is defined
                                       and tts_edit_result.data.tts_text is defined }}
                                  timeout: "00:01:00"
                                  continue_on_timeout: true

                                - variables:
                                    tts_final_text: >
                                      {% if wait.completed %}{{ tts_edit_result.data.tts_text | trim }}
                                      {% else %}{{ event_name }}. {{ original_message }}{% endif %}

                          default:
                            - variables:
                                tts_final_text: "{{ event_name }}. {{ original_message }}"

                        - repeat:
                            for_each: "{{ media_player }}"
                            sequence:
                              - continue_on_error: true
                                action: media_player.volume_set
                                data:
                                  volume_level: "{{ tts_volume }}"
                                target:
                                  entity_id: "{{ repeat.item }}"
                              - continue_on_error: true
                                action: tts.speak
                                target:
                                  entity_id: "{{ tts_engine }}"
                                data:
                                  media_player_entity_id: "{{ repeat.item }}"
                                  message: "{{ tts_final_text }}"

                # --- CUSTOM ACTION CÓ LỊCH ÂM ---
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ enable_custom_action }}"
                      sequence: !input custom_action_lunar

  # ============================================================
  # NHÁNH 2: KHÔNG CÓ SỰ KIỆN LỊCH - CHỈ THỜI TIẾT
  # ============================================================
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ not has_lunar_event and enable_weather_notification }}"
        sequence:
          - variables:
              hour: "{{ now().hour }}"
              time_prefix: >
                {% if different_message_by_time %}
                  {% if hour | int < 12 %}🌅
                  {% elif hour | int < 18 %}☀️
                  {% else %}🌙{% endif %}
                {% else %}{% endif %}
              weather_title_base: >
                {% if hour | int < 12 %}{{ time_prefix }} DỰ BÁO THỜI TIẾT BUỔI SÁNG
                {% elif hour | int < 18 %}{{ time_prefix }} DỰ BÁO THỜI TIẾT BUỔI CHIỀU
                {% else %}{{ time_prefix }} DỰ BÁO THỜI TIẾT BUỔI TỐI{% endif %}
              weather_message_base: >
                🌤️ Tình trạng: {{ weather_state }}
                🌡️ Nhiệt độ: {{ temperature }}°C
                💧 Độ ẩm: {{ humidity }}%
                💨 Gió: {{ wind_speed }} km/h
                {% if aqi > 0 %}🏭 AQI: {{ aqi }}{% endif %}
                {% if pm25 > 0 %}⚠️ PM2.5: {{ pm25 }}{% endif %}

          # --- AI BIÊN TẬP TIN NHẮN THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ enable_ai_weather_editing }}"
                sequence:
                  - continue_on_error: true
                    action: ai_task.generate_data
                    data:
                      task_name: "weather_only_edit"
                      entity_id: "{{ ai_task_entity }}"
                      instructions: >
                        Viết một thông báo thời tiết bằng tiếng Việt, tự nhiên và sáng tạo
                        như người thật viết, KHÔNG theo khuôn mẫu cố định.

                        THÔNG TIN ĐẦU VÀO:
                        Thứ: {{ now().strftime('%A') | replace('Monday','Thứ Hai') | replace('Tuesday','Thứ Ba') | replace('Wednesday','Thứ Tư') | replace('Thursday','Thứ Năm') | replace('Friday','Thứ Sáu') | replace('Saturday','Thứ Bảy') | replace('Sunday','Chủ Nhật') }}
                        Thời gian: {{ now().strftime('%H:%M') }} ngày {{ now().day }}/{{ now().month }}/{{ now().year }}
                        Buổi: {% if hour | int < 12 %}sáng{% elif hour | int < 18 %}chiều{% else %}tối{% endif %}
                        Thời tiết: {{ weather_state }}
                        Nhiệt độ: {{ temperature }}°C | Độ ẩm: {{ humidity }}% | Gió: {{ wind_speed }} km/h
                        {% if aqi > 0 %}AQI: {{ aqi }}{% endif %}
                        {% if pm25 > 0 %}PM2.5: {{ pm25 }}{% endif %}

                        YÊU CẦU FORMAT:
                        ✅ GIỮ emoji phù hợp
                        ✅ Xuống dòng hợp lý, dễ đọc trên điện thoại
                        ✅ Độ dài 4-6 dòng, tiêu đề ngắn gọn có emoji
                        ✅ Mỗi lần tạo KHÁC về cách mở đầu và dẫn dắt
                      structure:
                        title:
                          description: Tiêu đề (1 dòng, có emoji)
                          required: true
                          selector:
                            text: null
                        message:
                          description: Nội dung (4-6 dòng, có emoji, tự nhiên)
                          required: true
                          selector:
                            text: null
                    response_variable: weather_edit_result

                  - wait_template: >
                      {{ weather_edit_result is defined
                         and weather_edit_result.data is defined
                         and weather_edit_result.data.title is defined
                         and weather_edit_result.data.message is defined }}
                    timeout: "00:01:00"
                    continue_on_timeout: true

                  - variables:
                      weather_final_title: >
                        {% if wait.completed %}{{ weather_edit_result.data.title | trim }}
                        {% else %}{{ weather_title_base }}{% endif %}
                      weather_final_message: >
                        {% if wait.completed %}{{ weather_edit_result.data.message | trim }}
                        {% else %}{{ weather_message_base }}{% endif %}

            default:
              - variables:
                  weather_final_title: "{{ weather_title_base }}"
                  weather_final_message: "{{ weather_message_base }}"

          # --- GỬI MOBILE THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ include_mobile_notify and (notify_device | length > 0) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ is_ios_android == 'android_device' }}"
                        sequence:
                          - repeat:
                              for_each: "{{ notify_device }}"
                              sequence:
                                - continue_on_error: true
                                  action: >
                                    notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                  data:
                                    title: "{{ weather_final_title }}"
                                    message: "{{ weather_final_message }}"
                                    data:
                                      priority: high
                                      notification_icon: !input mobile_notification_icon
                                      color: "{{ mobile_notification_color_hex }}"
                                      url: !input mobile_tap_action
                                      clickAction: !input mobile_tap_action
                                      tag: "weather_only"
                      - conditions:
                          - condition: template
                            value_template: "{{ is_ios_android == 'ios_device' }}"
                        sequence:
                          - repeat:
                              for_each: "{{ notify_device }}"
                              sequence:
                                - continue_on_error: true
                                  action: >
                                    notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                  data:
                                    title: "{{ weather_final_title }}"
                                    message: "{{ weather_final_message }}"
                                    data:
                                      tag: "weather_only"

          # --- GỬI TELEGRAM THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ include_telegram_notify and telegram_config_entry != '' }}"
                sequence:
                  - continue_on_error: true
                    action: telegram_bot.send_message
                    data: >
                      {% set data = {
                        'config_entry_id': telegram_config_entry,
                        'message': weather_final_title ~ '\n\n' ~ weather_final_message
                      } %}
                      {% if telegram_target != '' %}
                        {% set data = dict(data, target=telegram_target | int) %}
                      {% endif %}
                      {% if telegram_thread_id != '' %}
                        {% set data = dict(data, message_thread_id=telegram_thread_id | int) %}
                      {% endif %}
                      {{ data }}

          # --- GỬI ZALO BOT THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ enable_zalo_bot and zalo_bot_chat_id != '' }}"
                sequence:
                  - continue_on_error: true
                    action: pyscript.send_zalo_message
                    data:
                      chat_id: "{{ zalo_bot_chat_id }}"
                      message: "{{ weather_final_title }}\n\n{{ weather_final_message }}"

          # --- GỬI ZALO CUSTOM THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ enable_zalo_custom
                         and zalo_resolved_id | trim | length > 0
                         and zalo_custom_account | length > 0 }}
                sequence:
                  - alias: "Gửi thời tiết qua Zalo Custom"
                    continue_on_error: true
                    action: zalo_bot.send_message
                    data:
                      account_selection: !input zalo_custom_account
                      thread_id: "{{ zalo_resolved_id | trim | string }}"
                      type: "{{ zalo_custom_receiver_type }}"
                      message: "{{ weather_final_title }}\n\n{{ weather_final_message }}"
                      ttl: "{{ zalo_custom_ttl }}"

          # --- TTS CHỈ THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ include_tts_announcement and (media_player | length > 0) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ enable_ai_tts_editing }}"
                        sequence:
                          - continue_on_error: true
                            action: ai_task.generate_data
                            data:
                              task_name: "tts_weather_only"
                              entity_id: "{{ ai_task_entity }}"
                              instructions: >
                                Viết một đoạn thông báo TTS thời tiết bằng tiếng Việt, giọng thân thiện,
                                tự nhiên như người thật đang nói chuyện, một đoạn liền mạch không xuống dòng.

                                THÔNG TIN ĐẦU VÀO:
                                Thứ: {{ now().strftime('%A') | replace('Monday','Thứ Hai') | replace('Tuesday','Thứ Ba') | replace('Wednesday','Thứ Tư') | replace('Thursday','Thứ Năm') | replace('Friday','Thứ Sáu') | replace('Saturday','Thứ Bảy') | replace('Sunday','Chủ Nhật') }}
                                Thời gian: {{ now().strftime('%H') }} giờ {{ now().strftime('%M') }} phút
                                Ngày: {{ now().day }} tháng {{ now().month }} năm {{ now().year }}
                                Buổi: {% if hour | int < 12 %}sáng{% elif hour | int < 18 %}chiều{% else %}tối{% endif %}
                                Thời tiết: {{ weather_state }}
                                Nhiệt độ: {{ temperature }}°C | Độ ẩm: {{ humidity }}% | Gió: {{ wind_speed }} km/h
                                {% if aqi > 0 %}AQI: {{ aqi }}{% endif %}
                                {% if pm25 > 0 %}PM2.5: {{ pm25 }}{% endif %}

                                YÊU CẦU BẮT BUỘC:
                                ❌ KHÔNG dùng emoji, KHÔNG xuống dòng, KHÔNG ký hiệu đặc biệt
                                ✅ Chuyển TẤT CẢ số và ký hiệu thành chữ
                                ✅ Độ dài 4-6 câu, một đoạn liền mạch
                                ✅ Mỗi lần tạo phải KHÁC so với lần trước
                              structure:
                                tts_text:
                                  description: Nội dung TTS, một đoạn liền mạch
                                  required: true
                                  selector:
                                    text: null
                            response_variable: tts_weather_result

                          - wait_template: >
                              {{ tts_weather_result is defined
                                 and tts_weather_result.data is defined
                                 and tts_weather_result.data.tts_text is defined }}
                            timeout: "00:01:00"
                            continue_on_timeout: true

                          - variables:
                              tts_weather_final: >
                                {% if wait.completed %}{{ tts_weather_result.data.tts_text | trim }}
                                {% else %}{{ weather_message_base }}{% endif %}

                    default:
                      - variables:
                          tts_weather_final: "{{ weather_message_base }}"

                  - repeat:
                      for_each: "{{ media_player }}"
                      sequence:
                        - continue_on_error: true
                          action: media_player.volume_set
                          data:
                            volume_level: "{{ tts_volume }}"
                          target:
                            entity_id: "{{ repeat.item }}"
                        - continue_on_error: true
                          action: tts.speak
                          target:
                            entity_id: "{{ tts_engine }}"
                          data:
                            media_player_entity_id: "{{ repeat.item }}"
                            message: "{{ tts_weather_final }}"

          # --- CUSTOM ACTION CHỈ THỜI TIẾT ---
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ enable_custom_action }}"
                sequence: !input custom_action_weather
