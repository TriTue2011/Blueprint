blueprint:
  name: Tạo ảnh thời tiết bằng ai (Gemini Optimized)
  author: TriTue2011
  source_url: https://github.com/TriTue2011/Blueprint/blob/main/ai_creat_image_weather.yaml
  description: >
    Tự động tạo ảnh thời tiết bằng Gemini AI với prompt tối ưu, phong cảnh thay đổi theo buổi trong ngày và dữ liệu thời tiết thực tế.

    <details>
    <summary><b>Chi tiết:</b> - Nhấn để mở rộng</summary>

      **Phiên bản: v.2025.10.22 - Gemini Optimized Edition**

      **Tác giả: TriTue2011**

      **Tính năng:**

        1- **Prompt tối ưu cho Gemini:** Chi tiết, giàu hình ảnh, không giới hạn ký tự, dùng dấu chấm làm phân cách để Gemini hiểu đúng ngữ cảnh.

        2- **Phong cảnh thay đổi theo buổi:** Sáng → ruộng lúa nông thôn / Trưa → làng chài ven biển / Chiều → phố cổ đèn lồng / Tối → thung lũng Sapa / Đêm → bản làng núi rừng huyền bí.

        3- **Lighting đặt đầu prompt:** Gemini ưu tiên đúng thời điểm ngày/đêm, tránh tạo ảnh sai buổi.

        4- **Dữ liệu thời tiết thực tế:** Nhiệt độ, độ ẩm, tốc độ gió, AQI/PM2.5 ảnh hưởng trực tiếp đến hình ảnh tạo ra.

        5- **Ba phong cách ảnh:** Photorealistic / Artistic / Vibrant — mỗi phong cách tạo ra kết quả khác biệt rõ ràng.

        6- **Lưu ảnh tự động:** Hỗ trợ tên file cố định (ghi đè) hoặc theo timestamp. Tích hợp shell_command để di chuyển file.

      **Thay đổi so với phiên bản gốc:**
        - Bỏ hoàn toàn tính năng ảnh nền để đơn giản hóa cấu hình.
        - Prompt được xây dựng lại từ đầu, tối ưu riêng cho Gemini.
        - Thêm khối style_fx tích hợp trực tiếp vào prompt thay vì chỉ là ghi chú.
        - Thêm nhận diện buổi Trưa (noon) bên cạnh Sáng/Chiều/Tối/Đêm.
        - Camera Hasselblad 24mm, chất lượng National Geographic, 8K detail.

    </details>

    <details>
    <summary><b>⚙️ Yêu cầu cấu hình:</b> - Nhấn để mở rộng</summary>

      **Bước 1 — Cấu hình lưu ảnh (chọn 1 trong 2 cách):**

      **Cách 1 — Shell Command dùng với Gemini AI Task (Khuyến nghị):**

      Thêm vào `configuration.yaml`:
      ```yaml
      shell_command:
        copy_weather_image: >
          mv "{{ source }}" "{{ destination }}"
      ```

      ⚠️ Dùng `mv` thay vì `cp` — vừa di chuyển vừa xóa ảnh gốc trong 1 bước, tránh tích lũy file thừa.

      **Cách 2 — NVIDIA API qua PyScript:**

      Thêm vào `configuration.yaml`:
      ```yaml
      pyscript:
        allow_all_imports: true
        hass_is_global: true
        nvidia_api_key: !secret nvidia_api_key
      ```

      Thêm vào `secrets.yaml`:
      ```yaml
      nvidia_api_key: "nvapi-xxx"
      ```

      Tải file script Python tại:
      https://github.com/TriTue2011/Blueprint/blob/main/scripts/weather_image.py

      Đặt file vào thư mục `pyscript/` trong config Home Assistant.

      Hướng dẫn cài PyScript qua HACS:
      https://github.com/custom-components/pyscript

      ---

      **Bước 2 — Tạo Template Sensor nhận diện buổi trong ngày:**

      Thêm vào `configuration.yaml` (hoặc file template riêng):
      ```yaml
      template:
        - sensor:
            - name: "Buổi trong ngày"
              unique_id: time_of_day_vn
              icon: >-
                {% set h = now().hour %}
                {% if 6 <= h < 11 %} mdi:weather-sunny
                {% elif 11 <= h < 13 %} mdi:white-balance-sunny
                {% elif 13 <= h < 18 %} mdi:weather-sunset
                {% elif 18 <= h < 21 %} mdi:weather-night
                {% else %} mdi:weather-night
                {% endif %}
              state: >-
                {% set h = now().hour %}
                {% if 6 <= h < 11 %} Sáng
                {% elif 11 <= h < 13 %} Trưa
                {% elif 13 <= h < 18 %} Chiều
                {% elif 18 <= h < 21 %} Tối
                {% else %} Đêm
                {% endif %}
              attributes:
                hour: "{{ now().hour }}"
                is_night: >-
                  {% set h = now().hour %}
                  {{ h < 6 or h >= 21 }}
                is_daytime: >-
                  {% set h = now().hour %}
                  {{ h >= 6 and h < 18 }}
                period_english: >-
                  {% set h = now().hour %}
                  {% if 6 <= h < 11 %} Morning
                  {% elif 11 <= h < 13 %} Noon
                  {% elif 13 <= h < 18 %} Afternoon
                  {% elif 18 <= h < 21 %} Evening
                  {% else %} Night
                  {% endif %}
      ```

      ⚠️ Sau khi thêm, **restart Home Assistant** rồi chọn `sensor.buoi_trong_ngay` ở mục **Pha thời gian trong ngày** bên dưới.

    </details>
  domain: automation
  homeassistant:
    min_version: 2025.10.0

  input:
    # ===== CÀI ĐẶT THỜI TIẾT =====
    weather_sensors:
      name: "🌤️ Cảm biến thời tiết"
      icon: mdi:weather-partly-cloudy
      collapsed: false
      input:
        time_phase_sensor:
          name: Pha thời gian trong ngày
          description: Sensor hiển thị buổi trong ngày (Sáng/Trưa/Chiều/Tối/Đêm)
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

        weather_entity:
          name: Thực thể thời tiết
          description: Weather entity chính (weather.*)
          selector:
            entity:
              filter:
                - domain: weather
              multiple: false

        temperature_sensor:
          name: Cảm biến nhiệt độ (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
              multiple: false

        humidity_sensor:
          name: Cảm biến độ ẩm (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: humidity
              multiple: false

        wind_speed_sensor:
          name: Cảm biến tốc độ gió (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

        pressure_sensor:
          name: Cảm biến áp suất (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

    # ===== CHẤT LƯỢNG KHÔNG KHÍ =====
    air_quality_sensors:
      name: "🏭 Cảm biến chất lượng không khí"
      icon: mdi:air-filter
      collapsed: true
      input:
        aqi_sensor:
          name: AQI - Chỉ số chất lượng không khí (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: aqi
              multiple: false

        pm25_sensor:
          name: PM2.5 (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

    # ===== CÀI ĐẶT AI =====
    ai_settings:
      name: "🤖 Cài đặt AI"
      icon: mdi:robot-outline
      collapsed: false
      input:
        ai_task_entity:
          name: AI Task Entity
          description: Chọn AI entity hỗ trợ tạo ảnh (Gemini 2.5 Flash Image recommended)
          default: []
          selector:
            entity:
              domain: ai_task
              multiple: false

        image_style:
          name: Phong cách ảnh
          default: photorealistic
          selector:
            select:
              options:
                - label: Ảnh chụp chân thực (Photorealistic)
                  value: photorealistic
                - label: Phong cách nghệ thuật (Artistic)
                  value: artistic
                - label: Phong cách sống động (Vibrant)
                  value: vibrant

    # ===== LƯU ẢNH =====
    output_settings:
      name: "💾 Cài đặt lưu ảnh"
      icon: mdi:content-save
      collapsed: true
      input:
        save_image:
          name: Lưu ảnh vào thư mục
          description: |
            ⚠️ Yêu cầu: Phải khai báo shell_command trong configuration.yaml:
            shell_command:
              copy_weather_image: mv "{{ source }}" "{{ destination }}"
            💡 Dùng mv thay vì cp — vừa copy vừa xóa ảnh gốc cùng lúc.
          default: true
          selector:
            boolean:

        output_directory:
          name: Thư mục đầu ra
          default: "/config/media/weather"
          selector:
            text:

        use_fixed_filename:
          name: Sử dụng tên file cố định
          description: Bật để ghi đè file cũ
          default: true
          selector:
            boolean:

        fixed_filename:
          name: Tên file cố định
          description: Tên file khi dùng chế độ cố định
          default: "weather_current"
          selector:
            text:

        filename_prefix:
          name: Tiền tố tên file
          description: Tiền tố khi tạo file mới (dùng khi tên file không cố định)
          default: "weather_"
          selector:
            text:

        file_extension:
          name: Phần mở rộng file
          default: "png"
          selector:
            select:
              options:
                - png
                - jpg
                - jpeg
                - webp

        delete_ai_image:
          name: Xóa ảnh AI sau khi lưu
          description: |
            Tự động xóa ảnh do AI tạo sau khi copy xong.
            💡 Nếu dùng mv trong copy_weather_image thì ảnh gốc đã bị xóa tự động.
            Tùy chọn này dùng delete.file integration (HACS) như một bước dự phòng.
            ⚠️ Yêu cầu: Cài đặt integration delete-file-home-assistant qua HACS.
          default: false
          selector:
            boolean:

# ===== TRIGGER =====
trigger:
  - platform: state
    entity_id: !input time_phase_sensor

# ===== CONDITIONS =====
condition: []

# ===== ACTIONS =====
action:
  # === THU THẬP DỮ LIỆU THỜI TIẾT ===
  - variables:
      time_phase_sensor: !input time_phase_sensor
      tp: "{{ states(time_phase_sensor) | lower }}"
      weather_entity: !input weather_entity
      w: "{{ states(weather_entity) | lower }}"

      # Nhiệt độ
      temperature_sensor: !input temperature_sensor
      temp: >-
        {% if temperature_sensor and temperature_sensor != '' and states(temperature_sensor) not in ['unknown','unavailable',''] %}
          {{ states(temperature_sensor) | float(30) | round(1) }}
        {% else %}
          {{ state_attr(weather_entity, 'temperature') | float(30) | round(1) }}
        {% endif %}

      # Độ ẩm
      humidity_sensor: !input humidity_sensor
      hum: >-
        {% if humidity_sensor and humidity_sensor != '' and states(humidity_sensor) not in ['unknown','unavailable',''] %}
          {{ states(humidity_sensor) | int(70) }}
        {% else %}
          {{ state_attr(weather_entity, 'humidity') | int(70) }}
        {% endif %}

      # Gió
      wind_speed_sensor: !input wind_speed_sensor
      wind: >-
        {% if wind_speed_sensor and wind_speed_sensor != '' and states(wind_speed_sensor) not in ['unknown','unavailable',''] %}
          {{ states(wind_speed_sensor) | float(5) | round(1) }}
        {% else %}
          {{ state_attr(weather_entity, 'wind_speed') | float(5) | round(1) }}
        {% endif %}

      # Áp suất
      pressure_sensor: !input pressure_sensor
      pressure: >-
        {% if pressure_sensor and pressure_sensor != '' and states(pressure_sensor) not in ['unknown','unavailable',''] %}
          {{ states(pressure_sensor) | float(0) | round(0) }}
        {% else %}
          {{ state_attr(weather_entity, 'pressure') | float(0) | round(0) }}
        {% endif %}

      # Chất lượng không khí
      aqi_sensor: !input aqi_sensor
      aqi: >-
        {% if aqi_sensor and aqi_sensor != '' and states(aqi_sensor) not in ['unknown','unavailable',''] %}
          {{ states(aqi_sensor) | int(0) }}
        {% else %}
          0
        {% endif %}

      pm25_sensor: !input pm25_sensor
      pm25: >-
        {% if pm25_sensor and pm25_sensor != '' and states(pm25_sensor) not in ['unknown','unavailable',''] %}
          {{ states(pm25_sensor) | float(0) | round(1) }}
        {% else %}
          0
        {% endif %}

      image_style: !input image_style

  # === BUILD PROMPT TỐI ƯU CHO GEMINI ===
  - variables:

      # ── LIGHTING: đặt ĐẦU TIÊN để Gemini ưu tiên đúng thời gian ──────────
      lighting: >-
        {% if 'sáng' in tp or 'morning' in tp %}
          Golden-hour sunrise photography, warm pink-orange-gold sky painting the horizon,
          long soft diffused morning shadows stretching across the land,
          delicate silver dew drops glistening on every blade of grass and leaf,
          thin wisps of morning mist floating low over the fields,
          fresh luminous daylight just beginning to fill the world with warmth
        {% elif 'trưa' in tp or 'noon' in tp %}
          Harsh dramatic overhead noon sun blazing from directly above,
          brilliant deep cobalt blue sky without a trace of cloud,
          extremely short sharp high-contrast shadows directly beneath objects,
          intense full midday daylight saturating every colour to maximum vibrancy,
          heat haze shimmering faintly on distant surfaces
        {% elif 'chiều' in tp or 'afternoon' in tp %}
          Breathtaking warm amber golden sunset light flooding the scene from the west,
          long dramatic horizontal shadows stretching far across the ground,
          glowing fiery orange-red horizon melting into deep purple sky above,
          everything bathed in rich cinematic warm golden tones,
          the magical last hour of daylight painting the world in honey and amber
        {% elif 'tối' in tp or 'evening' in tp %}
          Enchanting blue-hour twilight with absolutely NO remaining daylight,
          sky transitioning in a stunning gradient from deep burnt orange at horizon
          fading through violet and indigo to near-black overhead,
          first stars timidly appearing in the darkening sky above,
          warm glowing village lights and handmade paper lanterns casting
          soft pools of orange light in the growing darkness,
          the quiet magical moment between day and night
        {% else %}
          Deep immersive night scene with absolutely NO sun and NO daylight whatsoever,
          complete velvety darkness enveloping everything,
          brilliant full moon casting crisp cool silver-blue shadows across the landscape,
          the entire Milky Way galaxy sweeping dramatically across the sky
          in a breathtaking river of stars and cosmic dust,
          thousands of individual stars of varying brightness filling every corner of the sky,
          warm glowing orange lanterns providing the only earthly light source
        {% endif %}

      # ── SCENE: phong cảnh thay đổi theo buổi ────────────────────────────
      scene: >-
        {% if 'sáng' in tp or 'morning' in tp %}
          Sweeping aerial view of Vietnam's most beautiful countryside,
          endless lush emerald green rice paddy terraces cascading down gentle hillsides,
          ancient bamboo groves swaying gracefully in the morning breeze,
          traditional Vietnamese wooden farmhouses with deep red clay tile roofs
          nestled among the greenery,
          winding narrow dirt paths connecting villages through the landscape,
          towering banana trees with enormous broad glossy leaves lining the roads,
          elderly farmers in traditional conical hats beginning their morning work,
          water buffalo wading through flooded paddies,
          wooden water wheels slowly turning in a shallow mountain stream,
          smoke curling gently from farmhouse chimneys as families prepare morning meals
        {% elif 'trưa' in tp or 'noon' in tp %}
          Stunning aerial view of a picturesque Vietnamese coastal fishing village,
          impossibly clear turquoise and emerald sea stretching to the horizon,
          dozens of vibrantly painted traditional wooden fishing boats
          bobbing gently at a weathered wooden pier,
          pristine white sand beach curving along the shoreline,
          magnificent tall coconut palm trees with swaying fronds casting dappled shade,
          weathered fishermen in conical hats sorting and mending nets on the beach,
          baskets overflowing with the morning's fresh catch of silver fish,
          colourful fishing nets draped and drying on bamboo poles,
          traditional fishing boats with painted eyes on the bow
        {% elif 'chiều' in tp or 'afternoon' in tp %}
          Immersive street-level view of Vietnam's most atmospheric ancient old town,
          beautifully weathered centuries-old colonial French buildings
          with faded yellow and ochre plaster walls glowing in golden light,
          a narrow enchanting lantern-lined alley disappearing into warm hazy distance,
          dozens of colourful traditional silk lanterns hanging overhead
          swaying gently and casting warm coloured shadows,
          motorbikes and bicycles weaving gracefully through the busy street,
          cascading bougainvillea in vivid magenta and purple
          spilling dramatically over ancient walls,
          bustling street food vendors with steaming bowls of pho and banh mi,
          locals sitting at tiny plastic stools sipping iced coffee,
          carved wooden shophouse facades with intricate traditional Vietnamese details
        {% elif 'tối' in tp or 'evening' in tp %}
          Breathtaking aerial view of Vietnam's legendary Sapa mountain valley at dusk,
          dramatically layered terraced rice fields carved into steep mountainsides
          reflecting the twilight sky in their still water like a thousand mirrors,
          a traditional ethnic minority H'Mong hilltribe village perched on the hillside,
          warm golden light glowing invitingly from wooden stilt house windows,
          ancient pine and fir trees forming dark silhouettes against the glowing horizon,
          a winding mountain path with stone steps disappearing into the mist below,
          smoke rising lazily from cooking fires inside the village homes,
          the vast dark atmospheric valley falling away into purple shadow below,
          distant mountain peaks fading into the darkening sky
        {% else %}
          Hauntingly beautiful aerial view of a remote Vietnamese mountain village at night,
          ancient moss-covered stone houses and walls built centuries ago,
          thick mysterious fog and mist swirling and drifting between jagged mountain peaks,
          a row of glowing warm orange traditional paper lanterns
          lining a narrow winding dirt road through the village,
          dense wild primordial forest surrounding the village on all sides,
          the occasional flicker of firelight visible through a cracked wooden shutter,
          an ancient stone well in the village centre reflecting moonlight,
          complete profound silence and stillness,
          the village appearing frozen in time like a dream from centuries past
        {% endif %}

      # ── WEATHER FX ──────────────────────────────────────────────────────
      weather_fx: >-
        {% if 'rain' in w or 'mưa' in w %}
          Dramatic heavy tropical rain falling in thick silver curtains across the entire scene,
          every surface transformed into a dark wet mirror perfectly reflecting surrounding lights,
          countless puddles forming and rippling with overlapping circular waves,
          fat water droplets hanging from every leaf tip and eave,
          rain streaks visible as silver diagonal lines against darker backgrounds,
          the air thick with rain and moisture reducing distant visibility
        {% elif 'thunder' in w or 'bão' in w %}
          Epic violent tropical thunderstorm unleashing its full fury on the landscape,
          towering apocalyptic cumulonimbus storm clouds boiling up into the stratosphere,
          a dramatic bright lightning bolt striking in the middle distance
          illuminating the entire scene in a split second of brilliant white light,
          powerful destructive wind bending trees sideways,
          leaves and debris spinning through the turbulent air,
          the sky an ominous mixture of black purple and sickly green storm colours
        {% elif 'cloud' in w or 'mây' in w %}
          A dramatic sky filled with layers of thick voluminous overcast clouds,
          rich varied cloud formations from flat stratus to billowing cumulus,
          beautiful soft diffused light filtering through the cloud cover
          casting no harsh shadows and illuminating everything evenly,
          subtle variations in cloud darkness and tone creating visual depth in the sky
        {% elif 'fog' in w or 'sương' in w %}
          Thick atmospheric fog and mist rolling in dense waves across the landscape,
          nearby objects crisp and clear while mid-distance elements dissolve into soft grey,
          distant features completely swallowed by the enveloping mist,
          the fog transforming the scene into something ethereal and dreamlike,
          soft diffused light scattered beautifully through the moisture particles,
          an atmosphere of mystery and tranquil isolation
        {% elif 'clear' in w or 'nắng' in w or 'sunny' in w %}
          Flawlessly clear sky of the most brilliant deep blue from horizon to horizon,
          intense brilliant sunshine flooding every surface with pure direct light,
          vivid oversaturated colours brought to maximum richness by the strong light,
          crisp sharp high-contrast shadows with perfectly defined edges,
          the air completely clean and transparent offering unlimited visibility
        {% elif 'snow' in w %}
          Magical snowfall with large soft snowflakes drifting gently through still air,
          a thick pristine white blanket of snow covering every rooftop path and surface,
          tree branches laden with heavy white snow in perfect silence,
          each snowflake individually visible catching the available light,
          breath condensing into delicate clouds in the freezing air
        {% else %}
          A beautiful sky with scattered white fluffy cumulus clouds
          drifting lazily across a blue background,
          pleasant natural light with gentle soft shadows,
          the clouds casting moving shadow patches across the landscape below,
          an atmosphere of comfortable peaceful pleasant weather
        {% endif %}

      # ── TEMPERATURE FX ──────────────────────────────────────────────────
      temp_fx: >-
        {% if temp > 35 %}
          Oppressive scorching heat of {{ temp | round }}°C baking the landscape,
          dramatic heat shimmer waves rising and distorting the air above hot surfaces,
          plants visibly wilting and drooping under the brutal heat,
          every creature and person seeking any available patch of shade,
          the air itself appearing to vibrate with thermal energy
        {% elif temp > 30 %}
          Intense summer heat of {{ temp | round }}°C creating a heavy tropical atmosphere,
          a soft golden heat haze hanging in the middle distance,
          people and animals moving slowly conserving energy and seeking shade,
          the lush vegetation radiating visible warmth
        {% elif temp > 25 %}
          Beautifully warm and comfortable {{ temp | round }}°C bathing the scene in gentle heat,
          everything thriving and growing with vigour in the perfect temperature,
          lush healthy deep green vegetation at its most vibrant and full
        {% elif temp > 18 %}
          Pleasantly cool and invigorating {{ temp | round }}°C filling the air with freshness,
          a refreshing crispness to every breath,
          light jackets and layers appearing on people going about their day
        {% else %}
          Biting cold of {{ temp | round }}°C gripping the entire scene,
          people bundled in thick padded jackets scarves and warm hats,
          white frost crystals coating every surface and blade of grass,
          breath condensing into small clouds of white vapour in the freezing air
        {% endif %}

      # ── WIND FX ─────────────────────────────────────────────────────────
      wind_fx: >-
        {% if wind > 30 %}
          Ferocious gale-force wind of {{ wind | round }} km/h tearing through the scene,
          mature trees bending dramatically to a 45-degree angle straining against the force,
          leaves branches and debris spiralling through the air in chaotic patterns,
          any water surface whipped into white-capped turbulent waves
        {% elif wind > 15 %}
          Steady moderate wind of {{ wind | round }} km/h bringing constant movement to the scene,
          all leaves and branches engaged in continuous rhythmic swaying,
          grass rippling in visible waves across open ground,
          water surfaces showing clear wind-driven ripples catching the light
        {% elif wind > 5 %}
          A gentle pleasant breeze of {{ wind | round }} km/h barely stirring the air,
          only the most delicate elements responding with subtle slow movement,
          grass tips and leaf edges swaying in lazy unhurried motion
        {% else %}
          Absolute perfect stillness with not a breath of wind anywhere,
          every leaf hanging motionless in complete calm,
          any water surface transformed into a flawless mirror
          perfectly reflecting the sky and surroundings in photographic detail
        {% endif %}

      # ── HUMIDITY FX ─────────────────────────────────────────────────────
      hum_fx: >-
        {% if hum > 85 %}
          Oppressive tropical humidity of {{ hum }}% making the air feel thick and heavy,
          a visible haze of moisture hanging throughout the atmosphere,
          every surface shining and glistening with dampness,
          vegetation at its most impossibly lush and intensely green
        {% elif hum > 60 %}
          Noticeable moderate humidity of {{ hum }}%
          keeping all vegetation lush and deeply green,
          leaves and surfaces carrying a healthy moist sheen
        {% elif hum < 30 %}
          Extremely dry parched air at only {{ hum }}% humidity,
          fine red-brown dust particles floating visibly in shafts of sunlight,
          the earth cracked and split into geometric patterns from extreme dryness,
          vegetation appearing desiccated and dusty
        {% else %}
          Comfortable balanced humidity of {{ hum }}% creating ideal clear fresh air,
          perfect visibility with no moisture haze
        {% endif %}

      # ── AQI FX ──────────────────────────────────────────────────────────
      aqi_fx: >-
        {% if aqi > 150 %}
          Dangerous heavy toxic smog with AQI of {{ aqi }},
          the air choked with a thick acrid orange-brown chemical haze,
          visibility reduced to a few hundred metres,
          the sun visible only as a faint pale disc through the murk,
          the entire scene desaturated and washed out by the pollution
        {% elif aqi > 100 %}
          Significant unhealthy air pollution with AQI of {{ aqi }},
          a noticeable greyish-brown haze softening all distant objects,
          colours appearing washed out and faded in the middle distance,
          the sky taking on an unhealthy yellowish-grey tint overall
        {% elif aqi > 50 %}
          Mild haze on the distant horizon from AQI of {{ aqi }},
          a subtle softening of colours and contrast in the far distance,
          nearby objects still crisp and clear with full colour saturation
        {% else %}
          Absolutely pristine crystal clear air with perfect unlimited visibility,
          every distant detail sharp and vivid,
          colours fully saturated and true from foreground to horizon
        {% endif %}

      # ── STYLE FX ────────────────────────────────────────────────────────
      style_fx: >-
        {% if image_style == 'artistic' %}
          Painterly artistic interpretation with creative expressive colour grading,
          bold deliberate brushstroke-like textures, impressionistic atmospheric mood,
          colours pushed beyond realism into emotional artistic expression
        {% elif image_style == 'vibrant' %}
          Maximum vibrant oversaturated colours exploding with visual energy,
          ultra-high contrast with deep blacks and blazing highlights,
          every hue pushed to its most vivid and eye-catching extreme
        {% else %}
          True-to-life photorealistic natural rendering faithful to real-world colours,
          accurate natural lighting with no artificial enhancement,
          the scene appearing exactly as a master photographer would capture it
        {% endif %}

      # ── ASSEMBLE FINAL PROMPT ────────────────────────────────────────────
      _parts: >-
        {{ [
          lighting | trim,
          scene | trim,
          weather_fx | trim,
          temp_fx | trim,
          wind_fx | trim,
          hum_fx | trim,
          aqi_fx | trim,
          style_fx | trim
        ] | select('ne', '') | list | join('. ') }}

      optimized_prompt: >-
        {{ (
          'A breathtaking ultra-photorealistic cinematic aerial DSLR photograph '
          ~ 'shot on a Hasselblad medium format camera with a 24mm wide-angle lens. '
          ~ _parts
          ~ '. Wide panoramic composition with dramatic foreground-to-horizon depth. '
          ~ 'Extraordinary depth of field bringing the entire vast landscape into razor-sharp focus. '
          ~ 'Professional HDR cinematic colour grading with rich shadows and luminous highlights. '
          ~ 'Ultra-high resolution 8K detail capturing every texture from individual leaves to distant mountains. '
          ~ 'Award-winning National Geographic photography quality. '
          ~ 'Masterful natural lighting with perfect exposure across the entire frame. '
          ~ ('Empty scene with no human figures, only the landscape and its atmosphere. '
             if ('tối' in tp or 'đêm' in tp or 'night' in tp or 'evening' in tp)
             else '')
          ~ 'Absolutely no text, no watermarks, no logos, no borders, no artificial elements, no modern intrusions.'
          ) | regex_replace('\\s+', ' ') | trim }}

      task_name: "Weather {{ states(time_phase_sensor) }} - {{ states(weather_entity) }}"

  # === GỌI AI TẠO ẢNH ===
  - continue_on_error: false
    action: ai_task.generate_image
    data:
      entity_id: !input ai_task_entity
      task_name: "{{ task_name }}"
      instructions: "{{ optimized_prompt }}"
    response_variable: ai_result

  # === LƯU ẢNH ===
  - if:
      - condition: template
        value_template: >
          {{ ai_result is defined
             and (ai_result.url is defined or ai_result.media_source_id is defined) }}
    then:
      - variables:
          ai_image_source_id: "{{ ai_result.media_source_id | default('') }}"
          image_path: >-
            {% set sid = ai_result.media_source_id | default('') %}
            {% if sid.startswith('media-source://ai_task/image/') %}
              /config/media/ai_task/image/{{ sid.split('/')[-1] }}
            {% elif sid.startswith('media-source://') %}
              /config/media/{{ sid.replace('media-source://', '') }}
            {% else %}
              {{ sid }}
            {% endif %}

      - variables:
          timestamp: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
          use_fixed_filename: !input use_fixed_filename
          fixed_filename: !input fixed_filename
          output_directory: !input output_directory
          filename_prefix: !input filename_prefix
          file_extension: !input file_extension
          delete_ai_image: !input delete_ai_image
          filename: >-
            {% if use_fixed_filename %}
              {{ fixed_filename }}.{{ file_extension }}
            {% else %}
              {{ filename_prefix }}{{ timestamp }}.{{ file_extension }}
            {% endif %}
          dest_path: "{{ output_directory }}/{{ filename }}"

      - continue_on_error: true
        action: shell_command.copy_weather_image
        data:
          source: "{{ image_path }}"
          destination: "{{ dest_path }}"
        response_variable: copy_result

      - if:
          - condition: template
            value_template: "{{ delete_ai_image and image_path != '' }}"
        then:
          - continue_on_error: true
            action: delete.files_in_folder
            data:
              folder: '/config/media/music_ai'
              time: 3600

mode: single
max_exceeded: silent
