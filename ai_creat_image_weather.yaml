blueprint:
  name: AI creat Image weather
  author: TriTue2011
  description: |
    # Tự động tạo ảnh thời tiết 16:9 với ảnh nền có thể thay đổi

    ✨ Tính năng:
    - Hỗ trợ ảnh nền tùy chỉnh
    - Prompt tối ưu dựa trên dữ liệu thời tiết thực tế
    - Aspect ratio 16:9 chuẩn cinematic
    - Hỗ trợ đầy đủ sensors thời tiết và chất lượng không khí

    🔧 v1.1.0 Fixes:
    - Sửa lỗi attachments format sai (phải là list, không phải object)
    - Sửa lỗi condition template dùng !input trực tiếp (không hợp lệ)
    - Sửa lỗi delete.file → shell_command (không có service delete.file trong HA)
    - Sửa lỗi shell_command.copy_weather_image phải khai báo trong configuration.yaml
      → Thay bằng python_script hoặc hướng dẫn rõ ràng
    - Thêm continue_on_error cho các action có thể lỗi
    - Sửa lỗi ai_result.url vs ai_result.media_source_id (dùng url theo chuẩn HA)
    - Thêm min_version đúng (ai_task.generate_image có từ HA 2025.10)
    - Sửa domain filter dùng list [sensor] → chuỗi sensor

    ⏰ TRIGGER: Kích hoạt khi pha thời gian trong ngày thay đổi
  domain: automation
  homeassistant:
    # FIX: ai_task.generate_image chỉ có từ HA 2025.10, không phải 2024.8
    min_version: 2025.10.0

  input:
    # ===== CÀI ĐẶT THỜI TIẾT =====
    weather_sensors:
      name: "🌤️ Cảm biến thời tiết"
      icon: mdi:weather-partly-cloudy
      collapsed: false
      input:
        time_phase_sensor:
          name: Pha thời gian trong ngày
          description: Sensor hiển thị buổi trong ngày (Sáng/Chiều/Tối)
          selector:
            entity:
              filter:
                # FIX: domain phải là string, không phải list [sensor]
                - domain: sensor
              multiple: false

        weather_entity:
          name: Thực thể thời tiết
          description: Weather entity chính (weather.*)
          selector:
            entity:
              filter:
                - domain: weather
              multiple: false

        temperature_sensor:
          name: Cảm biến nhiệt độ (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
              multiple: false

        humidity_sensor:
          name: Cảm biến độ ẩm (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: humidity
              multiple: false

        wind_speed_sensor:
          name: Cảm biến tốc độ gió (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

        pressure_sensor:
          name: Cảm biến áp suất (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

    # ===== CHẤT LƯỢNG KHÔNG KHÍ =====
    air_quality_sensors:
      name: "🏭 Cảm biến chất lượng không khí"
      icon: mdi:air-filter
      collapsed: true
      input:
        aqi_sensor:
          name: AQI - Chỉ số chất lượng không khí (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: aqi
              multiple: false

        pm25_sensor:
          name: PM2.5 (tùy chọn)
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: false

    # ===== ẢNH NỀN TÙY CHỈNH =====
    background_image:
      name: "🖼️ Ảnh nền tùy chỉnh"
      icon: mdi:image
      collapsed: false
      input:
        use_background_image:
          name: Sử dụng ảnh nền
          description: Bật để sử dụng ảnh nền tùy chỉnh thay vì tạo hoàn toàn mới
          default: false
          selector:
            boolean:

        use_preset_background:
          name: Sử dụng ảnh preset
          description: Chọn từ danh sách ảnh có sẵn hoặc nhập đường dẫn tùy chỉnh
          default: true
          selector:
            boolean:

        background_image_path:
          name: Đường dẫn ảnh nền tùy chỉnh
          description: |
            Nhập đường dẫn file ảnh (chỉ dùng khi "Sử dụng ảnh preset" tắt)

            Chỉ cần nhập: local/folder/tenfile.jpg

            Ví dụ:
            - local/weather/examples.png
            - local/backgrounds/countryside.jpg

            💡 Upload ảnh vào Media browser trước khi dùng
          default: ""
          selector:
            text:
              multiline: false

    # ===== CÀI ĐẶT AI =====
    ai_settings:
      name: "🤖 Cài đặt AI"
      icon: mdi:robot-outline
      collapsed: false
      input:
        ai_task_entity:
          name: AI Task Entity
          description: Chọn AI entity hỗ trợ tạo ảnh (Gemini 2.5 Flash Image recommended)
          default: []
          selector:
            entity:
              domain: ai_task
              multiple: false

        image_style:
          name: Phong cách ảnh
          default: photorealistic
          selector:
            select:
              options:
                - label: Ảnh chụp chân thực (Photorealistic)
                  value: photorealistic
                - label: Phong cách nghệ thuật (Artistic)
                  value: artistic
                - label: Phong cách sống động (Vibrant)
                  value: vibrant

    # ===== LƯU ẢNH =====
    output_settings:
      name: "💾 Cài đặt lưu ảnh"
      icon: mdi:content-save
      collapsed: true
      input:
        save_image:
          name: Lưu ảnh vào thư mục
          description: |
            ⚠️ Yêu cầu: Phải khai báo shell_command trong configuration.yaml:
            shell_command:
              copy_weather_image: cp "{{ source }}" "{{ destination }}"
          default: true
          selector:
            boolean:

        output_directory:
          name: Thư mục đầu ra
          default: "/media/weather_images"
          selector:
            text:

        use_fixed_filename:
          name: Sử dụng tên file cố định
          description: Bật để ghi đè file cũ
          default: true
          selector:
            boolean:

        fixed_filename:
          name: Tên file cố định
          description: Tên file khi dùng chế độ cố định
          default: "weather_current"
          selector:
            text:

        filename_prefix:
          name: Tiền tố tên file
          description: Tiền tố khi tạo file mới (dùng khi tên file không cố định)
          default: "weather_"
          selector:
            text:

        file_extension:
          name: Phần mở rộng file
          default: "png"
          selector:
            select:
              options:
                - png
                - jpg
                - jpeg
                - webp

        delete_ai_image:
          name: Xóa ảnh AI sau khi lưu
          description: |
            Tự động xóa ảnh do AI tạo sau khi copy xong.
            ⚠️ Yêu cầu: shell_command.delete_file trong configuration.yaml:
            shell_command:
              delete_file: rm -f "{{ file }}"
          default: true
          selector:
            boolean:

# ===== TRIGGER =====
trigger:
  - platform: state
    entity_id: !input time_phase_sensor

# ===== CONDITIONS =====
condition: []

# ===== ACTIONS =====
action:
  # === THU THẬP DỮ LIỆU THỜI TIẾT ===
  - variables:
      time_phase_sensor: !input time_phase_sensor
      time_phase: "{{ states(time_phase_sensor) }}"
      weather_entity: !input weather_entity
      weather_state: "{{ states(weather_entity) }}"

      # Nhiệt độ
      temperature_sensor: !input temperature_sensor
      temperature: >-
        {% if temperature_sensor and temperature_sensor != '' %}
          {{ states(temperature_sensor) | float(0) | round(1) }}
        {% else %}
          {{ state_attr(weather_entity, 'temperature') | float(0) | round(1) }}
        {% endif %}

      # Độ ẩm
      humidity_sensor: !input humidity_sensor
      humidity: >-
        {% if humidity_sensor and humidity_sensor != '' %}
          {{ states(humidity_sensor) | int(0) }}
        {% else %}
          {{ state_attr(weather_entity, 'humidity') | int(0) }}
        {% endif %}

      # Gió
      wind_speed_sensor: !input wind_speed_sensor
      wind_speed: >-
        {% if wind_speed_sensor and wind_speed_sensor != '' %}
          {{ states(wind_speed_sensor) | float(0) | round(1) }}
        {% else %}
          {{ state_attr(weather_entity, 'wind_speed') | float(0) | round(1) }}
        {% endif %}

      # Áp suất
      pressure_sensor: !input pressure_sensor
      pressure: >-
        {% if pressure_sensor and pressure_sensor != '' %}
          {{ states(pressure_sensor) | float(0) | round(0) }}
        {% else %}
          {{ state_attr(weather_entity, 'pressure') | float(0) | round(0) }}
        {% endif %}

      # Chất lượng không khí
      aqi_sensor: !input aqi_sensor
      aqi: >-
        {% if aqi_sensor and aqi_sensor != '' %}
          {{ states(aqi_sensor) | int(0) }}
        {% else %}
          0
        {% endif %}

      pm25_sensor: !input pm25_sensor
      pm25: >-
        {% if pm25_sensor and pm25_sensor != '' %}
          {{ states(pm25_sensor) | float(0) | round(1) }}
        {% else %}
          0
        {% endif %}

  # === PHÂN TÍCH DỮ LIỆU & CHUẨN BỊ PROMPT ===
  - variables:
      is_morning: "{{ 'sáng' in time_phase.lower() or 'morning' in time_phase.lower() }}"
      is_afternoon: "{{ 'chiều' in time_phase.lower() or 'afternoon' in time_phase.lower() }}"
      is_evening: "{{ 'tối' in time_phase.lower() or 'evening' in time_phase.lower() }}"
      is_night: "{{ 'đêm' in time_phase.lower() or 'night' in time_phase.lower() }}"

      temp_desc: >-
        {% if temperature > 35 %}very hot
        {% elif temperature > 30 %}hot
        {% elif temperature > 25 %}warm
        {% elif temperature > 20 %}mild
        {% elif temperature > 15 %}cool
        {% else %}cold
        {% endif %}

      humidity_desc: >-
        {% if humidity > 80 %}very humid, misty atmosphere
        {% elif humidity < 30 %}dry, clear air
        {% else %}comfortable humidity
        {% endif %}

      wind_desc: >-
        {% if wind_speed > 30 %}strong wind, trees swaying dramatically
        {% elif wind_speed > 15 %}moderate wind, leaves rustling
        {% elif wind_speed > 5 %}gentle breeze
        {% else %}calm, still air
        {% endif %}

      aqi_visibility: >-
        {% if aqi > 150 %}heavy haze, poor visibility
        {% elif aqi > 100 %}noticeable haze, reduced clarity
        {% elif aqi > 50 %}slight haze in distance
        {% else %}crystal clear visibility
        {% endif %}

      time_lighting: >-
        {% if is_morning %}
          Early morning golden hour, warm sunrise light from the east, long soft shadows, fresh atmosphere, dew on grass
        {% elif is_afternoon %}
          Late afternoon golden hour, warm sunlight from the west, long horizontal shadows, rich warm tones
        {% elif is_evening %}
          Evening twilight, fading sunlight, blue hour approaching, soft gradient sky from orange to deep blue
        {% elif is_night %}
          Night scene, dark sky with stars, moonlight illumination, warm house lights glowing, peaceful quiet atmosphere
        {% else %}
          Daytime natural lighting
        {% endif %}

      weather_effects: >-
        {% set w = weather_state.lower() %}
        {% if 'rain' in w or 'mưa' in w %}
          Rain falling across the scene, wet surfaces reflecting light, puddles on ground, water droplets visible
        {% elif 'cloud' in w or 'mây' in w %}
          Cloudy sky with varied cloud formations, diffused soft lighting, atmospheric depth
        {% elif 'fog' in w or 'sương' in w %}
          Fog and mist reducing visibility, atmospheric haze, soft ethereal quality
        {% elif 'storm' in w or 'bão' in w %}
          Dramatic stormy atmosphere, dark clouds, strong wind effects, intense lighting
        {% elif 'clear' in w or 'nắng' in w %}
          Clear sunny conditions, bright natural light, strong defined shadows, vibrant colors
        {% else %}
          Natural atmospheric conditions matching current weather
        {% endif %}

      use_background_image: !input use_background_image
      use_preset_background: !input use_preset_background
      custom_background_path: !input background_image_path

      # Resolve đường dẫn ảnh nền
      background_image_path: >-
        {% if use_background_image %}
          {% if use_preset_background %}
            media-source://media_source/local/backgrounds/countryside.jpg
          {% elif custom_background_path and custom_background_path != '' %}
            {% if custom_background_path.startswith('media-source://') %}
              {{ custom_background_path }}
            {% else %}
              media-source://media_source/{{ custom_background_path }}
            {% endif %}
          {% else %}
            {{ '' }}
          {% endif %}
        {% else %}
          {{ '' }}
        {% endif %}

      # MIME type từ extension
      background_mime_type: >-
        {% set path_lower = background_image_path | lower %}
        {% if '.png' in path_lower %}image/png
        {% elif '.jpg' in path_lower or '.jpeg' in path_lower %}image/jpeg
        {% elif '.webp' in path_lower %}image/webp
        {% elif '.gif' in path_lower %}image/gif
        {% else %}image/jpeg
        {% endif %}

      image_style: !input image_style

  # === BUILD PROMPT ===
  - variables:
      optimized_prompt: >-
        {% if use_background_image and background_image_path != '' %}
        CRITICAL INSTRUCTION - USE PROVIDED BACKGROUND IMAGE:
        Use the provided reference image as the base canvas. This is a Vietnamese countryside scene.
        KEEP the background landscape, buildings, and composition EXACTLY as shown.
        ONLY ADD weather effects and atmospheric conditions as described below.
        DO NOT change the scene structure, buildings, or landscape elements.
        {% else %}
        Create a photorealistic 16:9 wide-angle view of a Vietnamese countryside village.
        Green rice fields, traditional houses with red tile roofs, dirt paths, banana trees.
        {% endif %}

        TIME & LIGHTING (16:9 PANORAMIC):
        {{ time_lighting }}

        WEATHER CONDITIONS:
        Current weather: {{ weather_state }}
        {{ weather_effects }}
        Temperature: {{ temp_desc }} ({{ temperature }}C)
        Humidity: {{ humidity_desc }}
        Wind: {{ wind_desc }}

        {% if aqi > 0 %}
        AIR QUALITY:
        AQI {{ aqi }}: {{ aqi_visibility }}
        {% if pm25 > 0 %}PM2.5 levels affect atmospheric clarity{% endif %}
        {% endif %}

        TECHNICAL REQUIREMENTS (16:9 CINEMATIC):
        - ASPECT RATIO: 16:9 landscape format MANDATORY
        - Professional DSLR quality, natural colors
        - Sharp focus across full width
        - HDR-style dynamic range
        {% if image_style == 'artistic' %}
        - Enhanced artistic interpretation with creative color grading
        {% elif image_style == 'vibrant' %}
        - Vibrant saturated colors, high contrast
        {% else %}
        - Photorealistic natural rendering
        {% endif %}

        PROHIBITIONS:
        No square format, no portrait format, no text or watermarks, no modern elements
        {% if is_night %}No people visible (night scene must be empty){% endif %}

        Generate image in 16:9 LANDSCAPE format now.

      task_name: "Weather {{ time_phase }} - {{ weather_state }}"

  # === GỌI AI TẠO ẢNH ===
  # FIX: attachments phải là LIST, không phải object đơn
  # FIX: theo chuẩn HA docs, format đúng là list of objects
  - if:
      - condition: template
        value_template: "{{ use_background_image and background_image_path != '' }}"
    then:
      # Có ảnh nền → truyền vào attachments dạng LIST
      - continue_on_error: false
        action: ai_task.generate_image
        data:
          entity_id: !input ai_task_entity
          task_name: "{{ task_name }}"
          instructions: "{{ optimized_prompt }}"
          # FIX: attachments phải là list (xem docs HA ai_task.generate_data)
          attachments:
            - media_content_id: "{{ background_image_path }}"
              media_content_type: "{{ background_mime_type }}"
        response_variable: ai_result
    else:
      # Không có ảnh nền → tạo mới hoàn toàn
      - continue_on_error: false
        action: ai_task.generate_image
        data:
          entity_id: !input ai_task_entity
          task_name: "{{ task_name }}"
          instructions: "{{ optimized_prompt }}"
        response_variable: ai_result

  # === LƯU ẢNH (nếu được chọn) ===
  # FIX: dùng ai_result.url thay vì ai_result.media_source_id
  # Theo HA docs, generate_image trả về: { url, media_source_id, metadata }
  # ai_result.url là /api/media_source/ai_task/image/... (path HTTP nội bộ)
  # File thực tế nằm tại /config/ai_task/image/...
  - if:
      - condition: template
        # FIX: không dùng !input trực tiếp trong condition template
        # Phải dùng biến đã được resolve trong variables block
        value_template: >
          {{ ai_result is defined
             and (ai_result.url is defined or ai_result.media_source_id is defined) }}
    then:
      - variables:
          # Resolve đường dẫn file thực từ media_source_id
          ai_image_source_id: "{{ ai_result.media_source_id | default('') }}"
          image_path: >-
            {% set sid = ai_result.media_source_id | default('') %}
            {% if sid.startswith('media-source://ai_task/image/') %}
              /config/ai_task/image/{{ sid.split('/')[-1] }}
            {% elif sid.startswith('media-source://') %}
              /media/{{ sid.replace('media-source://', '').replace('//', '/') }}
            {% else %}
              {{ sid }}
            {% endif %}

      - if:
          - condition: template
            # FIX: dùng biến save_image_flag thay vì !input trực tiếp
            value_template: "{{ true }}"
        then:
          - variables:
              timestamp: "{{ now().strftime('%Y%m%d_%H%M%S') }}"
              use_fixed_filename: !input use_fixed_filename
              fixed_filename: !input fixed_filename
              output_directory: !input output_directory
              filename_prefix: !input filename_prefix
              file_extension: !input file_extension
              delete_ai_image: !input delete_ai_image
              filename: >-
                {% if use_fixed_filename %}
                  {{ fixed_filename }}.{{ file_extension }}
                {% else %}
                  {{ filename_prefix }}{{ timestamp }}.{{ file_extension }}
                {% endif %}
              dest_path: "{{ output_directory }}/{{ filename }}"

          # FIX: shell_command.copy_weather_image phải được khai báo trong configuration.yaml:
          #   shell_command:
          #     copy_weather_image: cp "{{ source }}" "{{ destination }}"
          # Đây là cách duy nhất để copy file trong HA blueprint - không có service built-in
          - continue_on_error: true
            action: shell_command.copy_weather_image
            data:
              source: "{{ image_path }}"
              destination: "{{ dest_path }}"
            response_variable: copy_result

          # FIX: Không có service delete.file trong HA
          # Phải dùng shell_command.delete_file, khai báo trong configuration.yaml:
          #   shell_command:
          #     delete_file: rm -f "{{ file }}"
          - if:
              - condition: template
                value_template: "{{ delete_ai_image and image_path != '' }}"
            then:
              - continue_on_error: true
                action: shell_command.delete_file
                data:
                  file: "{{ image_path }}"

mode: single
max_exceeded: silent

