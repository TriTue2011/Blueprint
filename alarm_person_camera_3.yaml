blueprint:
  name: Cảnh báo người qua camera bằng open ai
  author: TriTue2011
  homeassistant:
    min_version: 2025.7.0
  description: >
    Phân tích sự kiện camera bằng AI Task (Structured Output) HOẶC JSON (OpenAI/raw).
    Gửi thông báo với ảnh và phân tích AI qua điện thoại, Telegram, Zalo và TTS ra loa.

    <details>
    <summary><b>Chi tiết:</b> - Nhấn để mở rộng</summary>

      **Phiên bản: v.2025.10.22 - Merged Edition (fix v2)**

      **Tác giả gốc: TriTue2011**

      **Tính năng:**

        1- **Hai chế độ AI:** Structured Output (HA native ai_task) hoặc JSON (OpenAI/raw JSON response).

        2- **Gửi thông báo ngay lập tức** với ảnh, sau đó cập nhật kết quả phân tích AI (2 bước).

        3- **Hỗ trợ đa nền tảng:** Mobile App (Android/iOS), Telegram, Zalo Bot (Pyscript), Zalo Custom Integration, TTS ra loa.

        4- **Phát hiện người và/hoặc động vật** (chó, mèo, chim) — lọc báo động ảo.

        5- **Tùy chọn chờ người** bằng occupancy sensor trước khi phân tích.

        6- **Cooldown** để tránh spam thông báo.

        7- **continue_on_error** cho tất cả action gửi thông báo (HA 2026.3+).

      **Sửa lỗi v2:**
        - Structured mode: Bổ sung chỉ dẫn rõ ràng cho từng trường số lượng và giá trị cố định của trường không phân tích.
        - JSON mode: field_rules nay conditional theo detect_subjects — loại bỏ mâu thuẫn instruction khiến AI hallucinate.
        - Đồng bộ chuỗi fallback giữa prompt và bộ lọc filter phrases.

    </details>

    <details>
    <summary><b>⚙️ Yêu cầu cấu hình:</b> - Nhấn để mở rộng</summary>

      **Thêm vào `configuration.yaml` để HA nhận diện đúng thư mục media:**

      ```yaml
      homeassistant:
        media_dirs:
          local: /media
      ```

      ⚠️ Nếu thiếu dòng này, AI Task và mobile notification có thể không truy cập được ảnh.

    </details>

  domain: automation
  source_url: https://raw.githubusercontent.com/TriTue2011/Blueprint/main/alarm_person_camera_3.yaml

  input:

    # ============================================================
    # TRIGGER SETTINGS
    # ============================================================
    trigger_section:
      name: Trigger Settings
      icon: mdi:play-circle
      input:
        trigger_sensor:
          name: 🚶 Trigger Sensor
          description: |
            👉 Cảm biến kích hoạt automation (cửa, motion sensor).
            ✅ Có thể chọn nhiều sensor cùng lúc.
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: true

        trigger_from_state:
          name: 🔄 Trigger From State
          description: Trạng thái ban đầu của cảm biến trước khi kích hoạt.
          default: "off"
          selector:
            select:
              options: ["off", "on"]
              custom_value: true
              multiple: false

        trigger_to_state:
          name: 🔄 Trigger To State
          description: Trạng thái mà cảm biến chuyển sang để kích hoạt automation.
          default: "on"
          selector:
            select:
              options: ["on", "off"]
              custom_value: true
              multiple: false

        person_occupancy_sensor:
          name: 🧍 Person Occupancy Sensor (Optional)
          description: |
            👉 Sensor phát hiện người (ví dụ: mmWave, PIR zone).
            ⚠️ Dùng kết hợp với "Wait for Person Detection" bên dưới.
            ✅ Nếu không dùng, bỏ trống.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: false

        person_detected_state:
          name: 🔎 Person Detected State
          description: Trạng thái của sensor khi phát hiện có người.
          default: "on"
          selector:
            select:
              options: ["on", "off"]
              custom_value: true
              multiple: false

        wait_for_person:
          name: ⏳ Wait for Person Detection
          description: |
            👉 Bật để đợi sensor phát hiện người TRƯỚC KHI chụp ảnh và phân tích.
            ✅ Giúp giảm ảnh chụp khi chưa có người trong khung hình.
          default: false
          selector:
            boolean: {}

        max_wait_time:
          name: ⌛ Maximum Wait Time (Optional)
          description: |
            👉 Thời gian tối đa (giây) để đợi phát hiện người.
            ⚠️ Đặt 0 = chờ không giới hạn cho đến khi phát hiện người.
          default: 0
          selector:
            number:
              min: 0
              max: 3600
              unit_of_measurement: seconds
              mode: box
              step: 1

    # ============================================================
    # GLOBAL CONDITIONS
    # ============================================================
    run_conditions:
      name: 🛠️ Run Conditions
      description: |
        👉 Thêm Condition để chạy Automation.
        ⚠️ Tất cả điều kiện phải đúng thì automation mới chạy.
      default: []
      selector:
        condition: {}

    # ============================================================
    # COOLDOWN
    # ============================================================
    cooldown:
      name: ⏱️ Cooldown
      description: |
        👉 Thời gian chờ SAU KHI automation chạy xong trước khi có thể chạy lại.
        ✅ Giúp tránh spam thông báo khi sensor liên tục kích hoạt.
      default:
        minutes: 10
      selector:
        duration: {}

    # ============================================================
    # CAMERA & SNAPSHOT SETTINGS
    # ============================================================
    camera_sensor_section:
      name: Camera & Snapshot Settings
      icon: mdi:camera
      input:
        camera_entities:
          name: 📸 Camera Entities
          description: |
            👉 Danh sách camera để giám sát.
            ⚠️ Hiện tại chỉ sử dụng camera đầu tiên trong danh sách để chụp ảnh.
            🌐 Tham khảo: https://www.home-assistant.io/integrations/camera/
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: camera

        num_snapshots:
          name: ⌛ Number of Snapshots
          description: |
            👉 Số ảnh sẽ chụp liên tiếp để so sánh và gửi cho AI phân tích.
            ✅ Nhiều ảnh giúp AI phân tích chính xác hơn nhưng mất nhiều thời gian hơn.
          default: 3
          selector:
            number:
              min: 1
              max: 5
              step: 1
              unit_of_measurement: snapshots
              mode: slider

        num_delay_before_snapshot:
          name: ⌛ Delay Before First Snapshot
          description: |
            👉 Thời gian chờ (giây) TRƯỚC KHI chụp ảnh đầu tiên.
            ✅ Giúp camera ổn định sau khi trigger kích hoạt.
          default: 1
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: seconds
              mode: slider

        num_delay:
          name: ⌛ Delay Between Snapshots
          description: |
            👉 Thời gian trễ (giây) GIỮA các lần chụp ảnh.
            ✅ Giúp chụp được ảnh ở các thời điểm khác nhau để AI so sánh.
          default: 1
          selector:
            number:
              min: 0
              max: 10
              step: 0.5
              unit_of_measurement: seconds
              mode: slider

        overwrite_image:
          name: 🏞️ Overwrite Image (Optional)
          description: |
            👉 Bật để ghi đè ảnh cũ bằng ảnh mới (tiết kiệm dung lượng).
            ⚠️ Tắt sẽ lưu nhiều ảnh riêng biệt theo context.id — tốn dung lượng.
            ✅ Ảnh luôn được lưu vào /media/snapshots/ (Media Folder, bảo mật).
            📄 Yêu cầu thêm vào configuration.yaml:
               homeassistant:
                 media_dirs:
                   local: /media
          default: true
          selector:
            boolean: {}

    # ============================================================
    # AI TASK SETTINGS
    # ============================================================
    ai_task_section:
      name: AI Task Settings
      icon: mdi:brain
      collapsed: true
      input:
        ai_powered:
          name: ✅ AI-powered (Optional)
          description: |
            👉 Bật để dùng AI phân tích ảnh trước khi gửi thông báo.
            ⚠️ Nếu tắt, sẽ gửi thông báo ngay khi phát hiện chuyển động mà không phân tích.
            ✅ Khuyến nghị bật để lọc báo động ảo.
            🌐 Tham khảo: https://www.home-assistant.io/integrations/ai_task/
          default: true
          selector:
            boolean: {}

        ai_mode:
          name: 🤖 AI Output Mode
          description: |
            👉 Chọn cách AI trả về kết quả phân tích ảnh.
            ✅ Structured Output: dùng ai_task native của HA (khuyến nghị, ổn định hơn).
            ✅ JSON: dùng cho OpenAI hoặc AI trả về raw JSON — cần parse thủ công.
            ⚠️ Nếu chọn JSON, hãy đảm bảo AI provider hỗ trợ trả về đúng định dạng JSON.
          default: structured
          selector:
            select:
              options:
                - label: Structured Output (HA Native - Khuyến nghị)
                  value: structured
                - label: JSON (OpenAI / Raw JSON)
                  value: json
              multiple: false

        detect_subjects:
          name: 🔍 Phát hiện đối tượng
          description: |
            👉 Chọn loại đối tượng muốn AI phân tích và gửi cảnh báo.
            ✅ Chỉ người: cảnh báo khi phát hiện con người trong ảnh.
            ✅ Chỉ động vật: cảnh báo khi phát hiện chó, mèo hoặc chim trong ảnh.
            ✅ Cả hai: cảnh báo khi phát hiện người HOẶC động vật.
            ⚠️ Lựa chọn này ảnh hưởng trực tiếp đến prompt gửi cho AI và điều kiện lọc thông báo.
          default: humans
          selector:
            select:
              options:
                - label: 👤 Chỉ phát hiện người
                  value: humans
                - label: 🐾 Chỉ phát hiện động vật (chó, mèo, chim)
                  value: animals
                - label: 👤🐾 Phát hiện cả người và động vật
                  value: both
              multiple: false

        ai_provider:
          name: 🤖 AI Task Provider
          description: |
            👉 Chọn AI Task provider để phân tích ảnh.
            ✅ Bỏ trống để dùng AI provider mặc định của hệ thống (HA 2025.7+).
            🌐 Tham khảo: https://www.home-assistant.io/integrations/ai_task/
          default: []
          selector:
            entity:
              domain: ai_task
              multiple: false


    # ============================================================
    # MOBILE APP NOTIFY SETTINGS
    # ============================================================
    notification_section:
      name: Mobile App Notify Settings
      icon: mdi:bell
      collapsed: true
      input:
        include_notify:
          name: ✅ Mobile App Notify Option (Optional)
          description: |
            👉 Bật nếu muốn gửi thông báo lên điện thoại đã cài HA Companion App.
            🌐 Xem thêm: https://companion.home-assistant.io/docs/notifications/notifications-basic
          default: false
          selector:
            boolean: {}

        is_ios_android:
          name: 🔔 Android or iOS device?
          description: |
            👉 Chọn hệ điều hành của điện thoại nhận thông báo.
            ⚠️ Android và iOS có cấu trúc payload thông báo khác nhau.
          default: android_device
          selector:
            select:
              options:
                - label: Android
                  value: android_device
                - label: iOS
                  value: ios_device
              multiple: false

        notify_device:
          name: 📱 Devices Notified
          description: |
            👉 Chọn điện thoại muốn nhận thông báo đẩy.
            ✅ Có thể chọn nhiều điện thoại.
          default: []
          selector:
            device:
              filter:
                - integration: mobile_app
              multiple: true

        notify_title:
          name: 📝 Title
          description: |
            👉 Tiêu đề của thông báo.
            ⚠️ Có thể dùng HTML để thiết lập màu sắc, in đậm.
          default: "🔔 <b><span style=\"color: red\">Có chuyển động</span></b>\n"
          selector:
            text: {}

        tap_navigate:
          name: 📲 Tap Navigate
          description: |
            👉 Mở HA và đi đến vị trí này khi nhấn vào thông báo.
            ⚠️ Ví dụ: /lovelace/cameras
          default: /lovelace/camera
          selector:
            text: {}

        status_bar_icon:
          name: 🌠 Status Bar Icon (Android)
          description: |
            👉 Dành cho Android - Thiết lập icon cho thông báo trên Status Bar.
            🌐 Tìm icon tại: https://pictogrammers.com/library/mdi/
          default: mdi:motion-sensor
          selector:
            icon: {}

        notification_color:
          name: 🎨 Notification Color (Android)
          description: 👉 Dành cho Android - Màu của icon thông báo trên Status Bar.
          default: [255, 0, 0]
          selector:
            color_rgb: {}

        notification_time:
          name: 🕒 Notification Time
          description: 👉 Tùy chọn hiển thị thời gian trong nội dung thông báo.
          default: ""
          selector:
            select:
              options:
                - label: No Time Added
                  value: ""
                - label: 12 Hour
                  value: "at {{ now().strftime('%-I:%M %p') }}"
                - label: 24 Hour
                  value: "at {{ now().strftime('%H:%M') }}"
              multiple: false

    # ============================================================
    # TELEGRAM SETTINGS
    # ============================================================
    telegram_section:
      name: Telegram Settings
      icon: mdi:send
      collapsed: true
      input:
        include_telegram_notify:
          name: ✅ Telegram Option (Optional)
          description: |
            👉 Bật nếu muốn gửi thông báo lên Telegram.
            🌐 Xem thêm: https://www.home-assistant.io/integrations/?search=telegram
          default: false
          selector:
            boolean: {}

        telegram_config_entry:
          name: 🤖 Telegram Bot
          description: 👉 Chọn Telegram Bot đã cấu hình trong HA.
          default: ""
          selector:
            config_entry:
              integration: telegram_bot

        telegram_target:
          name: 🧑‍💻 Target Chat ID
          description: |
            👉 Chat ID của người hoặc nhóm nhận thông báo.
            ✅ Bỏ trống để dùng chat ID mặc định của bot.
          default: ""
          selector:
            text: {}

        telegram_thread_id:
          name: 🧵 Thread ID (Optional)
          description: |
            👉 ID của chủ đề trong nhóm Telegram (nếu dùng nhóm có topic).
            ✅ Bỏ trống nếu không dùng topic.
          default: ""
          selector:
            text: {}

        telegram_initial_caption:
          name: 📝 Initial Caption
          description: 👉 Caption gửi kèm ảnh ban đầu (trước khi có kết quả AI).
          default: "🔔 Phát hiện chuyển động!"
          selector:
            text: {}

    # ============================================================
    # ZALO BOT SETTINGS (PYSCRIPT)
    # ============================================================
    zalo_bot_section:
      name: Zalo Bot Settings (Pyscript)
      icon: mdi:chat
      collapsed: true
      input:
        enable_zalo_bot:
          name: ✅ Enable Zalo Bot (Pyscript)
          description: |
            👉 Bật/tắt gửi thông báo qua Zalo Bot dùng Pyscript.
            ⚠️ Yêu cầu cài đặt Pyscript và script send_zalo_photo, send_zalo_message.
            🌐 Xem thêm: https://github.com/smarthomeblack/zalo_bot
          default: false
          selector:
            boolean: {}

        zalo_bot_chat_id:
          name: 🧑‍💻 Zalo Bot Chat ID
          description: 👉 Chat ID hoặc User ID nhận thông báo Zalo Bot qua Pyscript.
          default: ""
          selector:
            text: {}

        zalo_bot_initial_caption:
          name: 📝 Zalo Bot Initial Caption
          description: 👉 Caption khi gửi ảnh ban đầu qua Zalo Bot.
          default: "🔔 Phát hiện chuyển động!"
          selector:
            text: {}

    # ============================================================
    # ZALO CUSTOM INTEGRATION SETTINGS
    # ============================================================
    zalo_custom_section:
      name: Zalo Custom Integration Settings
      icon: mdi:chat-processing
      collapsed: true
      input:
        enable_zalo_custom:
          name: ✅ Enable Zalo Custom Integration
          description: |
            👉 Bật/tắt gửi thông báo qua Zalo Custom Integration (zalo_bot).
            ⚠️ Yêu cầu cài đặt integration zalo_bot trong HA.
          default: false
          selector:
            boolean: {}

        zalo_custom_account:
          name: 📱 Zalo Account
          description: |
            👉 Số điện thoại tài khoản Zalo dùng để gửi tin nhắn.
            ⚠️ Ví dụ: +84376861184
          default: ""
          selector:
            text: {}

        zalo_custom_thread_id:
          name: 💬 Thread ID (Nhóm)
          description: |
            👉 ID của nhóm Zalo muốn gửi thông báo.
            ⚠️ Nhập dạng text để tránh mất độ chính xác với số lớn.
            ⚠️ Chỉ dùng khi Receiver Type = Group.
          default: ""
          selector:
            text:
              multiple: false

        zalo_custom_user_id:
          name: 👤 User ID (Cá nhân)
          description: |
            👉 ID của người nhận Zalo.
            ⚠️ Nhập dạng text để tránh mất độ chính xác với số lớn.
            ⚠️ Chỉ dùng khi Receiver Type = User.
          default: ""
          selector:
            text:
              multiple: false

        zalo_custom_receiver_type:
          name: 👥 Type of Receiver
          description: |
            👉 Loại người nhận tin nhắn Zalo.
            ⚠️ Chọn User → điền User ID bên trên.
            ⚠️ Chọn Group → điền Thread ID bên trên.
          default: "0"
          selector:
            select:
              options:
                - label: User (Cá nhân)
                  value: "0"
                - label: Group (Nhóm)
                  value: "1"
              multiple: false

        zalo_custom_ttl:
          name: ⏳ Message TTL
          description: |
            👉 Thời gian tự động thu hồi tin nhắn (milliseconds).
            ✅ Đặt 0 = không thu hồi. Tối đa 86400000ms = 24 giờ.
          default: 0
          selector:
            number:
              min: 0
              max: 86400000
              step: 1000
              mode: box

        zalo_custom_initial_caption:
          name: 📝 Initial Caption
          description: 👉 Nội dung tin nhắn ban đầu gửi kèm ảnh qua Zalo Custom.
          default: "🔔 Phát hiện chuyển động!"
          selector:
            text:
              multiline: true

    # ============================================================
    # TTS SPEAKER SETTINGS
    # ============================================================
    tts_speaker_section:
      name: TTS Speaker Settings
      icon: mdi:speaker
      collapsed: true
      input:
        include_tts_announcement:
          name: ✅ Use TTS Announcement (Optional)
          description: |
            👉 Bật để phát thông báo bằng giọng nói ra loa được tích hợp HA.
            🌐 Xem thêm: https://www.home-assistant.io/integrations/?search=tts
          default: false
          selector:
            boolean: {}

        num_volume_speaker:
          name: 🔊 Volume Set
          description: |
            👉 Thiết lập âm lượng cho loa (từ 0.1 đến 1.0).
            ✅ Mặc định: 0.5 (50%).
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              mode: slider

        text_to_speech_engine:
          name: 🗣️ Text-to-Speech Service Provider
          description: 👉 Chọn dịch vụ TTS hỗ trợ trong HA.
          default: []
          selector:
            entity:
              filter:
                - domain: tts
              multiple: false

        media_player:
          name: 🎶 Media Player
          description: |
            👉 Chọn loa để phát thông báo giọng nói.
            ✅ Có thể chọn nhiều loa cùng lúc.
          default: []
          selector:
            entity:
              filter:
                - domain: media_player
              multiple: true

    # ============================================================
    # DELAY SETTINGS
    # ============================================================
    delay_settings:
      name: Delay Settings
      icon: mdi:clock-start
      collapsed: true
      input:
        num_delay_actions:
          name: ⌛ Delays
          description: |
            👉 Thời gian chờ (giây) sau khi hoàn thành tất cả các hành động.
            ⚠️ Automation chỉ có thể chạy lại sau khoảng thời gian này + cooldown.
          default: 10
          selector:
            number:
              min: 5
              max: 120
              step: 5
              unit_of_measurement: seconds
              mode: slider

# ============================================================
# VARIABLES
# ============================================================
variables:
  trigger_sensor: !input trigger_sensor
  person_sensor: !input person_occupancy_sensor
  person_detected_state: !input person_detected_state
  wait_for_person: !input wait_for_person
  max_wait_time: !input max_wait_time
  cooldown: !input cooldown

  # Camera
  camera_entities_list: !input camera_entities
  camera_entity: "{{ camera_entities_list[0] if camera_entities_list else '' }}"
  camera_name: '{{ state_attr(camera_entity, "friendly_name") | default(camera_entity) }}'
  camera_file_path: '{{ camera_entity.replace("camera.", "") }}'

  # Snapshot
  num_snapshots: !input num_snapshots
  num_delay_before_snapshot: !input num_delay_before_snapshot
  num_delay: !input num_delay
  overwrite_image: !input overwrite_image

  # AI
  ai_powered: !input ai_powered
  ai_mode: !input ai_mode
  ai_provider: !input ai_provider
  detect_subjects: !input detect_subjects

  # ============================================================
  # PROMPT TỰ ĐỘNG THEO MODE VÀ ĐỐI TƯỢNG PHÁT HIỆN
  # ============================================================
  #
  # FIX v2 — Vấn đề 2 (JSON) + Vấn đề 3 (Structured):
  #
  # Structured mode:
  #   Bổ sung "Bước 2" chỉ rõ giá trị CỐ ĐỊNH cho các trường KHÔNG phân tích.
  #   Giúp AI không tự ý điền giá trị tuỳ tiện vào animals_detected/humans_detected.
  #
  # JSON mode:
  #   field_rules nay CONDITIONAL theo detect_subjects.
  #   Mỗi nhánh chỉ mô tả đúng các trường được yêu cầu, tránh mâu thuẫn instruction.
  #   Chuỗi fallback khi count=0 đồng bộ chính xác với bộ lọc filter phrases.
  # ============================================================
  ai_task_instructions: >
    {% if ai_mode == 'structured' %}
    <context>
    Đây là chuỗi hình ảnh chụp từ camera an ninh trong nhà hoặc ngoài sân.
    </context>
    <task>
    {% if detect_subjects == 'humans' %}
    Nhiệm vụ: CHỈ đếm và mô tả CON NGƯỜI trong ảnh. Bỏ qua hoàn toàn mọi động vật.
    Bước 1 — Đếm tổng số người nhìn thấy được. Điền số nguyên vào trường humans_detected (tối thiểu là 0).
    Bước 2 — Điền giá trị CỐ ĐỊNH sau cho CÁC TRƯỜNG ĐỘNG VẬT (KHÔNG được thay đổi):
              animals_detected = 0
              animals_detected_summary = "" (chuỗi rỗng)
              animals_detected_description = "Không phân tích động vật theo yêu cầu"
    {% elif detect_subjects == 'animals' %}
    Nhiệm vụ: CHỈ đếm và mô tả ĐỘNG VẬT (chó, mèo, chim, chuột, thằn lằn, v.v.) trong ảnh. Bỏ qua hoàn toàn con người.
    Bước 1 — Đếm tổng số động vật nhìn thấy được. Điền số nguyên vào trường animals_detected (tối thiểu là 0).
    Bước 2 — Điền giá trị CỐ ĐỊNH sau cho CÁC TRƯỜNG NGƯỜI (KHÔNG được thay đổi):
              humans_detected = 0
              humans_detected_summary = "" (chuỗi rỗng)
              humans_detected_description = "Không phân tích người theo yêu cầu"
    {% else %}
    Nhiệm vụ: Đếm và mô tả cả CON NGƯỜI lẫn ĐỘNG VẬT trong ảnh.
    Bước 1 — Đếm tổng số người nhìn thấy. Điền số nguyên vào humans_detected. Nếu không có người → điền 0.
    Bước 2 — Đếm tổng số động vật (chó, mèo, chim, chuột, thằn lằn, v.v.). Điền số nguyên vào animals_detected. Nếu không có động vật → điền 0.
    {% endif %}
    </task>
    <rules>
    - Viết tiếng Việt có đầy đủ dấu (ví dụ: "phụ nữ" KHÔNG PHẢI "phu nu").
    - Chỉ văn bản thuần, không dùng ký tự đặc biệt (*, /, emoji) hay markdown.
    - Mô tả súc tích, đủ để đưa vào thông báo điện thoại.
    </rules>
    {% else %}
    <context>
    Đây là chuỗi hình ảnh chụp từ camera an ninh trong nhà hoặc ngoài sân.
    </context>
    <task>
    {% if detect_subjects == 'humans' %}
    Nhiệm vụ: CHỈ phân tích CON NGƯỜI. Bỏ qua hoàn toàn động vật.
    {% elif detect_subjects == 'animals' %}
    Nhiệm vụ: CHỈ phân tích ĐỘNG VẬT (chó, mèo, chim, chuột, thằn lằn, v.v.). Bỏ qua hoàn toàn con người.
    {% else %}
    Nhiệm vụ: Phân tích cả CON NGƯỜI lẫn ĐỘNG VẬT.
    {% endif %}
    </task>
    <output_format>
    Chỉ trả về JSON thuần, bắt đầu bằng { và kết thúc bằng }:
    {"humans_detected":0,"humans_detected_summary":"","humans_detected_description":"","animals_detected":0,"animals_detected_summary":"","animals_detected_description":""}
    TUYỆT ĐỐI KHÔNG dùng markdown, KHÔNG có ```json, KHÔNG có ký tự nào ngoài JSON.
    </output_format>
    <field_rules>
    {% if detect_subjects == 'humans' %}
    Chỉ phân tích người — điền theo quy tắc SAU, không được thay đổi cấu trúc:
    humans_detected: (số nguyên) Tổng số người đếm được. Điền 0 nếu không có người.
    humans_detected_summary: Tóm tắt người theo loại (ví dụ "1 phụ nữ, 2 trẻ em"). Trả "" nếu không có người.
    humans_detected_description: Mô tả từng người (giới tính, trang phục màu cụ thể, hành động đang làm). Nếu humans_detected = 0, PHẢI trả về CHÍNH XÁC chuỗi: "Đã phát hiện chuyển động tuy nhiên không có người trong chuỗi ảnh khi so sánh".
    animals_detected: PHẢI là số nguyên 0. Không được điền giá trị khác.
    animals_detected_summary: PHẢI là "" (chuỗi rỗng). Không được điền giá trị khác.
    animals_detected_description: PHẢI trả về CHÍNH XÁC chuỗi: "Không phân tích động vật theo yêu cầu". Không được điền giá trị khác.
    {% elif detect_subjects == 'animals' %}
    Chỉ phân tích động vật — điền theo quy tắc SAU, không được thay đổi cấu trúc:
    humans_detected: PHẢI là số nguyên 0. Không được điền giá trị khác.
    humans_detected_summary: PHẢI là "" (chuỗi rỗng). Không được điền giá trị khác.
    humans_detected_description: PHẢI trả về CHÍNH XÁC chuỗi: "Không phân tích người theo yêu cầu". Không được điền giá trị khác.
    animals_detected: (số nguyên) Tổng số động vật đếm được. Điền 0 nếu không có động vật.
    animals_detected_summary: Tóm tắt động vật theo loài (ví dụ "1 con chó vàng, 2 con mèo đen"). Trả "" nếu không có động vật.
    animals_detected_description: Mô tả từng con vật (loài, màu sắc lông/vũ cụ thể, hành động). Nếu animals_detected = 0, PHẢI trả về CHÍNH XÁC chuỗi: "Đã phát hiện chuyển động tuy nhiên không có động vật trong chuỗi ảnh khi so sánh".
    {% else %}
    Phân tích cả người lẫn động vật — điền theo quy tắc SAU:
    humans_detected: (số nguyên) Tổng số người đếm được. Điền 0 nếu không có người.
    humans_detected_summary: Tóm tắt người theo loại (ví dụ "1 phụ nữ, 2 trẻ em"). Trả "" nếu không có người.
    humans_detected_description: Mô tả từng người (giới tính, trang phục màu cụ thể, hành động). Nếu humans_detected = 0, PHẢI trả về CHÍNH XÁC chuỗi: "Đã phát hiện chuyển động tuy nhiên không có người trong chuỗi ảnh khi so sánh".
    animals_detected: (số nguyên) Tổng số động vật đếm được. Điền 0 nếu không có động vật.
    animals_detected_summary: Tóm tắt động vật theo loài (ví dụ "1 con chó vàng, 2 con mèo đen"). Trả "" nếu không có động vật.
    animals_detected_description: Mô tả từng con vật (loài, màu sắc lông/vũ cụ thể, hành động). Nếu animals_detected = 0, PHẢI trả về CHÍNH XÁC chuỗi: "Đã phát hiện chuyển động tuy nhiên không có động vật trong chuỗi ảnh khi so sánh".
    {% endif %}
    </field_rules>
    <rules>
    - Viết tiếng Việt có đầy đủ dấu. TUYỆT ĐỐI KHÔNG viết tiếng Việt không dấu.
    - Chỉ trả về raw JSON. Không markdown, không ```json.
    - Tổng nội dung tất cả trường text không vượt quá 800 từ.
    </rules>
    {% endif %}

  # ============================================================
  # DESCRIPTION FIELDS CHO STRUCTURED OUTPUT
  # ============================================================
  #
  # FIX v2:
  #   - Nhánh "else" (không phân tích loại này) dùng chuỗi CỐ ĐỊNH, explicit.
  #   - Nhánh "phân tích" chỉ rõ chuỗi fallback khi count=0 phải khớp filter phrases.
  # ============================================================
  ai_structure_description_humans: >
    {% if detect_subjects in ['humans', 'both'] %}
    Mô tả ngắn gọn những CON NGƯỜI bạn thấy trong chuỗi hình ảnh.
    Chỉ rõ giới tính (đàn ông/phụ nữ/trẻ em) và số lượng từng loại.
    Mô tả trang phục màu sắc cụ thể và hành động đang làm của từng người.
    Ví dụ: "Một phụ nữ mặc đồ bộ màu hồng cam đang ngồi chuẩn bị đồ ăn. Bên cạnh là một bé trai mặc đồ màu vàng cam đang đứng chơi.".
    Không mô tả vật thể hoặc tòa nhà cố định.
    BẮT BUỘC viết tiếng Việt có đầy đủ dấu. TUYỆT ĐỐI KHÔNG viết tiếng Việt không dấu.
    TUYỆT ĐỐI KHÔNG dùng markdown hay ký tự định dạng.
    Nếu humans_detected = 0 (không có người), PHẢI trả về CHÍNH XÁC chuỗi sau (không thêm bớt ký tự): "Đã phát hiện chuyển động tuy nhiên không có người trong chuỗi ảnh khi so sánh".
    {% else %}
    Không yêu cầu phân tích người theo cấu hình hiện tại.
    PHẢI trả về CHÍNH XÁC chuỗi sau (không thêm bớt ký tự): "Không phân tích người theo yêu cầu".
    {% endif %}

  ai_structure_description_animals: >
    {% if detect_subjects in ['animals', 'both'] %}
    Mô tả ngắn gọn những ĐỘNG VẬT bạn thấy trong chuỗi hình ảnh (chó, mèo, chim, chuột, thằn lằn, v.v.).
    Xác định rõ loài động vật, màu sắc lông/vũ cụ thể, kích thước tương đối và hành động đang làm.
    Ví dụ: "Một con chó màu vàng đang nằm ngủ trên sàn nhà. Bên cạnh là một con mèo đen trắng đang ngồi liếm chân.".
    Không mô tả vật thể cố định hoặc con người.
    BẮT BUỘC viết tiếng Việt có đầy đủ dấu. TUYỆT ĐỐI KHÔNG viết tiếng Việt không dấu.
    TUYỆT ĐỐI KHÔNG dùng markdown hay ký tự định dạng.
    Nếu animals_detected = 0 (không có động vật), PHẢI trả về CHÍNH XÁC chuỗi sau (không thêm bớt ký tự): "Đã phát hiện chuyển động tuy nhiên không có động vật trong chuỗi ảnh khi so sánh".
    {% else %}
    Không yêu cầu phân tích động vật theo cấu hình hiện tại.
    PHẢI trả về CHÍNH XÁC chuỗi sau (không thêm bớt ký tự): "Không phân tích động vật theo yêu cầu".
    {% endif %}

  # Mobile Notify
  include_notify: !input include_notify
  notify_device: !input notify_device
  is_ios_android: !input is_ios_android
  notify_title: !input notify_title
  tap_navigate: !input tap_navigate
  notification_time: !input notification_time
  filtered_devices: "{{ notify_device }}"

  # Telegram
  include_telegram_notify: !input include_telegram_notify
  telegram_config_entry: !input telegram_config_entry
  telegram_target: !input telegram_target
  telegram_thread_id: !input telegram_thread_id
  telegram_initial_caption: !input telegram_initial_caption

  # Zalo Bot (Pyscript)
  enable_zalo_bot: !input enable_zalo_bot
  zalo_bot_chat_id: !input zalo_bot_chat_id
  zalo_bot_initial_caption: !input zalo_bot_initial_caption

  # Zalo Custom Integration
  enable_zalo_custom: !input enable_zalo_custom
  zalo_custom_account: !input zalo_custom_account
  zalo_custom_thread_id: !input zalo_custom_thread_id
  zalo_custom_user_id: !input zalo_custom_user_id
  zalo_custom_receiver_type: !input zalo_custom_receiver_type
  zalo_custom_ttl: !input zalo_custom_ttl
  zalo_custom_initial_caption: !input zalo_custom_initial_caption
  zalo_resolved_id: >
    {% if zalo_custom_receiver_type == '1' %}
      {{ zalo_custom_thread_id if zalo_custom_thread_id | length > 0 else '' }}
    {% else %}
      {{ zalo_custom_user_id if zalo_custom_user_id | length > 0 else '' }}
    {% endif %}

  # TTS
  include_tts_announcement: !input include_tts_announcement
  num_volume_speaker: !input num_volume_speaker
  text_to_speech_engine: !input text_to_speech_engine
  media_player: !input media_player
  num_delay_actions: !input num_delay_actions

  # Tag duy nhất cho mỗi lần chạy
  tag: "{{ camera_entity + int(as_timestamp(now())) | string }}"

  # Màu thông báo Android dạng HEX
  notification_color: !input notification_color
  notification_color_hex: >
    #{{ '%02x%02x%02x' | format(notification_color[0], notification_color[1], notification_color[2]) }}

max_exceeded: silent
mode: single

# ============================================================
# TRIGGER VARIABLES
# ============================================================
trigger_variables:
  _trigger_sensors: !input trigger_sensor

# ============================================================
# TRIGGER
# ============================================================
trigger:
  - platform: state
    entity_id: !input trigger_sensor
    from: !input trigger_from_state
    to: !input trigger_to_state

# ============================================================
# CONDITION
# ============================================================
condition:
  - condition: and
    conditions: !input run_conditions

# ============================================================
# ACTION
# ============================================================
action:

  # ============================================================
  # BƯỚC 1: WAIT FOR PERSON (tùy chọn)
  # ============================================================
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ wait_for_person and person_sensor | length > 0 }}"
        sequence:
          - if:
              - condition: state
                entity_id: !input person_occupancy_sensor
                state: !input person_detected_state
            then: []
            else:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ max_wait_time == 0 }}"
                    sequence:
                      - wait_for_trigger:
                          - platform: state
                            entity_id: !input person_occupancy_sensor
                            to: !input person_detected_state
                        continue_on_timeout: true
                  - conditions:
                      - condition: template
                        value_template: "{{ max_wait_time > 0 }}"
                    sequence:
                      - wait_for_trigger:
                          - platform: state
                            entity_id: !input person_occupancy_sensor
                            to: !input person_detected_state
                        timeout:
                          seconds: "{{ max_wait_time }}"
                        continue_on_timeout: true

  # ============================================================
  # BƯỚC 2: XÁC ĐỊNH ĐƯỜNG DẪN FILE
  # ============================================================
  - variables:
      file_path_dynamic: >
        {% if overwrite_image %}
          {{ camera_file_path }}
        {% else %}
          {{ camera_file_path }}_{{ context.id }}
        {% endif %}

  # ============================================================
  # BƯỚC 3: DELAY TRƯỚC KHI CHỤP ẢNH ĐẦU TIÊN
  # ============================================================
  - delay:
      seconds: "{{ num_delay_before_snapshot }}"

  # ============================================================
  # BƯỚC 4: CHỤP ẢNH LIÊN TIẾP
  # ============================================================
  - repeat:
      count: "{{ num_snapshots }}"
      sequence:
        - action: camera.snapshot
          data:
            filename: /media/snapshots/{{ file_path_dynamic }}_snapshot{{ repeat.index }}.jpg
          target:
            entity_id: "{{ camera_entity }}"
        - if:
            - condition: template
              value_template: "{{ repeat.index < num_snapshots }}"
          then:
            - delay:
                seconds: "{{ num_delay }}"

  # ============================================================
  # BƯỚC 5: BUILD DANH SÁCH URL SNAPSHOTS CHO AI
  # ============================================================
  - variables:
      snapshots_url: >
        {% set snap_count = num_snapshots | int %}
        {% set camera = file_path_dynamic %}
        {% set ns = namespace(images=[]) %}
        {%- for i in range(1, snap_count + 1) -%}
          {% set ns.images = ns.images + [{
            'media_content_id': 'media-source://media_source/local/snapshots/' ~ camera ~ '_snapshot' ~ i ~ '.jpg',
            'media_content_type': 'image/jpeg'
          }] %}
        {%- endfor -%}
        {{ ns.images }}
      snapshot_first: /media/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg

  # ============================================================
  # BƯỚC 6: GỬI ẢNH NGAY LẬP TỨC (trước khi AI phân tích)
  # ============================================================

  # --- Telegram: gửi ảnh + caption ban đầu ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ include_telegram_notify }}"
        sequence:
          - alias: "Gửi ảnh qua Telegram"
            continue_on_error: true
            action: telegram_bot.send_photo
            data: >
              {% set data = {
                'config_entry_id': telegram_config_entry,
                'file': '/media/snapshots/' + file_path_dynamic + '_snapshot1.jpg',
                'caption': telegram_initial_caption
              } %}
              {% if telegram_target != "" %}
                {% set data = dict(data, chat_id=telegram_target | int) %}
              {% endif %}
              {% if telegram_thread_id != "" %}
                {% set data = dict(data, message_thread_id=telegram_thread_id | int) %}
              {% endif %}
              {{ data }}

  # --- Zalo Bot (Pyscript): gửi ảnh + caption ban đầu ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_zalo_bot }}"
        sequence:
          - alias: "Gửi ảnh qua Zalo Bot (Pyscript)"
            continue_on_error: true
            action: pyscript.send_zalo_photo
            data:
              chat_id: "{{ zalo_bot_chat_id }}"
              file_path: /media/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
              caption: "{{ zalo_bot_initial_caption }}"
            response_variable: zalo_bot_photo_response

  # --- Zalo Custom Integration: gửi ảnh + caption ban đầu ---
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ enable_zalo_custom
                 and zalo_resolved_id | trim | length > 0
                 and zalo_custom_account | length > 0 }}
        sequence:
          - alias: "Gửi ảnh qua Zalo Custom Integration"
            continue_on_error: true
            action: zalo_bot.send_image
            data:
              account_selection: !input zalo_custom_account
              thread_id: "{{ zalo_resolved_id | trim | string }}"
              type: !input zalo_custom_receiver_type
              image_path: /media/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
              message: "{{ zalo_custom_initial_caption }}"
              ttl: !input zalo_custom_ttl
            response_variable: zalo_custom_image_response

  # --- Mobile App: gửi thông báo với ảnh, message "Đang phân tích..." ---
  - if:
      - condition: template
        value_template: "{{ include_notify and (filtered_devices | length > 0) }}"
    then:
      - choose:
          - alias: Android - Gửi thông báo ban đầu với ảnh
            conditions:
              - "{{ is_ios_android == 'android_device' }}"
            sequence:
              - repeat:
                  for_each: "{{ filtered_devices }}"
                  sequence:
                    - continue_on_error: true
                      action: >
                        notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                      data:
                        title: !input notify_title
                        message: "Đang phân tích..."
                        data:
                          priority: high
                          notification_icon: !input status_bar_icon
                          color: "{{ notification_color_hex }}"
                          image: "{{ snapshot_first }}"
                          url: "{{ tap_navigate }}"
                          clickAction: "{{ tap_navigate }}"
                          tag: "{{ tag }}"

          - alias: iOS - Gửi thông báo ban đầu với ảnh
            conditions:
              - "{{ is_ios_android == 'ios_device' }}"
            sequence:
              - repeat:
                  for_each: "{{ filtered_devices }}"
                  sequence:
                    - continue_on_error: true
                      action: >
                        notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                      data:
                        title: !input notify_title
                        message: "Đang phân tích..."
                        data:
                          attachment:
                            url: "{{ snapshot_first }}"
                            content_type: JPEG
                          tag: "{{ tag }}"

  # ============================================================
  # BƯỚC 7: PHÂN TÍCH AI
  # ============================================================
  - choose:
      - alias: "Chạy phân tích AI nếu được bật"
        conditions:
          - "{{ ai_powered }}"
        sequence:

          # ----------------------------------------------------------
          # Chế độ Structured Output
          # ----------------------------------------------------------
          - choose:
              - alias: "Structured Output Mode"
                conditions:
                  - condition: template
                    value_template: "{{ ai_mode == 'structured' }}"
                sequence:
                  - action: ai_task.generate_data
                    data:
                      task_name: Phan tich anh khi co chuyen dong
                      instructions: "{{ ai_task_instructions }}"
                      entity_id: "{{ ai_provider if ai_provider | length > 0 else omit }}"
                      attachments: "{{ snapshots_url }}"
                      structure:
                        # --- Trường phát hiện người ---
                        humans_detected:
                          description: >
                            Tổng số người đếm được trong chuỗi ảnh (số nguyên ≥ 0).
                            Nếu không có người hoặc không yêu cầu phân tích người → điền 0.
                          required: true
                          selector:
                            number:
                        humans_detected_summary:
                          description: >
                            Tóm tắt số lượng người theo loại, viết tiếng Việt có dấu.
                            Ví dụ: "1 phụ nữ, 2 đàn ông, 1 trẻ em".
                            Trả về chuỗi rỗng nếu không có người hoặc không yêu cầu phân tích người.
                          required: true
                          selector:
                            text:
                        humans_detected_description:
                          description: "{{ ai_structure_description_humans }}"
                          required: true
                          selector:
                            text:
                        # --- Trường phát hiện động vật ---
                        animals_detected:
                          description: >
                            Tổng số động vật (chó, mèo, chim, v.v.) đếm được trong chuỗi ảnh (số nguyên ≥ 0).
                            Nếu không có động vật hoặc không yêu cầu phân tích động vật → điền 0.
                          required: true
                          selector:
                            number:
                        animals_detected_summary:
                          description: >
                            Tóm tắt số lượng động vật theo loài, viết tiếng Việt có dấu.
                            Ví dụ: "1 con chó vàng, 2 con mèo đen".
                            Trả về chuỗi rỗng nếu không có động vật hoặc không yêu cầu phân tích động vật.
                          required: true
                          selector:
                            text:
                        animals_detected_description:
                          description: "{{ ai_structure_description_animals }}"
                          required: true
                          selector:
                            text:
                    response_variable: humans_detected_report

              # ----------------------------------------------------------
              # Chế độ JSON: AI trả về raw JSON, parse thủ công
              # ----------------------------------------------------------
              - alias: "JSON Mode (OpenAI / Raw JSON)"
                conditions:
                  - condition: template
                    value_template: "{{ ai_mode == 'json' }}"
                sequence:
                  - action: ai_task.generate_data
                    data:
                      task_name: Phan tich anh khi co chuyen dong
                      instructions: "{{ ai_task_instructions }}"
                      entity_id: "{{ ai_provider if ai_provider | length > 0 else omit }}"
                      attachments: "{{ snapshots_url }}"
                    response_variable: humans_detected_report_raw

                  - variables:
                      humans_detected_report: >
                        {% if humans_detected_report_raw is defined
                           and humans_detected_report_raw.data is defined %}
                          {% set parsed = (humans_detected_report_raw.data
                            | regex_replace('```json\\s*', '')
                            | regex_replace('```\\s*', '')
                            | trim
                            | from_json(default={})) %}
                          {{ {'data': parsed} }}
                        {% else %}
                          {{ {} }}
                        {% endif %}

          # Đợi AI xử lý xong
          - wait_template: >
              {{ humans_detected_report is defined
                 and humans_detected_report.data is defined }}
            timeout: "00:01:00"
            continue_on_timeout: true

          # ============================================================
          # XỬ LÝ KẾT QUẢ AI
          # ============================================================
          - if:
              - condition: template
                value_template: "{{ wait.completed }}"
            then:
              # ----------------------------------------------------------
              # Build message tổng hợp từ kết quả AI
              # ----------------------------------------------------------
              - variables:
                  ai_messages: |
                    📊  {{ camera_name }}
                    {% set h_count = humans_detected_report.data.humans_detected | int(0) %}
                    {% set a_count = humans_detected_report.data.animals_detected | int(0) %}
                    {% if detect_subjects in ['humans', 'both'] %}🚶: {{ humans_detected_report.data.humans_detected_summary if humans_detected_report.data.humans_detected_summary | default('') | length > 0 else h_count }}
                    👉 {{ humans_detected_report.data.humans_detected_description }}
                    {% endif %}
                    {% if detect_subjects in ['animals', 'both'] %}🐾: {{ humans_detected_report.data.animals_detected_summary if humans_detected_report.data.animals_detected_summary | default('') | length > 0 else a_count }}
                    👉 {{ humans_detected_report.data.animals_detected_description }}
                    {% endif %}
                    {% set days = ['Thứ hai', 'Thứ ba', 'Thứ tư', 'Thứ năm', 'Thứ sáu', 'Thứ bảy', 'Chủ nhật'] %}🕒 {{ now().strftime('%H:%M:%S') }} {{ days[now().weekday()] }} Ngày {{ now().strftime('%d') }} Tháng {{ now().strftime('%m') }} Năm {{ now().strftime('%Y') }}{{ ' ' + notification_time if notification_time != '' else '' }}

              # ----------------------------------------------------------
              # Điều kiện lọc thông báo
              # Cụm từ filter khớp chính xác với chuỗi fallback trong prompt.
              # ----------------------------------------------------------
              - if:
                  - condition: template
                    value_template: >
                      {% set h_count = humans_detected_report.data.humans_detected | int(0) %}
                      {% set h_desc  = humans_detected_report.data.humans_detected_description | default('') | lower %}
                      {% set a_count = humans_detected_report.data.animals_detected | int(0) %}
                      {% set a_desc  = humans_detected_report.data.animals_detected_description | default('') | lower %}

                      {# Xác định có người hợp lệ không #}
                      {% set no_human_phrases = [
                        'không có người trong chuỗi ảnh khi so sánh',
                        'không có người',
                        'không có chuỗi hình ảnh nào được cung cấp',
                        'không phân tích người'
                      ] %}
                      {% set human_invalid = namespace(value=false) %}
                      {% for phrase in no_human_phrases %}
                        {% if phrase in h_desc %}{% set human_invalid.value = true %}{% endif %}
                      {% endfor %}
                      {% set human_ok = (h_count > 0) and not human_invalid.value %}

                      {# Xác định có động vật hợp lệ không #}
                      {% set no_animal_phrases = [
                        'không có động vật trong chuỗi ảnh khi so sánh',
                        'không có động vật',
                        'không phân tích động vật'
                      ] %}
                      {% set animal_invalid = namespace(value=false) %}
                      {% for phrase in no_animal_phrases %}
                        {% if phrase in a_desc %}{% set animal_invalid.value = true %}{% endif %}
                      {% endfor %}
                      {% set animal_ok = (a_count > 0) and not animal_invalid.value %}

                      {# Quyết định gửi thông báo theo detect_subjects #}
                      {% if detect_subjects == 'humans' %}
                        {{ human_ok }}
                      {% elif detect_subjects == 'animals' %}
                        {{ animal_ok }}
                      {% else %}
                        {{ human_ok or animal_ok }}
                      {% endif %}
                then:

                  # --- Cập nhật Mobile Notification với kết quả AI ---
                  - if:
                      - condition: template
                        value_template: "{{ include_notify and (filtered_devices | length > 0) }}"
                    then:
                      - choose:
                          - alias: Android - Cập nhật thông báo với kết quả AI
                            conditions:
                              - "{{ is_ios_android == 'android_device' }}"
                            sequence:
                              - repeat:
                                  for_each: "{{ filtered_devices }}"
                                  sequence:
                                    - continue_on_error: true
                                      action: >
                                        notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                      data:
                                        title: !input notify_title
                                        message: "{{ ai_messages }}"
                                        data:
                                          priority: high
                                          notification_icon: !input status_bar_icon
                                          color: "{{ notification_color_hex }}"
                                          image: "{{ snapshot_first }}"
                                          url: "{{ tap_navigate }}"
                                          clickAction: "{{ tap_navigate }}"
                                          tag: "{{ tag }}"

                          - alias: iOS - Cập nhật thông báo với kết quả AI
                            conditions:
                              - "{{ is_ios_android == 'ios_device' }}"
                            sequence:
                              - repeat:
                                  for_each: "{{ filtered_devices }}"
                                  sequence:
                                    - continue_on_error: true
                                      action: >
                                        notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                      data:
                                        title: !input notify_title
                                        message: "{{ ai_messages }}"
                                        data:
                                          attachment:
                                            url: "{{ snapshot_first }}"
                                            content_type: JPEG
                                          tag: "{{ tag }}"

                  # --- Telegram: gửi kết quả phân tích AI ---
                  - if:
                      - condition: template
                        value_template: "{{ include_telegram_notify }}"
                    then:
                      - continue_on_error: true
                        action: telegram_bot.send_message
                        data: >
                          {% set data = {
                            'config_entry_id': telegram_config_entry,
                            'message': ai_messages,
                            'parse_mode': 'plain_text'
                          } %}
                          {% if telegram_target != "" %}
                            {% set data = dict(data, chat_id=telegram_target | int) %}
                          {% endif %}
                          {% if telegram_thread_id != "" %}
                            {% set data = dict(data, message_thread_id=telegram_thread_id | int) %}
                          {% endif %}
                          {{ data }}

                  # --- Zalo Bot (Pyscript): gửi kết quả phân tích AI ---
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ enable_zalo_bot }}"
                        sequence:
                          - alias: "Gửi kết quả AI qua Zalo Bot"
                            continue_on_error: true
                            action: pyscript.send_zalo_message
                            data:
                              chat_id: "{{ zalo_bot_chat_id }}"
                              message: "{{ ai_messages }}"
                            response_variable: zalo_bot_message_response

                  # --- Zalo Custom Integration: gửi kết quả phân tích AI ---
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: >
                              {{ enable_zalo_custom
                                 and zalo_resolved_id | trim | length > 0
                                 and zalo_custom_account | length > 0 }}
                        sequence:
                          - alias: "Gửi kết quả AI qua Zalo Custom"
                            continue_on_error: true
                            action: zalo_bot.send_message
                            data:
                              account_selection: !input zalo_custom_account
                              thread_id: "{{ zalo_resolved_id | trim | string }}"
                              type: !input zalo_custom_receiver_type
                              message: "{{ ai_messages }}"
                              ttl: !input zalo_custom_ttl
                            response_variable: zalo_custom_message_response

                  # --- TTS ra loa ---
                  - if:
                      - condition: template
                        value_template: "{{ include_tts_announcement }}"
                    then:
                      - alias: "TTS ra từng loa"
                        repeat:
                          for_each: "{{ media_player }}"
                          sequence:
                            - continue_on_error: true
                              action: media_player.volume_set
                              data:
                                volume_level: "{{ num_volume_speaker }}"
                              target:
                                entity_id: "{{ repeat.item }}"
                            - continue_on_error: true
                              action: tts.speak
                              target:
                                entity_id: !input text_to_speech_engine
                              data:
                                media_player_entity_id: "{{ repeat.item }}"
                                message: >
                                  {% set h_count = humans_detected_report.data.humans_detected | int(0) %}
                                  {% set a_count = humans_detected_report.data.animals_detected | int(0) %}
                                  {% set parts = [] %}
                                  {% if detect_subjects in ['humans', 'both'] and h_count > 0 %}
                                    {% set parts = parts + [humans_detected_report.data.humans_detected_description] %}
                                  {% endif %}
                                  {% if detect_subjects in ['animals', 'both'] and a_count > 0 %}
                                    {% set parts = parts + [humans_detected_report.data.animals_detected_description] %}
                                  {% endif %}
                                  {{ parts | join('. ') if parts | length > 0 else 'Phát hiện chuyển động.' }}

            else:
              # ============================================================
              # XỬ LÝ KHI AI TIMEOUT
              # ============================================================
              - variables:
                  error_message: >
                    ⚠️ AI phân tích ảnh chụp không thành công (timeout).
                    🕒 {{ now().strftime('%H:%M:%S %a, %d-%b-%Y') }}

              - if:
                  - condition: template
                    value_template: "{{ include_notify and (filtered_devices | length > 0) }}"
                then:
                  - choose:
                      - alias: Android - Thông báo lỗi AI timeout
                        conditions:
                          - "{{ is_ios_android == 'android_device' }}"
                        sequence:
                          - repeat:
                              for_each: "{{ filtered_devices }}"
                              sequence:
                                - continue_on_error: true
                                  action: >
                                    notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                  data:
                                    title: !input notify_title
                                    message: "{{ error_message }}"
                                    data:
                                      priority: high
                                      notification_icon: !input status_bar_icon
                                      color: "{{ notification_color_hex }}"
                                      image: "{{ snapshot_first }}"
                                      url: "{{ tap_navigate }}"
                                      clickAction: "{{ tap_navigate }}"
                                      tag: "{{ tag }}"
                      - alias: iOS - Thông báo lỗi AI timeout
                        conditions:
                          - "{{ is_ios_android == 'ios_device' }}"
                        sequence:
                          - repeat:
                              for_each: "{{ filtered_devices }}"
                              sequence:
                                - continue_on_error: true
                                  action: >
                                    notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}
                                  data:
                                    title: !input notify_title
                                    message: "{{ error_message }}"
                                    data:
                                      attachment:
                                        url: "{{ snapshot_first }}"
                                        content_type: JPEG
                                      tag: "{{ tag }}"

              - if:
                  - condition: template
                    value_template: "{{ include_telegram_notify }}"
                then:
                  - continue_on_error: true
                    action: telegram_bot.send_message
                    data: >
                      {% set data = {
                        'config_entry_id': telegram_config_entry,
                        'message': error_message,
                        'parse_mode': 'plain_text'
                      } %}
                      {% if telegram_target != "" %}
                        {% set data = dict(data, chat_id=telegram_target | int) %}
                      {% endif %}
                      {% if telegram_thread_id != "" %}
                        {% set data = dict(data, message_thread_id=telegram_thread_id | int) %}
                      {% endif %}
                      {{ data }}

              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ enable_zalo_bot }}"
                    sequence:
                      - continue_on_error: true
                        action: pyscript.send_zalo_message
                        data:
                          chat_id: "{{ zalo_bot_chat_id }}"
                          message: "{{ error_message }}"

              - choose:
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ enable_zalo_custom
                             and zalo_resolved_id | trim | length > 0
                             and zalo_custom_account | length > 0 }}
                    sequence:
                      - continue_on_error: true
                        action: zalo_bot.send_message
                        data:
                          account_selection: !input zalo_custom_account
                          thread_id: "{{ zalo_resolved_id | trim | string }}"
                          type: !input zalo_custom_receiver_type
                          message: "{{ error_message }}"
                          ttl: !input zalo_custom_ttl

  # ============================================================
  # BƯỚC CUỐI: COOLDOWN
  # ============================================================
  - delay:
      seconds: "{{ num_delay_actions }}"
  - delay: !input cooldown
